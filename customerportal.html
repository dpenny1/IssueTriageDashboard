<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CentralView — Customer Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#f9fafb;color:#1a1a1a;min-height:100vh;font-size:15px}
.hdr{background:linear-gradient(135deg,#064e3b 0%,#059669 60%,#34d399 100%);padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{color:#fff;font-size:1.3rem;font-weight:800;margin:0}
.hdr p{color:#a7f3d0;font-size:0.85rem;margin-top:2px}
.btn-w{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);border-radius:9px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.btn-w:hover{background:rgba(255,255,255,0.32);transform:translateY(-1px)}
.main{padding:80px 24px;text-align:center}
.placeholder{display:inline-flex;flex-direction:column;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:48px 56px;box-shadow:0 2px 8px rgba(0,0,0,0.07);border-top:4px solid #059669}
.placeholder .icon{font-size:3.5rem}
.placeholder h2{font-size:1.4rem;font-weight:800;color:#1e1b4b}
.placeholder p{font-size:14px;color:#9ca3af;max-width:320px;line-height:1.6}
.badge{display:inline-block;font-size:12px;padding:4px 12px;border-radius:999px;background:#d1fae5;color:#065f46;font-weight:700;margin-top:4px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-in">
    <div><h1>🌐 CentralView Customer Portal Issues Hub</h1><p>Dashboard coming soon</p></div>
    <div style="display:flex;gap:10px">
      <a href="index.html" class="btn-w">← All Projects</a>
      <a href="https://dpenny1.github.io/PMTools/index.html" target="_blank" class="btn-w">🛠 PM Tools</a>
    </div>
  </div>
</div>
<div class="main">
  <div class="placeholder">
    <div class="icon">🌐</div>
    <h2>Customer Portal Issues Hub</h2>
    <p>This dashboard is under construction. Check back soon or reach out to configure this project.</p>
    <span class="badge">Coming Soon</span>
  </div>
</div>
</body>
</html>
