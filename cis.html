<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CentralView</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#f9fafb;color:#1a1a1a;min-height:100vh;font-size:15px}
a{color:#4338ca;text-decoration:none}a:hover{text-decoration:underline}
.hdr{background:linear-gradient(135deg,#1e1b4b 0%,#4338ca 60%,#6366f1 100%);padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{color:#fff;font-size:1.3rem;font-weight:800;margin:0}
.hdr p{color:#c7d2fe;font-size:0.85rem;margin-top:2px}
.hdr-btns{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.main{padding:20px 24px 48px}
.btn{border:none;border-radius:9px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.btn-w{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4)}
.btn-w:hover{background:rgba(255,255,255,0.32);transform:translateY(-1px)}
.btn-sm{padding:6px 12px;font-size:12px;border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:7px;cursor:pointer;font-weight:600}
.btn-sm:hover:not(:disabled){background:#f9fafb}
.btn-p{background:#4338ca;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer}
.btn-p:hover{background:#3730a3}
.btn-p:disabled{background:#a5b4fc;cursor:not-allowed}
.btn-d{padding:6px 12px;font-size:12px;border:1px solid #fca5a5;background:#fff;color:#dc2626;border-radius:7px;cursor:pointer;font-weight:600}
.btn-ig{padding:4px 9px;font-size:11px;border:1px solid #e5e7eb;background:#fff;color:#9ca3af;border-radius:6px;cursor:pointer}
.sw{max-width:560px;margin:24px auto}
.sc{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:24px 28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sc h2{font-size:1rem;font-weight:700;color:#1e1b4b;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e5e7eb}
.fg{margin-bottom:14px}
.fg label{font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#fff;color:#374151}
.fg input:focus,.fg select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.hint{font-size:12px;color:#9ca3af;margin-top:4px}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;color:#991b1b;font-size:13px;margin-top:10px}
.sgrid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;justify-content:center}
.sc2{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.07);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;border-top:4px solid transparent;white-space:nowrap;flex:1;min-width:150px;text-align:center}
.sc2:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.12)}
.sn{font-size:2.8rem;font-weight:800;margin-bottom:4px}
.sl{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em}
.tw{display:flex;gap:0;border-bottom:2px solid #e5e7eb;margin-bottom:20px;width:100%}
.tab{padding:12px 0;font-size:13px;font-weight:600;border-radius:8px 8px 0 0;border:none;background:transparent;color:#6b7280;cursor:pointer;white-space:nowrap;flex:1;text-align:center}
.tab.on{border:1px solid #e5e7eb;border-bottom:2px solid #f9fafb;background:#f9fafb;color:#4338ca;margin-bottom:-2px;position:relative;z-index:1}
.tc{margin-left:5px;font-size:11px;padding:1px 7px;border-radius:999px;font-weight:700;background:#f3f4f6;color:#6b7280}
.tab.on .tc{background:#e0e7ff;color:#4338ca}
.sb{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.sb input,.sb select{border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;outline:none;color:#374151}
.gh{border-radius:10px 10px 0 0;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.gt{font-weight:700;font-size:14px;color:#fff}
.gc{background:rgba(255,255,255,0.25);color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;margin-left:8px}
.tw2{border:1px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse;text-align:left}
thead{background:#f9fafb;border-bottom:1px solid #e5e7eb}
th{padding:9px 13px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:#f0f0f0}
th .si{margin-left:3px;opacity:0.4;font-size:10px}
th.sorted .si{opacity:1;color:#4338ca}
td{padding:8px 13px;border-bottom:1px solid #f3f4f6;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;display:inline-block}
.er{text-align:center;color:#9ca3af;padding:28px;font-size:13px}
.ao{color:#059669;font-weight:700}.aw{color:#d97706;font-weight:700}.ab{color:#dc2626;font-weight:700}
.of{font-size:11px;padding:2px 8px;border-radius:6px;background:#fee2e2;color:#991b1b;font-weight:600}
.rw{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07);overflow-x:auto}
.rt{width:100%;border-collapse:collapse;font-size:13px}
.rt th{text-align:center;padding:10px 14px;border-bottom:2px solid #e5e7eb;font-weight:700;color:#374151;font-size:12px;white-space:nowrap;background:#f9fafb;text-transform:none;letter-spacing:normal;cursor:default}
.rt td{padding:9px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle;text-align:center}
.rt tr:last-child td{border-bottom:none}
.rt tr:hover td{background:#f9fafb}
.rt td.tl{text-align:left}
.rt td.num{font-variant-numeric:tabular-nums;font-weight:600}
.pos{color:#059669}.neg{color:#dc2626}
.es{background:#fff;border-radius:10px;padding:3rem;text-align:center;color:#9ca3af;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-right:5px}
.spd{border:2px solid #e5e7eb;border-top-color:#6366f1}
@keyframes sp{to{transform:rotate(360deg)}}
.ps{font-size:11px;padding:3px 7px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#374151;cursor:pointer}
.aci{display:flex;flex-direction:column;gap:3px}
.acit{font-size:11px;background:#fff3cd;border:1px solid #ffc107;border-radius:5px;padding:3px 7px;color:#7a4f00;max-width:280px;word-break:break-word}
.lbl-edit-panel{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin-top:6px}
.vault-panel{background:#f8f7ff;border:1px solid #c7d2fe;border-radius:10px;padding:14px;margin-top:8px}
.vault-chip{display:inline-flex;align-items:center;gap:4px;background:#e0e7ff;border:1px solid #c7d2fe;border-radius:7px;padding:4px 10px;font-size:12px;font-weight:600;color:#3730a3;cursor:pointer;border:none}
.vault-chip:hover{background:#c7d2fe}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;overflow-y:auto}
.modal-box{background:#fff;border-radius:14px;max-width:580px;margin:40px auto;padding:24px 28px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
#setup,#cfgScr,#dash{display:none}
</style>
</head>
<body>
<div id="setup">
  <div class="hdr"><div class="hdr-in">
    <div><h1>📋 CentralView</h1><p>Select a project to get started</p></div>
    <div style="display:flex;gap:10px">
      <a href="index.html" class="btn btn-w">← All Projects</a>
      <a href="https://dpenny1.github.io/PMTools/index.html" target="_blank" class="btn btn-w">🛠 PM Tools</a>
    </div>
  </div></div>
  <div class="main"><div class="sw"><div class="sc">
    <h2>🔐 Connect</h2>
    <div class="fg"><label>Project</label>
      <select id="profileSelect" onchange="onProfileSel()"><option value="">-- Select a project --</option></select>
      <div class="hint">Don't see your project? <a href="#" onclick="showCfg();return false">Configure projects</a></div>
    </div>
    <input type="hidden" id="reposInput"/>
    <div id="setupErr" style="display:none"></div>
    <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center">
      <a href="#" onclick="showCfg();return false" style="font-size:13px;color:#6b7280">⚙ Manage projects</a>
      <button class="btn-p" id="connectBtn" onclick="connect()">▶ Load Dashboard</button>
    </div>
  </div></div></div>
</div>

<div id="cfgScr">
  <div class="hdr"><div class="hdr-in">
    <div><h1>📋 CentralView</h1><p>Manage projects</p></div>
    <button class="btn btn-w" onclick="backToSetup()">← Back</button>
  </div></div>
  <div class="main" style="max-width:620px;margin:0 auto"><div id="cfgList"></div></div>
</div>

<div id="dash">
  <div class="hdr"><div class="hdr-in">
    <div><h1 id="dashTitle">📋 CentralView</h1><p id="dashMeta">Loading...</p></div>
    <div class="hdr-btns">
      <span id="versionBadge" style="font-size:11px;color:#c7d2fe;opacity:0.8"></span>
      <span id="loadedAt" style="font-size:12px"></span>
      <a href="index.html" class="btn btn-w">← All Projects</a>
      <a href="https://dpenny1.github.io/PMTools/index.html" target="_blank" class="btn btn-w">🛠 PM Tools</a>
      <button class="btn btn-w" id="refreshBtn" onclick="doRefresh()">↻ Refresh</button>
      <button class="btn btn-w" onclick="showReleaseModal()">🚀 Release</button>
      <button class="btn btn-w" onclick="showCfg()">⚙ Projects</button>
    </div>
  </div></div>
  <div class="main">
    <div class="sgrid" id="statGrid"></div>
    <div class="tw" id="tabsWrap"></div>
    <div class="sb" id="searchBar">
      <input type="text" id="searchInput" placeholder="🔍 Search..." style="width:280px" oninput="renderMain()"/>
      <select id="filterLabel" onchange="renderMain()"><option value="">All labels</option></select>
      <select id="filterRepo" onchange="renderMain()"><option value="">All repos</option></select>
      <select id="filterPipeline" onchange="renderMain()"><option value="">All pipelines</option></select>
      <button onclick="clearFilters()" style="font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;text-decoration:underline;font-weight:600">Clear</button>
    </div>
    <div id="dashErr" style="display:none;margin-bottom:12px"></div>
    <div id="mainContent"></div>
  </div>
</div>

<div class="modal-overlay" id="labelModal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:15px;font-weight:700;color:#1e1b4b">🏷️ Manage Repo Labels</span>
      <button class="btn-sm" onclick="hideLabelManager()">✕ Close</button>
    </div>
    <div id="labelModalContent"></div>
  </div>
</div>

<div class="modal-overlay" id="releaseModal">
  <div class="modal-box" style="max-width:780px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-size:15px;font-weight:700;color:#1e1b4b">🚀 Release CS Item Triage</span>
      <button class="btn-sm" onclick="hideReleaseModal()">✕ Close</button>
    </div>
    <div id="releaseModalContent"></div>
  </div>
</div>

<script>
var APP_VERSION='2026-04-04 v18';

var S={ghToken:'',repos:[],issues:[],closedIssues:[],ignored:[],closedExcIgnored:[],activeTab:'newitems',labelColors:{},labelNames:{},zhToken:'',zhWorkspace:'',repoIds:{},zhPipelines:{},zhIssueMap:{},activeProfile:null,sortState:{col:'age',dir:1},repoWorkspaceMap:{},autoRefreshTimer:null,zhConnected:false};
var STORAGE_KEY='cis_hub_report_v7',IGNORED_KEY='cis_hub_ignored_v6',CLOSED_EXC_IGNORED_KEY='cis_closed_exc_ignored_v1',PROFILES_KEY='cis_profiles_v2',ZH_STORAGE='cis_zh_creds_v2',CACHE_KEY='cis_issues_cache_v1';
var CS_LABELS=['cs tracking','uat patch','production patch','cs in testing','cs task item','cs item'];
var TAB_DEFS=[
  {id:'newitems',label:'New Issues',color:'#0891b2'},
  {id:'exceptions',label:'Exceptions',color:'#b91c1c'},
  {id:'prod',label:'Production Patch',color:'#dc2626'},
  {id:'uat',label:'UAT Patch',color:'#d97706'},
  {id:'csitems',label:'CS Items',color:'#4338ca'},
  {id:'testing',label:'CS In Testing',color:'#059669'},
  {id:'taskitem',label:'CS Task Items',color:'#7c3aed',labelKey:'cs task item'},
  {id:'closed',label:'Recently Closed',color:'#374151'},
  {id:'ignored',label:'Ignored',color:'#6b7280'},
  {id:'report',label:'Weekly Report',color:'#1e1b4b'}
];

// ── Token Vault ───────────────────────────────────────────────────────────────
var Vault=(function(){
  var KEY='cis_vault_v1',_pw=null,_data=[];
  async function deriveKey(pw,salt){var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
  async function encrypt(text,pw){var salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));var key=await deriveKey(pw,salt);var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,new TextEncoder().encode(text));var buf=new Uint8Array(28+ct.byteLength);buf.set(salt,0);buf.set(iv,16);buf.set(new Uint8Array(ct),28);return btoa(String.fromCharCode(...buf));}
  async function decrypt(b64,pw){var buf=Uint8Array.from(atob(b64),function(c){return c.charCodeAt(0);});var key=await deriveKey(pw,buf.slice(0,16));var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(16,28)},key,buf.slice(28));return new TextDecoder().decode(plain);}
  function load(){try{var v=localStorage.getItem(KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
  function save(d){localStorage.setItem(KEY,JSON.stringify(d));_data=d;}
  return{
    isUnlocked:function(){return _pw!==null;},
    unlock:async function(pw){var data=load();if(data.length){try{await decrypt(data[0].enc,pw);}catch(e){throw new Error('Incorrect password');}} _pw=pw;_data=data;},
    lock:function(){_pw=null;_data=[];},
    list:function(){return _data.map(function(e){return {name:e.name,type:e.type||''};});},
    get:async function(name){var e=_data.find(function(x){return x.name===name;});if(!e)return null;return decrypt(e.enc,_pw);},
    add:async function(name,tok,type){if(_data.find(function(e){return e.name===name;}))throw new Error('Name already exists');var enc=await encrypt(tok,_pw);save(_data.concat([{name:name,enc:enc,type:type||''}]));},
    setType:function(name,type){var d=_data.map(function(e){return e.name===name?{name:e.name,enc:e.enc,type:type}:e;});save(d);},
    del:function(name){save(_data.filter(function(e){return e.name!==name;}));}
  };
})();

var _activeVaultTarget=null;
function toggleVault(target){
  if(_activeVaultTarget===target){_activeVaultTarget=null;document.getElementById('vaultPanel'+target.toUpperCase()).style.display='none';return;}
  _activeVaultTarget=target;
  document.getElementById('vaultPanel'+target.toUpperCase()).style.display='block';
  renderVaultPanel(target);
}
function renderVaultPanel(target){
  var el=document.getElementById('vaultInner'+target.toUpperCase());
  if(!el)return;
  var h='';
  if(!Vault.isUnlocked()){
    h+='<div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:8px">🔒 Unlock Vault</div>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
    h+='<input type="password" id="vaultPw" placeholder="Master password..." autocomplete="new-password" style="flex:1;min-width:160px;padding:8px 12px;border:1px solid #c7d2fe;border-radius:8px;font-size:13px;outline:none" onkeydown="if(event.key===\'Enter\')vaultUnlock(\''+target+'\')"/>';
    h+='<button class="btn-sm" style="background:#4338ca;color:#fff;border-color:#4338ca" onclick="vaultUnlock(\''+target+'\')">Unlock</button>';
    h+='</div><div id="vaultErr" style="font-size:12px;color:#dc2626;margin-top:6px;min-height:16px"></div>';
    h+='<div class="hint" style="margin-top:4px">New vault? Enter any password to create one.</div>';
  } else {
    var tokens=Vault.list();
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    h+='<span style="font-size:13px;font-weight:600;color:#374151">🔓 Select a token</span>';
    h+='<button class="btn-sm" onclick="vaultLockAll()">🔒 Lock</button></div>';
    if(tokens.length){
      h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
      tokens.forEach(function(t){
        var badge=t.type?'<span style="font-size:10px;padding:1px 6px;border-radius:999px;font-weight:700;background:'+(t.type==='gh'?'#e0e7ff':'#d1fae5')+';color:'+(t.type==='gh'?'#3730a3':'#065f46')+';margin-left:4px">'+(t.type==='gh'?'GH':'ZH')+'</span>':'<span style="font-size:10px;color:#f59e0b;font-weight:700;margin-left:4px">⚠ untagged</span>';
        h+='<button class="vault-chip" onclick="vaultUse(\''+target+'\',\''+esc(t.name)+'\')">'+esc(t.name)+badge+' ▶</button>';
      });
      h+='</div>';
    } else {
      h+='<div style="font-size:12px;color:#9ca3af;margin-bottom:8px">No tokens saved yet.</div>';
    }
    h+='<div style="border-top:1px solid #e0e7ff;padding-top:10px">';
    h+='<div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">Save New Token</div>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
    h+='<input type="text" id="vaultNewName_'+target+'" placeholder="Name" style="width:120px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;outline:none"/>';
    h+='<select id="vaultNewType_'+target+'" style="padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;outline:none;color:#374151"><option value="">Type...</option><option value="gh">GitHub (GH)</option><option value="zh">ZenHub (ZH)</option><option value="asana">Asana</option></select>';
    h+='<input type="password" id="vaultNewTok_'+target+'" placeholder="Token value" autocomplete="new-password" style="flex:1;min-width:140px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;outline:none;font-family:monospace"/>';
    h+='<button class="btn-sm" onclick="vaultSave(\''+target+'\')">＋ Save</button></div>';
    h+='<div id="vaultSaveMsg_'+target+'" style="font-size:12px;margin-top:5px;min-height:16px"></div>';
    if(tokens.length){
      h+='<div style="font-size:12px;font-weight:600;color:#374151;margin:10px 0 6px">Manage &amp; Tag</div>';
      h+='<div style="display:flex;flex-direction:column;gap:5px">';
      tokens.forEach(function(t){
        var typeColor=t.type==='gh'?'#3730a3':t.type==='zh'?'#065f46':'#6b7280';
        var typeBg=t.type==='gh'?'#e0e7ff':t.type==='zh'?'#d1fae5':'#f3f4f6';
        h+='<div style="display:flex;align-items:center;gap:8px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:6px 10px">';
        h+='<span style="font-weight:600;font-size:13px;flex:1">'+esc(t.name)+'</span>';
        h+='<span style="font-size:11px;color:#6b7280">Tag as:</span>';
        h+='<select onchange="vaultSetType(\''+esc(t.name)+'\',this.value)" style="font-size:12px;padding:3px 8px;border:1px solid #ddd;border-radius:6px;background:'+typeBg+';color:'+typeColor+';font-weight:700;cursor:pointer;outline:none">';
        h+='<option value=""'+(t.type===''?' selected':'')+'>— untagged —</option>';
        h+='<option value="gh"'+(t.type==='gh'?' selected':'')+'>GitHub (GH)</option>';
        h+='<option value="zh"'+(t.type==='zh'?' selected':'')+'>ZenHub (ZH)</option>';
        h+='</select>';
        h+='<button class="btn-sm" style="border-color:#fca5a5;color:#dc2626;padding:3px 8px;font-size:11px" onclick="vaultDel(\''+target+'\',\''+esc(t.name)+'\')">✕ Delete</button>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  }
  el.innerHTML=h;
}

function lum(h){h=(h||'cccccc').replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var r=parseInt(h.substr(0,2),16)/255,g=parseInt(h.substr(2,2),16)/255,b=parseInt(h.substr(4,2),16)/255;return 0.2126*r+0.7152*g+0.0722*b;}

async function ghFetch(path){var r=await fetch('https://api.github.com'+path,{headers:{'Authorization':'token '+S.ghToken,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}});if(!r.ok)throw new Error('GitHub '+r.status+': '+r.statusText);return r.json();}
async function ghFetchAll(path,maxPages){maxPages=maxPages||10;var results=[],per=100;for(var page=1;page<=maxPages;page++){var sep=path.indexOf('?')!==-1?'&':'?';var batch=await ghFetch(path+sep+'per_page='+per+'&page='+page);if(!Array.isArray(batch)||!batch.length)break;results=results.concat(batch);if(batch.length<per)break;}return results;}
async function ghPatch(path,body){var r=await fetch('https://api.github.com'+path,{method:'PATCH',headers:{'Authorization':'token '+S.ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error('GitHub '+r.status+': '+r.statusText);return r.json();}
async function ghPost(path,body){var r=await fetch('https://api.github.com'+path,{method:'POST',headers:{'Authorization':'token '+S.ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error('GitHub '+r.status+': '+r.statusText);return r.json();}

async function connect(){
  var rp=document.getElementById('reposInput').value.trim();
  hideErr('setupErr');
  if(!S.ghToken||!rp){showErr('setupErr','Please select a project.');return;}
  S.repos=rp.split(',').map(function(r){return r.trim();}).filter(Boolean);
  S.ignored=loadIgnored();S.closedExcIgnored=loadClosedExcIgnored();loadZHCreds();S.repoWorkspaceMap={};
  if(S.activeProfile){
    if(S.activeProfile.type==='group'){(S.activeProfile.repos||[]).forEach(function(r){if(r.zhWorkspace)S.repoWorkspaceMap[r.repo]=r.zhWorkspace;});if(!S.zhWorkspace&&S.activeProfile.repos&&S.activeProfile.repos[0])S.zhWorkspace=S.activeProfile.repos[0].zhWorkspace||'';}
    else if(S.activeProfile.zhWorkspace){S.zhWorkspace=S.activeProfile.zhWorkspace;if(S.repos[0])S.repoWorkspaceMap[S.repos[0]]=S.activeProfile.zhWorkspace;}
    saveZHCreds();
  }
  var btn=document.getElementById('connectBtn');btn.disabled=true;btn.innerHTML='<span class="spin spd"></span>Loading...';
  var cache=loadCache();
  if(cache&&cache.issues&&cache.parentsLoaded){
    S.issues=cache.issues;S.closedIssues=cache.closedIssues||[];S.labelColors=cache.labelColors||{};S.labelNames=cache.labelNames||{};
    var age=Math.round((Date.now()-cache.savedAt)/60000);
    populateFilters();showDash();buildTabs();renderMain();
    setStatus('<span style="color:#fbbf24;font-size:14px;font-weight:700">⏳ Cached ('+age+'m ago) — refreshing...</span>');
    btn.disabled=false;btn.textContent='▶ Load Dashboard';
    bgRefresh();return;
  }
  try{await Promise.all([loadLabelColors(),loadIssues()]);await loadSubIssueParents();await refreshTrackingBodies();saveCache();populateFilters();showDash();buildTabs();renderMain();startAutoRefresh();zhLoad();}
  catch(e){showErr('setupErr',e.message);}
  btn.disabled=false;btn.textContent='▶ Load Dashboard';
}

function zhLoad(){if(!S.zhToken||!S.zhWorkspace)return;S.zhConnected=false;setStatus('<span style="color:#fbbf24">⏳ ZenHub loading...</span>');loadZHData().then(function(){S.zhConnected=true;populateFilters();renderMain();setStatus('<span style="color:#6ee7b7">✓ ZenHub connected</span> &nbsp;<span style="color:#c7d2fe;font-size:12px">'+new Date().toLocaleTimeString()+'</span>');}).catch(function(e){S.zhConnected=false;setStatus('<span style="color:#fca5a5">✕ ZenHub failed: '+esc(e.message)+'</span>');});}
async function bgRefresh(){try{await Promise.all([loadLabelColors(),loadIssues()]);await loadSubIssueParents();await refreshTrackingBodies();saveCache();populateFilters();buildTabs();renderMain();startAutoRefresh();zhLoad();}catch(e){setStatus('<span style="color:#fca5a5">✕ Refresh failed: '+esc(e.message)+'</span>');}}
async function doRefresh(){
  var btn=document.getElementById('refreshBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{localStorage.removeItem(CACHE_KEY);}catch(e){}
  S.zhIssueMap={};S.zhPipelines={};S.repoIds={};S.zhConnected=false;
  try{await Promise.all([loadLabelColors(),loadIssues()]);await loadSubIssueParents();await refreshTrackingBodies();saveCache();populateFilters();buildTabs();renderMain();if(S.zhToken&&S.zhWorkspace)zhLoad();else setStatus('<span style="color:#6ee7b7">✓ Refreshed</span> &nbsp;<span style="color:#c7d2fe;font-size:12px">'+new Date().toLocaleTimeString()+'</span>');}
  catch(e){showErr('dashErr',e.message);}

function startAutoRefresh(){if(S.autoRefreshTimer)clearInterval(S.autoRefreshTimer);S.autoRefreshTimer=setInterval(function(){doRefresh();},15*60*1000);}
function stopAutoRefresh(){if(S.autoRefreshTimer){clearInterval(S.autoRefreshTimer);S.autoRefreshTimer=null;}}

async function loadLabelColors(){for(var i=0;i<S.repos.length;i++){try{var lb=await ghFetch('/repos/'+S.repos[i]+'/labels?per_page=100');lb.forEach(function(l){S.labelColors[l.name.toLowerCase()]=l.color;S.labelNames[l.name.toLowerCase()]=l.name;});}catch(e){}}}
async function loadZHData(){S.zhIssueMap={};S.repos.forEach(function(r){if(!S.repoWorkspaceMap[r]&&S.zhWorkspace)S.repoWorkspaceMap[r]=S.zhWorkspace;});for(var i=0;i<S.repos.length;i++){var repo=S.repos[i],ws=S.repoWorkspaceMap[repo]||S.zhWorkspace;if(!S.zhToken||!ws)continue;try{var rd=await ghFetch('/repos/'+repo);S.repoIds[repo]=rd.id;var bd=await zhGet('/p2/workspaces/'+ws+'/repositories/'+rd.id+'/board');S.zhPipelines[repo]=(bd.pipelines||[]).map(function(p){return {id:p.id,name:p.name};});(bd.pipelines||[]).forEach(function(p){(p.issues||[]).forEach(function(iss){S.zhIssueMap[iss.issue_number+'_'+repo]={pipelineId:p.id,pipelineName:p.name,workspace:ws};});});}catch(e){console.error('ZH',repo,e.message);}}S.issues.forEach(function(i){var m=S.zhIssueMap[i.id+'_'+i.repo];if(m)i.pipeline=m;});await loadZHDeps();}
async function loadZHDeps(){for(var i=0;i<S.repos.length;i++){var repo=S.repos[i],ws=S.repoWorkspaceMap[repo]||S.zhWorkspace,repoId=S.repoIds[repo];if(!S.zhToken||!ws||!repoId)continue;try{var ed=await zhGet('/p2/workspaces/'+ws+'/repositories/'+repoId+'/epics');for(var j=0;j<(ed.epic_issues||[]).length;j++){var ep=ed.epic_issues[j];try{var edet=await zhGet('/p2/workspaces/'+ws+'/repositories/'+(ep.repo_id||repoId)+'/epics/'+ep.issue_number);(edet.issues||[]).forEach(function(child){var cr=repoForId(child.repo_id)||repo;var ci=S.issues.find(function(iss){return iss.id===child.issue_number&&iss.repo===cr;});if(ci)ci.parent={issueNumber:ep.issue_number};});}catch(e){}}}catch(e){}}}
function repoForId(id){return Object.keys(S.repoIds).find(function(r){return S.repoIds[r]===id;})||null;}

async function loadSubIssueParents(){
  var parents=S.issues.filter(function(i){return i.subIssuesTotal>0;});
  console.log('[loadSubIssueParents] found '+parents.length+' parent issues');
  for(var i=0;i<parents.length;i++){
    var p=parents[i];
    try{
      var subs=await ghFetch('/repos/'+p.repo+'/issues/'+p.id+'/sub_issues?per_page=100');
      if(Array.isArray(subs)){
        subs.forEach(function(sub){
          var child=S.issues.find(function(iss){return iss.id===sub.number&&iss.repo===p.repo;});
          if(child)child.parent={issueNumber:p.id};
        });
      }
    }catch(e){console.log('[loadSubIssueParents] failed for #'+p.id+': '+e.message);}
  }
}

async function refreshTrackingBodies(){
  var tracking=S.issues.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs task item';});});
  console.log('[refreshTrackingBodies] refreshing '+tracking.length+' CS Task Item issues');
  for(var i=0;i<tracking.length;i++){
    try{var fresh=await ghFetch('/repos/'+tracking[i].repo+'/issues/'+tracking[i].id);tracking[i].body=fresh.body||'';}
    catch(e){console.error('[refreshTrackingBodies] failed #'+tracking[i].id,e);}
  }
}

async function loadIssues(){
  var open=[],closed=[];
  for(var i=0;i<S.repos.length;i++){
    var repo=S.repos[i];
    var od=await ghFetchAll('/repos/'+repo+'/issues?state=open',10);
    od.forEach(function(iss){
      if(iss.pull_request)return;
      var bodyParent=null;
      if(iss.body){var pm=iss.body.match(/\*\*Parent:\*\*\s*#(\d+)/);if(pm)bodyParent={issueNumber:parseInt(pm[1])};}
      open.push({id:iss.number,repo:repo,title:iss.title,body:iss.body||'',labels:iss.labels.map(function(l){return l.name;}),assignees:iss.assignees.map(function(a){return a.login;}),createdAt:iss.created_at,url:iss.html_url,state:'open',pipeline:null,parent:bodyParent||null,subIssuesTotal:(iss.sub_issues_summary&&iss.sub_issues_summary.total)||0});
    });
    var since60=new Date(Date.now()-60*24*60*60*1000).toISOString();
    var cd=await ghFetch('/repos/'+repo+'/issues?state=closed&sort=updated&direction=desc&per_page=100&labels=cs+task+item&since='+since60);
    if(!Array.isArray(cd))cd=[];
    var taskItems=cd.filter(function(iss){return !iss.pull_request;}).slice(0,100);
    var cd2=await ghFetch('/repos/'+repo+'/issues?state=closed&sort=updated&direction=desc&per_page=50&since='+since60);
    if(!Array.isArray(cd2))cd2=[];
    var count=0;
    var seenIds={};
    taskItems.forEach(function(iss){seenIds[iss.number]=1;});
    for(var j=0;j<taskItems.length;j++){
      var iss=taskItems[j];
      var lbls=iss.labels.map(function(l){return l.name;});
      closed.push({id:iss.number,repo:repo,title:iss.title,body:iss.body||'',labels:lbls,assignees:iss.assignees.map(function(a){return a.login;}),createdAt:iss.created_at,closedAt:iss.closed_at,closedBy:(iss.closed_by&&iss.closed_by.login)||'',url:iss.html_url,state:'closed',pipeline:null,parent:null});
    }
    for(var j=0;j<cd2.length;j++){
      var iss=cd2[j];if(iss.pull_request||seenIds[iss.number])continue;
      var lbls=iss.labels.map(function(l){return l.name;});
      if(!lbls.some(function(l){return CS_LABELS.indexOf(l.toLowerCase())!==-1;}))continue;
      closed.push({id:iss.number,repo:repo,title:iss.title,body:iss.body||'',labels:lbls,assignees:iss.assignees.map(function(a){return a.login;}),createdAt:iss.created_at,closedAt:iss.closed_at,closedBy:(iss.closed_by&&iss.closed_by.login)||'',url:iss.html_url,state:'closed',pipeline:null,parent:null});
      if(++count>=50)break;
    }
  }
  S.issues=open;
  S.closedIssues=closed.sort(function(a,b){return new Date(b.closedAt)-new Date(a.closedAt);});
  document.getElementById('dashTitle').textContent='📋 CentralView '+(S.activeProfile?S.activeProfile.name+' Issues Hub':'Issues Hub');
  document.getElementById('dashMeta').textContent=open.length+' open issues — '+todayStr();
}

// ── Issue logic ───────────────────────────────────────────────────────────────
function getAutoClosedItems(issue){
  if(!issue.labels.some(function(l){return l.toLowerCase()==='cs task item';})||issue.state!=='open')return[];
  var hits=[];
  (issue.body||'').split('\n').forEach(function(line){var chk=line.match(/^\s*-\s*\[x\]\s*(.+)/i);if(chk&&/#\d+/.test(chk[1].trim()))hits.push(chk[1].trim());});
  return hits;
}

function findAutoCheckedParents(issueId){
  var parents=[];
  S.issues.forEach(function(ti){
    if(!ti.labels.some(function(l){return l.toLowerCase()==='cs task item';}))return;
    if(ti.state!=='open')return;
    (ti.body||'').split('\n').forEach(function(line){
      var chk=line.match(/^\s*-\s*\[x\]\s*(.+)/i);if(!chk)return;
      var ref=chk[1].trim();var m=ref.match(/#(\d+)/);
      if(m&&parseInt(m[1])===issueId)parents.push({trackingIssue:ti,lineText:ref,fullLine:line.trim()});
    });
  });
  return parents;
}

function isReferencedInTracking(issueId){
  var found=false;
  var openTracking=S.issues.filter(function(ti){
    return ti.labels.some(function(l){return l.toLowerCase()==='cs task item';});
  });
  var closedTracking=S.closedIssues.filter(function(ti){
    return ti.labels.some(function(l){return l.toLowerCase()==='cs task item';});
  });
  var trackingIssues=openTracking.concat(closedTracking);
  for(var i=0;i<trackingIssues.length;i++){
    var lines=(trackingIssues[i].body||'').split('\n');
    for(var j=0;j<lines.length;j++){
      var mm=lines[j].match(/^\s*-\s*\[[ x]\]\s*(.+)/i);
      if(!mm)continue;
      var rr=mm[1].match(/#(\d+)/);
      if(rr&&parseInt(rr[1])===issueId){found=true;break;}
    }
    if(found)break;
  }
  return found;
}

async function uncheckInParent(trackingIssueId,trackingRepo,childIssueId){
  var ti=S.issues.find(function(i){return i.id===trackingIssueId&&i.repo===trackingRepo;});
  if(!ti){alert('Tracking issue not found in local state.');return;}
  var lines=(ti.body||'').split('\n');
  var changed=false;
  var newLines=lines.map(function(line){
    var chk=line.match(/^(\s*-\s*)\[x\](\s*.+)/i);if(!chk)return line;
    var ref=chk[2];var mm=ref.match(/#(\d+)/);
    if(mm&&parseInt(mm[1])===childIssueId){changed=true;return chk[1]+'[ ]'+chk[2];}
    return line;
  });
  if(!changed){alert('Could not find the checked line to uncheck.');return;}
  try{
    await ghPatch('/repos/'+trackingRepo+'/issues/'+trackingIssueId,{body:newLines.join('\n')});
    ti.body=newLines.join('\n');renderMain();
  }catch(e){alert('Failed to uncheck: '+e.message);}
}

function isClosedException(issue){
  if(issue.state!=='closed')return false;
  if(S.closedExcIgnored.indexOf(issue.id+'_'+issue.repo)!==-1)return false;
  var lbls=issue.labels.map(function(l){return l.toLowerCase();});
  if(lbls.indexOf('cs task item')!==-1)return false;
  var hasCSItem=lbls.indexOf('cs item')!==-1;
  var hasTesting=lbls.indexOf('cs in testing')!==-1;
  var hasCSLabel=lbls.some(function(l){return CS_LABELS.indexOf(l)!==-1;});
  if(!hasCSLabel)return false;
  if(hasCSItem&&!isReferencedInTracking(issue.id))return true;
  if(hasCSItem&&!issue.parent)return true;
  if(hasCSLabel&&!hasTesting)return true;
  return false;
}

function getClosedExceptions(){
  return S.closedIssues.filter(function(i){return isClosedException(i);});
}

function ignoreClosedExc(key){
  if(S.closedExcIgnored.indexOf(key)===-1)S.closedExcIgnored.push(key);
  saveClosedExcIgnored();renderMain();
}

function isExempt(issue){var t=issue.title.toLowerCase();return t.indexOf('cs features')===0||t.indexOf('cs production issues')===0;}

function isNIP(issue){
  return !!(issue.pipeline&&issue.pipeline.pipelineName==='New Issues');
}

// FIX 1: If issue has a parent (set by sub-issue API or body), it is never an exception
// UNLESS it's checked [x] in a tracking issue while still having CS In Testing label.
function isException(issue){
  if(issue.state!=='open')return false;
  if(isExempt(issue))return false;
  // CS Task Items are never exceptions
  if(issue.labels.some(function(l){return l.toLowerCase()==='cs task item';}))return false;
  // Checked [x] in a tracking issue AND currently has cs in testing label → exception regardless of parent
  if(findAutoCheckedParents(issue.id).length>0&&issue.labels.some(function(l){return l.toLowerCase()==='cs in testing';}))return true;
  // Has a verified parent → not an exception (parent resolves all other concerns)
  if(issue.parent)return false;
  // Still in New Issues pipeline
  if(isNIP(issue))return true;
  // CS Item not referenced in any tracking issue
  if(issue.labels.some(function(l){return l.toLowerCase()==='cs item';})&&!isReferencedInTracking(issue.id))return true;
  // Has any CS label but no parent
  if(hasCS(issue))return true;
  return false;
}

function applyFilters(list){var q=(document.getElementById('searchInput').value||'').toLowerCase(),fl=(document.getElementById('filterLabel').value||'').toLowerCase(),fr=document.getElementById('filterRepo').value||'',fp=document.getElementById('filterPipeline').value||'';if(q)list=list.filter(function(i){return i.title.toLowerCase().indexOf(q)!==-1||String(i.id).indexOf(q)!==-1||i.labels.join(' ').toLowerCase().indexOf(q)!==-1||i.repo.toLowerCase().indexOf(q)!==-1||i.assignees.join(' ').toLowerCase().indexOf(q)!==-1;});if(fl)list=list.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()===fl;});});if(fr)list=list.filter(function(i){return i.repo===fr;});if(fp)list=list.filter(function(i){return i.pipeline&&i.pipeline.pipelineName===fp;});return list;}

function sortIssues(list,tab){

function renderStats(){
  var base=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&!isException(i);});

  var stats=[
    {n:base.filter(function(i){return !hasCS(i);}).length,tab:'newitems'},

    {n:tN,tab:'testing'},

async function searchParent(issueId,repo){
  var key=issueId+'_'+repo;
  var q=(document.getElementById('psearch_'+key)||{}).value||'';
  var el=document.getElementById('presults_'+key);if(!el)return;
  if(!q){el.style.display='none';return;}
  el.style.display='block';el.innerHTML='<div style="padding:8px 12px;font-size:12px;color:#9ca3af">Searching...</div>';
  try{
    var results;
    var num=parseInt(q);
    var isExactNum=!isNaN(num)&&String(num)===q.trim();
    if(isExactNum){
      try{var single=await ghFetch('/repos/'+repo+'/issues/'+num);results=single.pull_request?[]:[single];}catch(e){results=[];}
    }
    if(!results||!results.length){
      var searchUrl='/search/issues?q='+encodeURIComponent(q)+'+repo:'+repo+'+is:issue+is:open&per_page=10&sort=updated';
      try{var data=await ghFetch(searchUrl);results=Array.isArray(data.items)?data.items:[];}catch(e){results=[];}
    }

    var h='';

async function setParent(issueId,repo,parentId,parentTitle){
  var issue=S.issues.find(function(i){return i.id===issueId&&i.repo===repo;});
  var succeeded=false;
  try{
    var r=await fetch('https://api.github.com/repos/'+repo+'/issues/'+parentId+'/sub_issues',{
      method:'POST',credentials:'omit',
      headers:{'Authorization':'token '+S.ghToken,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
      body:JSON.stringify({sub_issue_id:issueId})
    });
    if(r.ok){succeeded=true;}
  }catch(e1){}
  if(!succeeded){
    try{
      var childData=await ghFetch('/repos/'+repo+'/issues/'+issueId);
      var existingBody=childData.body||'';
      var parentRef='\n\n**Parent:** #'+parentId+' '+parentTitle;
      if(existingBody.indexOf('**Parent:** #'+parentId)===-1){
        await ghPatch('/repos/'+repo+'/issues/'+issueId,{body:existingBody.trimEnd()+parentRef});
      }
      succeeded=true;
    }catch(e2){alert('Could not set parent: '+e2.message);return;}
  }
  if(issue){issue.parent={issueNumber:parentId};saveCache();}
  // Close the parent panel
  var key=issueId+'_'+repo;
  var panel=document.getElementById('parentpanel_'+key);if(panel)panel.style.display='none';
  _openParentPanel=null;
  renderMain();
}

async function applyRelease(){
  var selected=_releaseIssues.filter(function(i){return i.isCS&&_releaseSelected[i.id]!==false;});
  if(!selected.length){alert('No issues selected.');return;}
  if(!_releaseAssignees.length&&!confirm('No assignees selected. Continue with just adding the CS In Testing label?'))return;

  var btn=document.getElementById('applyReleaseBtn');if(btn){btn.disabled=true;btn.textContent='Applying...';}
  var bar=document.getElementById('releaseStatusBar');if(bar)bar.style.display='block';
  var prog=document.getElementById('releaseProgressBar');
  var txt=document.getElementById('releaseStatusText');
  var spinner=document.getElementById('releaseSpinner');

  var done=0,failed=0,total=selected.length;

  function updateProgress(){
    var pct=Math.round(((done+failed)/total)*100);
    if(prog)prog.style.width=pct+'%';
    if(txt)txt.textContent='Processing '+( done+failed)+' of '+total+'...';
  }

  updateProgress();

  for(var i=0;i<selected.length;i++){
    var issue=selected[i];
    var rowEl=document.getElementById('releaseRowStatus_'+issue.id);
    if(rowEl)rowEl.innerHTML='<span style="font-size:12px;color:#6b7280"><span class="spin spd"></span> Processing...</span>';
    try{
      var newLabels=issue.labels.slice();
      var hasLabel=newLabels.some(function(l){return l.toLowerCase()==='cs in testing';});
      if(!hasLabel){
        var labelName=S.labelNames['cs in testing']||'CS In Testing';
        newLabels.push(labelName);
        await ghPatch('/repos/'+S.repos[0]+'/issues/'+issue.id,{labels:newLabels});
        issue.labels=newLabels;
      }
      if(_releaseAssignees.length){
        await ghPost('/repos/'+S.repos[0]+'/issues/'+issue.id+'/assignees',{assignees:_releaseAssignees});
        issue.assignees=_releaseAssignees.slice();
      }
      done++;
      if(rowEl)rowEl.innerHTML='<span class="badge" style="background:#d1fae5;color:#065f46">✓ Done</span>';
    }catch(e){
      failed++;
      if(rowEl)rowEl.innerHTML='<span class="badge" style="background:#fee2e2;color:#991b1b">✕ Failed</span>';
      console.error('Failed #'+issue.id,e);
    }
    updateProgress();
  }

  if(prog)prog.style.width='100%';
  if(prog)prog.style.background=failed?'#f59e0b':'#059669';
  if(spinner)spinner.style.display='none';
  if(txt){
    txt.style.color=failed?'#d97706':'#059669';
    txt.textContent=done+' issue'+(done!==1?'s':'')+' updated successfully'+(failed?' · '+failed+' failed':'')+'!';
  }
  if(btn){btn.disabled=false;btn.textContent='✓ Apply to Selected';}
  doRefresh();
}

function parseSnapshotIssue(issue){
  var t=0,c=0,o=0,n=0;
  (issue.body||'').split('\n').forEach(function(line){
    var chk=line.match(/^\s*-\s*\[x\]\s*(.+)/i),unk=line.match(/^\s*-\s*\[\s\]\s*(.+)/i);
    if(!chk&&!unk)return;
    var text=(chk||unk)[1].trim();
    if(!/#\d+/.test(text)){n++;return;}
    t++;if(chk)c++;else o++;
  });
  return{id:issue.id,title:issue.title,url:issue.url,total:t,closed:c,open:o,noIssue:n};
}

function getCurrentSnapshot(){
  var tracking=S.issues.filter(function(i){
    if(!i.labels.some(function(l){return l.toLowerCase()==='cs task item';}))return false;
    var t=i.title.trim().toLowerCase();
    if(t.indexOf('cs ')!==0)return false;
    if(t.indexOf('research items')!==-1)return false;
    if(t.indexOf('cs ba ')===0)return false;
    return true;
  });
  if(!tracking.length)return null;
  var rows=[],total=0,closed=0,open=0,noIssue=0,nums=[];
  tracking.forEach(function(issue){
    nums.push(issue.id);var r=parseSnapshotIssue(issue);rows.push(r);
    total+=r.total;closed+=r.closed;open+=r.open;noIssue+=r.noIssue;
  });
  rows.sort(function(a,b){return b.id-a.id;});
  return{date:todayStr(),tracking:nums.join('/'),total:total+noIssue,closed:closed,open:open,noIssue:noIssue,rows:rows};
}

function saveSnap(){var snap=getCurrentSnapshot();if(!snap){alert('No CS Task Item issues found.');return;}var history=loadHistory();if(history.length>0&&history[history.length-1].date===snap.date){if(!confirm('Replace today\'s snapshot?'))return;history[history.length-1]=snap;}else history.push(snap);saveHistory(history);renderReport();}
function delRptRow(idx){if(!confirm('Remove this row?'))return;var h=loadHistory();h.splice(idx,1);saveHistory(h);renderReport();}
function importCSV(){var inp=document.createElement('input');inp.type='file';inp.accept='.csv';inp.onchange=function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){var lines=ev.target.result.split('\n').map(function(l){return l.trim();}).filter(Boolean);if(!lines.length){alert('Empty file.');return;}var start=lines[0].toLowerCase().indexOf('date')!==-1?1:0,imported=[],skipped=0;for(var i=start;i<lines.length;i++){var cols=lines[i].split(',');if(cols.length<5){skipped++;continue;}var row={date:(cols[0]||'').trim(),tracking:(cols[1]||'').trim(),total:parseInt(cols[2])||0,closed:parseInt(cols[3])||0,open:parseInt(cols[4])||0,noIssue:parseInt(cols[5])||0};if(!row.date){skipped++;continue;}imported.push(row);}if(!imported.length){alert('No valid rows found.');return;}var history=loadHistory(),existing={},added=0,dupes=0;history.forEach(function(r){existing[r.date]=1;});imported.forEach(function(r){if(existing[r.date])dupes++;else{history.push(r);added++;}});history.sort(function(a,b){return new Date(a.date)-new Date(b.date);});saveHistory(history);alert('Imported '+added+' row(s).'+(dupes?' Skipped '+dupes+' duplicate(s).':''));renderReport();};reader.readAsText(file);};inp.click();}
function exportCSV(){var history=loadHistory(),rows=['Date,Tracking Issues,Total,Closed,Open,No Issue Raised'];history.forEach(function(row){rows.push([row.date,row.tracking,row.total,row.closed,row.open,row.noIssue||0].join(','));});var blob=new Blob([rows.join('\n')],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cs_report.csv';a.click();}

// ── Mismatch Scanner ──────────────────────────────────────────────────────────
var _scanResults=null,_scanning=false;
async function runMismatchScan(){
  if(_scanning)return;
  _scanning=true;_scanResults=null;renderReport();
  var tracking=S.issues.filter(function(i){
    if(!i.labels.some(function(l){return l.toLowerCase()==='cs task item';}))return false;
    var t=i.title.trim().toLowerCase();
    if(t.indexOf('cs ')!==0)return false;
    if(t.indexOf('research items')!==-1)return false;
    if(t.indexOf('cs ba ')===0)return false;
    return true;
  });
  var mismatches=[];
  for(var ti=0;ti<tracking.length;ti++){
    var track=tracking[ti];
    var lines=(track.body||'').split('\n');
    for(var li=0;li<lines.length;li++){
      var chk=lines[li].match(/^\s*-\s*\[x\]\s*(.+)/i);if(!chk)continue;
      var ref=chk[1].trim();var mm=ref.match(/#(\d+)/);if(!mm)continue;
      var issueNum=parseInt(mm[1]);
      // FIX 2: Always fetch from GitHub to get ground-truth state, don't rely on S.issues only
      var openIssue=S.issues.find(function(i){return i.id===issueNum&&i.repo===track.repo;});
      if(openIssue){
        // It's in our open issues list — definitely still open, flag it
        mismatches.push({trackingIssue:track,childId:issueNum,childRepo:track.repo,childTitle:openIssue.title,childUrl:openIssue.url,lineText:ref,closedButChecked:false});
      } else {
        // Not in open issues — could be closed or just not loaded; fetch directly
        try{
          var data=await ghFetch('/repos/'+track.repo+'/issues/'+issueNum);
          if(data&&data.state==='open'){
            // Open but not in our local list (shouldn't normally happen, but catch it)
            mismatches.push({trackingIssue:track,childId:issueNum,childRepo:track.repo,childTitle:data.title,childUrl:data.html_url,lineText:ref,closedButChecked:false});
          } else if(data&&data.state==='closed'){
            // Closed — check if it was auto-closed by a PR
            var closedByPR=false,closedByUser='',closedAt=data.closed_at||'';
            if(data.closed_by&&data.closed_by.login)closedByUser=data.closed_by.login;
            try{
              var tl=await ghFetch('/repos/'+track.repo+'/issues/'+issueNum+'/timeline?per_page=100');
              if(Array.isArray(tl)){
                tl.forEach(function(ev){
                  if(ev.event==='closed'&&ev.commit_id)closedByPR=true;
                  if(ev.event==='referenced'&&ev.commit_url)closedByPR=true;
                });
              }
            }catch(e){}
            // FIX 2: Report ALL closed issues that are checked, not just PR-closed ones.
            // If closedByPR → note it. If manually closed → also flag (it wasn't verified through the process).
            mismatches.push({
              trackingIssue:track,
              childId:issueNum,
              childRepo:track.repo,
              childTitle:data.title,
              childUrl:data.html_url,
              lineText:ref,
              closedButChecked:true,
              closedByPR:closedByPR,
              closedByUser:closedByUser,
              closedAt:closedAt
            });
          }
        }catch(e){
          // Issue fetch failed — flag it as unknown for manual review
          mismatches.push({
            trackingIssue:track,
            childId:issueNum,
            childRepo:track.repo,
            childTitle:'(could not load)',
            childUrl:'https://github.com/'+track.repo+'/issues/'+issueNum,
            lineText:ref,
            closedButChecked:false,
            fetchError:true
          });
        }
      }
    }
  }
  _scanResults=mismatches;_scanning=false;renderReport();
}

function renderMismatchPanel(){
  var h='<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:20px;border-left:4px solid #f59e0b">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">';
  h+='<div><div style="font-size:15px;font-weight:700;color:#1e1b4b">🔍 Checked Box Mismatch Scanner</div>';
  h+='<div style="font-size:12px;color:#9ca3af;margin-top:2px">Finds all checked boxes — open issues not yet closed, and closed issues to verify they went through proper process</div></div>';
  h+=_scanning?'<div style="font-size:13px;color:#6b7280;display:flex;align-items:center;gap:6px"><span class="spin spd"></span>Scanning...</div>':'<button class="btn-p" onclick="runMismatchScan()" style="font-size:13px;padding:8px 18px">▶ Run Scan</button>';
  h+='</div>';
  if(_scanResults===null&&!_scanning){h+='<div style="font-size:13px;color:#9ca3af">Click Run Scan to check all tracking issues for boxes that may need review.</div>';}
  else if(_scanning){h+='<div style="font-size:13px;color:#9ca3af">Checking each checked item against GitHub...</div>';}
  else if(_scanResults.length===0){h+='<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#059669;font-weight:600"><span style="font-size:1.2rem">✅</span> No mismatches found.</div>';}
  else{
    h+='<div style="font-size:13px;font-weight:700;color:#dc2626;margin-bottom:10px">⚠ '+_scanResults.length+' item'+(+_scanResults.length!==1?'s':'')+' to review:</div>';
    h+='<div style="display:flex;flex-direction:column;gap:8px">';
    _scanResults.forEach(function(r,idx){
      var isStillOpen=!r.closedButChecked&&!r.fetchError;
      var bgColor=isStillOpen?'#fff5f5':r.fetchError?'#fffbeb':'#f5f3ff';
      var borderColor=isStillOpen?'#fca5a5':r.fetchError?'#fcd34d':'#c4b5fd';
      h+='<div style="background:'+bgColor+';border:1px solid '+borderColor+';border-radius:9px;padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">';
      h+='<div style="flex:1;min-width:200px">';
      h+='<div style="font-size:12px;color:#6b7280;margin-bottom:3px">Tracking: <a href="'+esc(r.trackingIssue.url)+'" target="_blank" style="color:#4338ca;font-weight:600">#'+r.trackingIssue.id+' '+esc(r.trackingIssue.title)+'</a></div>';
      h+='<div style="font-size:13px;font-weight:600"><a href="'+esc(r.childUrl)+'" target="_blank" style="color:'+(isStillOpen?'#dc2626':r.fetchError?'#92400e':'#7c3aed')+'">#'+r.childId+'</a> '+esc(r.childTitle)+'</div>';
      if(isStillOpen){
        h+='<div style="font-size:11px;margin-top:4px"><span style="background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:999px;font-weight:600">⚠ Issue is still open but checked off</span></div>';
      } else if(r.fetchError){
        h+='<div style="font-size:11px;margin-top:4px"><span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:999px;font-weight:600">⚠ Could not load issue — review manually</span></div>';
      } else {
        var label=r.closedByPR?'Closed by PR'+(r.closedAt?' on '+new Date(r.closedAt).toLocaleDateString():''):'Manually closed'+(r.closedAt?' on '+new Date(r.closedAt).toLocaleDateString():'');
        h+='<div style="font-size:11px;margin-top:4px"><span style="background:#ede9fe;color:#5b21b6;padding:2px 8px;border-radius:999px;font-weight:600">'+label+' — verify process was followed</span></div>';
      }
      h+='<div style="font-size:11px;color:#9ca3af;margin-top:3px;font-family:monospace">'+esc(r.lineText)+'</div>';
      h+='</div><div style="display:flex;gap:6px;align-items:center;flex-shrink:0">';
      h+='<a href="'+esc(r.childUrl)+'" target="_blank" class="btn-sm" style="font-size:11px;text-decoration:none">👁 View</a>';
      if(!r.fetchError)h+='<button class="btn-sm" style="font-size:11px;border-color:#f59e0b;color:#92400e;background:#fffbeb" onclick="uncheckMismatch('+idx+')">☐ Uncheck</button>';
      h+='<button class="btn-sm" style="font-size:11px;border-color:#d1fae5;color:#065f46;background:#f0fdf4" onclick="dismissMismatch('+idx+')">✓ OK</button>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}

async function uncheckMismatch(idx){var r=_scanResults[idx];if(!r)return;await uncheckInParent(r.trackingIssue.id,r.trackingIssue.repo,r.childId);_scanResults.splice(idx,1);renderReport();}
function dismissMismatch(idx){_scanResults.splice(idx,1);renderReport();}

  var vb=document.getElementById('versionBadge');if(vb)vb.textContent='v '+APP_VERSION;

  var profile=profiles[0];
  S.activeProfile=profile;
  S.repos=profile.type==='group'?(profile.repos||[]).map(function(r){return r.repo;}):[profile.repo];
