<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CS Issue Triage Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh}
p{line-height:1.6}
a{color:#185FA5;text-decoration:none}
a:hover{text-decoration:underline}
input,select{font-family:inherit;font-size:13px;padding:7px 10px;border:0.5px solid #ccc;border-radius:8px;width:100%;outline:none;background:#fff;color:#1a1a18;margin-bottom:8px}
input:focus,select:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,0.12)}
button{font-family:inherit;cursor:pointer;border-radius:8px;font-size:13px;transition:opacity 0.15s}
button:disabled{opacity:0.5;cursor:not-allowed}
.btn{padding:6px 14px;border:0.5px solid #ccc;background:transparent;color:#1a1a18}
.btn:hover:not(:disabled){background:#f0f0ee}
.btn-primary{padding:8px 18px;border:none;background:#185FA5;color:#fff;font-weight:500}
.btn-primary:hover:not(:disabled){background:#0e4a87}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.card{background:#fff;border:0.5px solid #e0e0dc;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.lbl{font-size:12px;color:#666;margin-bottom:2px;display:block;margin-top:10px}
.lbl:first-child{margin-top:0}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;display:inline-block}
.err-box{background:#FCEBEB;border:0.5px solid #E24B4A;border-radius:8px;padding:10px 12px;margin-bottom:10px;color:#A32D2D;font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:8px;border:0.5px solid #e0e0dc;background:transparent;color:#666;font-size:13px}
.tab.active{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters select{width:auto;margin-bottom:0}
.filters label{font-size:12px;color:#666;white-space:nowrap}
.issue-row{display:flex;align-items:flex-start;gap:12px}
.issue-body{flex:1}
.issue-title{font-size:14px;font-weight:500;margin-bottom:4px}
.issue-meta{font-size:12px;color:#888;margin-bottom:6px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.action-box{margin-top:10px;padding:10px 12px;background:#f0f6ff;border:0.5px solid #b5d4f4;border-radius:8px;font-size:13px}
.action-box .action-label{font-size:11px;font-weight:500;color:#185FA5;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.action-box .action-text{color:#1a1a18;line-height:1.6}
.age-ok{color:#3B6D11}
.age-warn{color:#854F0B}
.age-old{color:#A32D2D}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hacts{display:flex;gap:8px;flex-wrap:wrap}
.spin{display:inline-block;width:12px;height:12px;border:2px solid #ccc;border-top-color:#185FA5;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat{background:#fff;border:0.5px solid #e0e0dc;border-radius:10px;padding:12px 14px}
.stat-num{font-size:24px;font-weight:500;margin-bottom:2px}
.stat-lbl{font-size:12px;color:#888}
#setup{display:block}
#dash{display:none}
</style>
</head>
<body>
<div class="wrap">

<div id="setup">
  <div style="margin-bottom:20px">
    <h1 style="font-size:20px;font-weight:500;margin-bottom:6px">CS Issue Triage Dashboard</h1>
    <p style="font-size:13px;color:#666">Focused on customer bugs, feature requests, and failed testing items.</p>
  </div>
  <div class="card">
    <span class="lbl">GitHub personal access token (classic, repo scope)</span>
    <input type="password" id="ghToken" placeholder="ghp_..." />
    <span class="lbl">Anthropic API key</span>
    <input type="password" id="anthroKey" placeholder="sk-ant-..." />
    <span class="lbl">ZenHub API token (optional)</span>
    <input type="password" id="zhToken" placeholder="ZenHub token..." />
    <span class="lbl">ZenHub workspace ID (optional)</span>
    <input type="text" id="workspaceId" placeholder="e.g. 5e8f9c..." />
    <span class="lbl">Repos (comma-separated, owner/repo)</span>
    <input type="text" id="reposInput" placeholder="e.g. myorg/api, myorg/frontend" />
    <div id="setupErr" style="display:none"></div>
    <div style="margin-top:14px">
      <button class="btn-primary" id="connectBtn" onclick="connect()">Connect and fetch issues</button>
    </div>
  </div>
</div>

<div id="dash">
  <div class="hrow">
    <div>
      <h1 style="font-size:20px;font-weight:500">CS Issue Triage</h1>
      <p id="dashMeta" style="font-size:12px;color:#888;margin-top:2px"></p>
    </div>
    <div class="hacts">
      <button class="btn" onclick="showSetup()">Reconnect</button>
      <button class="btn" id="refreshBtn" onclick="refresh()">Refresh</button>
    </div>
  </div>

  <div class="stat-grid" id="statGrid"></div>

  <div class="tabs">
    <button class="tab active" id="tabAll" onclick="switchTab('all')">All issues</button>
    <button class="tab" id="tabBug" onclick="switchTab('bug')">Customer bugs</button>
    <button class="tab" id="tabFeat" onclick="switchTab('feat')">Feature requests</button>
    <button class="tab" id="tabTest" onclick="switchTab('test')">Failed testing</button>
  </div>

  <div class="filters">
    <label>Sort by:</label>
    <select id="sortBy" onchange="renderIssues()">
      <option value="age">Age (oldest first)</option>
      <option value="priority">Priority (critical first)</option>
      <option value="recent">Recently added</option>
    </select>
    <label style="margin-left:8px">Priority:</label>
    <select id="filterPriority" onchange="renderIssues()">
      <option value="all">All priorities</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
  </div>

  <div id="dashErr" style="display:none"></div>
  <div id="issueList"></div>
</div>

</div>
<script>
var S = {
  ghToken: '', anthroKey: '', zhToken: '', workspaceId: '',
  repos: [], issues: [], issueAI: {}, activeTab: 'all'
};

var TYPE_KEYWORDS = {
  bug: ['bug','error','broken','crash','fail','issue','problem','defect','not working','customer report'],
  feat: ['feature','request','enhancement','improve','add','would like','suggestion'],
  test: ['test','testing','failed test','qa','regression','acceptance']
};

var PRCOL = {
  critical: {bg:'#FCEBEB',tx:'#A32D2D'},
  high:     {bg:'#FAECE7',tx:'#993C1D'},
  medium:   {bg:'#FAEEDA',tx:'#854F0B'},
  low:      {bg:'#EAF3DE',tx:'#3B6D11'}
};

var PRIORITY_ORDER = {critical:0,high:1,medium:2,low:3,null:4,undefined:4};

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mkBadge(bg, tx, label) {
  return '<span class="badge" style="background:' + bg + ';color:' + tx + '">' + esc(label) + '</span>';
}

function detectType(issue) {
  var text = (issue.title + ' ' + issue.body + ' ' + issue.labels.join(' ')).toLowerCase();
  if (TYPE_KEYWORDS.test.some(function(k){return text.indexOf(k)!==-1;})) return 'test';
  if (TYPE_KEYWORDS.bug.some(function(k){return text.indexOf(k)!==-1;})) return 'bug';
  if (TYPE_KEYWORDS.feat.some(function(k){return text.indexOf(k)!==-1;})) return 'feat';
  return 'bug';
}

function ageInDays(dateStr) {
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
}

function ageLabel(days) {
  if (days < 3) return {text: days + 'd', cls: 'age-ok'};
  if (days < 7) return {text: days + 'd', cls: 'age-warn'};
  return {text: days + 'd', cls: 'age-old'};
}

function showSetup() {
  document.getElementById('setup').style.display = 'block';
  document.getElementById('dash').style.display = 'none';
}

function showDash() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
}

function showErr(elId, msg) {
  var el = document.getElementById(elId);
  el.className = 'err-box';
  el.textContent = msg;
  el.style.display = 'block';
}

function hideErr(elId) {
  document.getElementById(elId).style.display = 'none';
}

function switchTab(name) {
  S.activeTab = name;
  ['all','bug','feat','test'].forEach(function(t) {
    var tb = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (tb) tb.className = 'tab' + (t === name ? ' active' : '');
  });
  renderIssues();
}

async function ghFetch(path) {
  var r = await fetch('https://api.github.com' + path, {
    headers: {
      'Authorization': 'token ' + S.ghToken,
      'Accept': 'application/vnd.github.v3+json'
    }
  });
  if (!r.ok) {
    if (r.status === 401) throw new Error('401 Unauthorized - check your GitHub token');
    if (r.status === 403) throw new Error('403 Forbidden - token lacks repo permission');
    if (r.status === 404) throw new Error('404 Not Found - check repo name (owner/repo)');
    throw new Error('GitHub error: ' + r.status + ' ' + r.statusText);
  }
  return r.json();
}

async function callClaude(system, userMsg, maxTokens) {
  var r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': S.anthroKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens || 500,
      system: system,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  var d = await r.json();
  var text = (d.content || []).map(function(c) { return c.text || ''; }).join('');
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function connect() {
  var gh = document.getElementById('ghToken').value.trim();
  var ak = document.getElementById('anthroKey').value.trim();
  var zh = document.getElementById('zhToken').value.trim();
  var ws = document.getElementById('workspaceId').value.trim();
  var rp = document.getElementById('reposInput').value.trim();

  hideErr('setupErr');
  if (!gh || !rp) { showErr('setupErr', 'GitHub token and at least one repo are required.'); return; }
  if (!ak) { showErr('setupErr', 'Anthropic API key is required for AI features.'); return; }

  S.ghToken = gh; S.anthroKey = ak; S.zhToken = zh;
  S.workspaceId = ws;
  S.repos = rp.split(',').map(function(r) { return r.trim(); }).filter(Boolean);

  var btn = document.getElementById('connectBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Fetching...';

  try {
    await loadIssues();
    showDash();
  } catch(e) {
    showErr('setupErr', e.message);
  }
  btn.disabled = false;
  btn.textContent = 'Connect and fetch issues';
}

async function loadIssues() {
  var all = [];
  for (var ri = 0; ri < S.repos.length; ri++) {
    var repo = S.repos[ri];
    var data = await ghFetch('/repos/' + repo + '/issues?state=open&per_page=100');
    for (var ii = 0; ii < data.length; ii++) {
      var i = data[ii];
      if (i.pull_request) continue;
      var issue = {
        id: i.number, repo: repo, title: i.title, body: i.body || '',
        labels: i.labels.map(function(l) { return l.name; }),
        assignees: i.assignees.map(function(a) { return a.login; }),
        createdAt: i.created_at, url: i.html_url,
        priority: null, type: null
      };
      issue.type = detectType(issue);
      var lowerLabels = issue.labels.map(function(l){return l.toLowerCase();});
      if (lowerLabels.indexOf('critical') !== -1) issue.priority = 'critical';
      else if (lowerLabels.indexOf('high') !== -1) issue.priority = 'high';
      else if (lowerLabels.indexOf('medium') !== -1) issue.priority = 'medium';
      else if (lowerLabels.indexOf('low') !== -1) issue.priority = 'low';
      all.push(issue);
    }
  }
  S.issues = all;
  S.issueAI = {};
  renderStats();
  renderIssues();
}

async function refresh() {
  var btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Refreshing...';
  try { await loadIssues(); } catch(e) { showErr('dashErr', e.message); }
  btn.disabled = false;
  btn.textContent = 'Refresh';
}

function renderStats() {
  var bugs = S.issues.filter(function(i){return i.type==='bug';}).length;
  var feats = S.issues.filter(function(i){return i.type==='feat';}).length;
  var tests = S.issues.filter(function(i){return i.type==='test';}).length;
  var old = S.issues.filter(function(i){return ageInDays(i.createdAt)>=7;}).length;
  var html = '';
  html += stat(S.issues.length, 'Total open', '#185FA5');
  html += stat(bugs, 'Customer bugs', '#A32D2D');
  html += stat(feats, 'Feature requests', '#854F0B');
  html += stat(tests, 'Failed testing', '#3C3489');
  html += stat(old, '7+ days old', '#888');
  document.getElementById('statGrid').innerHTML = html;
  document.getElementById('dashMeta').textContent =
    S.issues.length + ' open issues across ' + S.repos.length + ' repo' + (S.repos.length !== 1 ? 's' : '');
}

function stat(num, label, color) {
  return '<div class="stat"><div class="stat-num" style="color:' + color + '">' + num + '</div><div class="stat-lbl">' + label + '</div></div>';
}

function getFilteredIssues() {
  var list = S.issues.slice();
  if (S.activeTab !== 'all') {
    list = list.filter(function(i) { return i.type === S.activeTab; });
  }
  var fp = document.getElementById('filterPriority');
  if (fp && fp.value !== 'all') {
    list = list.filter(function(i) { return i.priority === fp.value; });
  }
  var sort = document.getElementById('sortBy');
  var sortVal = sort ? sort.value : 'age';
  if (sortVal === 'age') {
    list.sort(function(a,b){ return new Date(a.createdAt) - new Date(b.createdAt); });
  } else if (sortVal === 'priority') {
    list.sort(function(a,b){ return (PRIORITY_ORDER[a.priority]||4) - (PRIORITY_ORDER[b.priority]||4); });
  } else {
    list.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
  }
  return list;
}

function typeInfo(type) {
  if (type === 'bug') return {bg:'#FCEBEB', tx:'#A32D2D', label:'Customer bug'};
  if (type === 'feat') return {bg:'#FAEEDA', tx:'#854F0B', label:'Feature request'};
  if (type === 'test') return {bg:'#EEEDFE', tx:'#3C3489', label:'Failed testing'};
  return {bg:'#F1EFE8', tx:'#444441', label:'Other'};
}

function renderIssues() {
  var list = getFilteredIssues();
  var html = '';
  if (!list.length) {
    html = '<div class="card" style="text-align:center;padding:2rem;color:#888">No issues found for this filter.</div>';
    document.getElementById('issueList').innerHTML = html;
    return;
  }
  list.forEach(function(i) {
    var days = ageInDays(i.createdAt);
    var age = ageLabel(days);
    var pc = i.priority ? PRCOL[i.priority] : null;
    var tc = typeInfo(i.type);
    var tkey = i.id + '_' + i.repo.replace(/\//g, '__');
    var tr = S.issueAI[tkey];
    html += '<div class="card issue-row">';
    html += '<div class="issue-body">';
    html += '<div class="issue-title"><a href="' + esc(i.url) + '" target="_blank">#' + i.id + ' ' + esc(i.title) + '</a></div>';
    html += '<div class="issue-meta">';
    html += esc(i.repo) + ' &middot; ';
    html += '<span class="' + age.cls + '" style="font-weight:500">' + age.text + ' old</span>';
    if (i.assignees.length) html += ' &middot; ' + esc(i.assignees.join(', '));
    html += '</div>';
    html += '<div class="tags">';
    html += mkBadge(tc.bg, tc.tx, tc.label);
    if (pc) html += mkBadge(pc.bg, pc.tx, i.priority);
    i.labels.forEach(function(l) { html += mkBadge('#E6F1FB','#0C447C',l); });
    html += '</div>';
    if (tr && tr !== 'loading' && !tr.error) {
      html += '<div class="action-box">';
      html += '<div class="action-label">Suggested next action</div>';
      html += '<div class="action-text">' + esc(tr.next_action) + '</div>';
      if (tr.urgency) {
        html += '<div style="margin-top:6px;font-size:12px;color:#666">Urgency: <strong>' + esc(tr.urgency) + '</strong>';
        if (tr.reason) html += ' &mdash; ' + esc(tr.reason);
        html += '</div>';
      }
      html += '</div>';
    }
    if (tr && tr.error) {
      html += '<div class="err-box" style="margin-top:8px">Error: ' + esc(tr.error) + '</div>';
    }
    html += '</div>';
    var loading = tr === 'loading';
    html += '<button class="btn" onclick="suggestAction(\'' + tkey + '\')" ' + (loading ? 'disabled' : '') + '>';
    html += loading ? '<span class="spin"></span>' : 'Suggest action';
    html += '</button>';
    html += '</div>';
  });
  document.getElementById('issueList').innerHTML = html;
}

async function suggestAction(tkey) {
  var parts = tkey.split('_');
  var id = parseInt(parts[0]);
  var repo = parts.slice(1).join('_').replace(/__/g, '/');
  var issue = null;
  for (var i = 0; i < S.issues.length; i++) {
    if (S.issues[i].id === id && S.issues[i].repo === repo) { issue = S.issues[i]; break; }
  }
  if (!issue) return;
  S.issueAI[tkey] = 'loading';
  renderIssues();
  try {
    var days = ageInDays(issue.createdAt);
    var sys = 'You are a customer service manager reviewing software issues. Respond ONLY with a valid JSON object (no markdown, no backticks): {"next_action":"a specific, practical next action the CS team should take (1-2 sentences)","urgency":"immediate or soon or routine","reason":"brief reason for the urgency level"}';
    var msg = 'Issue type: ' + issue.type + '\nTitle: ' + issue.title + '\nBody: ' + issue.body.slice(0,400) + '\nLabels: ' + issue.labels.join(', ') + '\nAge: ' + days + ' days old\nPriority: ' + (issue.priority || 'not set');
    var parsed = await callClaude(sys, msg, 400);
    S.issueAI[tkey] = parsed;
  } catch(e) {
    S.issueAI[tkey] = { error: e.message };
  }
  renderIssues();
}
</script>
</body>
</html>
