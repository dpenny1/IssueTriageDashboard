<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CIS CS Issue Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#1a1a18}
p{line-height:1.6}
a{color:#185FA5;text-decoration:none}
a:hover{text-decoration:underline}
input,select{font-family:inherit;font-size:13px;padding:7px 10px;border:0.5px solid #ccc;border-radius:8px;width:100%;outline:none;background:#fff;color:#1a1a18;margin-bottom:8px}
input:focus,select:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,0.08)}
button{font-family:inherit;cursor:pointer;border-radius:8px;font-size:13px;transition:all 0.15s}
button:disabled{opacity:0.5;cursor:not-allowed}
.btn{padding:6px 14px;border:0.5px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:#fff}
.btn:hover:not(:disabled){background:rgba(255,255,255,0.25)}
.btn-plain{padding:6px 14px;border:0.5px solid #ccc;background:transparent;color:#1a1a18}
.btn-plain:hover:not(:disabled){background:#f0f0ee}
.btn-primary{padding:8px 18px;border:none;background:#185FA5;color:#fff;font-weight:500}
.btn-primary:hover:not(:disabled){background:#0e4a87}
.btn-sm{padding:4px 10px;font-size:12px;border:0.5px solid #ccc;background:transparent;color:#666}
.btn-sm:hover:not(:disabled){background:#f0f0ee}
.btn-ignore{padding:4px 10px;font-size:12px;border:0.5px solid #e0e0dc;background:transparent;color:#999}
.btn-ignore:hover{background:#f5f5f3;color:#666}
.wrap{max-width:1140px;margin:0 auto;padding:1.5rem 1rem}
.page-header{background:linear-gradient(90deg,#185FA5,#7F77DD,#1D9E75);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.page-header h1{color:#fff;font-size:22px;font-weight:500;letter-spacing:0.02em}
.page-header p{color:rgba(255,255,255,0.75);font-size:12px;margin-top:2px}
.card{background:#fff;border:none;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.setup-card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.lbl{font-size:12px;color:#666;margin-bottom:2px;display:block;margin-top:10px}
.lbl:first-child{margin-top:0}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;display:inline-block}
.err-box{background:#FCEBEB;border:0.5px solid #E24B4A;border-radius:8px;padding:10px 12px;margin-bottom:10px;color:#A32D2D;font-size:13px}
.warn-inline{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:6px;background:#FAEEDA;color:#854F0B;font-weight:500}
.missing-parent{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:6px;background:#FCEBEB;color:#A32D2D;font-weight:500}
.parent-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:6px;background:#E6F1FB;color:#0C447C;font-weight:500}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:8px;border:none;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.85);font-size:13px}
.tab:hover{background:rgba(255,255,255,0.25);color:#fff}
.tab.active{background:#fff;color:#185FA5;font-weight:500}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat{background:#fff;border:none;border-radius:10px;padding:12px 14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:transform 0.15s,box-shadow 0.15s}
.stat:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.18)}
.stat-num{font-size:26px;font-weight:500;margin-bottom:2px}
.stat-lbl{font-size:12px;color:#888}
.issue-row{display:flex;align-items:flex-start;gap:10px}
.issue-body{flex:1;min-width:0}
.issue-title{font-size:14px;font-weight:500;margin-bottom:4px}
.issue-meta{font-size:12px;color:#888;margin-bottom:6px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.age-ok{color:#3B6D11;font-weight:500}
.age-warn{color:#854F0B;font-weight:500}
.age-old{color:#A32D2D;font-weight:500}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-right:5px}
.spin-dark{border:2px solid #ccc;border-top-color:#185FA5}
@keyframes sp{to{transform:rotate(360deg)}}
.progress-wrap{margin-top:10px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px}
.progress-bar{height:6px;background:#e0e0dc;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:#185FA5}
.checklist-section{margin-top:8px;padding:10px 12px;background:#f9f9f7;border:0.5px solid #e0e0dc;border-radius:8px}
.checklist-section-title{font-size:12px;font-weight:500;color:#666;margin-bottom:6px}
.checklist-item{font-size:12px;padding:3px 0;display:flex;align-items:flex-start;gap:6px;line-height:1.5}
.checklist-item.done-pr span.item-text{text-decoration:line-through;color:#888}
.checklist-item.done-manual span.item-text{text-decoration:line-through;color:#888}
.report-table{width:100%;border-collapse:collapse;font-size:13px}
.report-table th{text-align:left;padding:8px 12px;border-bottom:1px solid #e0e0dc;font-weight:500;color:#666;font-size:12px;white-space:nowrap}
.report-table td{padding:8px 12px;border-bottom:0.5px solid #f0f0ee;vertical-align:middle}
.report-table tr:last-child td{border-bottom:none}
.report-table tr:hover td{background:#f9f9f7}
.report-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.pos{color:#3B6D11}
.neg{color:#A32D2D}
.report-actions{display:flex;gap:8px;margin-bottom:16px}
#setup{display:block}
#dash{display:none}
</style>
</head>
<body>
<div class="wrap">

<div id="setup">
  <div style="margin-bottom:20px">
    <div style="background:linear-gradient(90deg,#185FA5,#7F77DD,#1D9E75);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:20px">
      <h1 style="color:#fff;font-size:22px;font-weight:500">CIS CS Issue Hub</h1>
      <p style="color:rgba(255,255,255,0.75);font-size:13px;margin-top:4px">Connect your GitHub and ZenHub to get started.</p>
    </div>
  </div>
  <div class="setup-card">
    <span class="lbl">GitHub personal access token (classic, repo scope)</span>
    <input type="password" id="ghToken" placeholder="ghp_..."/>
    <span class="lbl">ZenHub API token (optional)</span>
    <input type="password" id="zhToken" placeholder="ZenHub token..."/>
    <span class="lbl">ZenHub workspace ID (optional)</span>
    <input type="text" id="workspaceId" placeholder="e.g. 5e8f9c..."/>
    <span class="lbl">Repos (comma-separated, owner/repo)</span>
    <input type="text" id="reposInput" placeholder="e.g. myorg/api, myorg/frontend"/>
    <div id="setupErr" style="display:none"></div>
    <div style="margin-top:14px">
      <button class="btn-primary" id="connectBtn" onclick="connect()">Connect and fetch issues</button>
    </div>
  </div>
</div>

<div id="dash">
  <div class="page-header">
    <div>
      <h1>CIS CS Issue Hub</h1>
      <p id="dashMeta"></p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="showSetup()">Reconnect</button>
      <button class="btn" id="refreshBtn" onclick="doRefresh()">Refresh</button>
    </div>
  </div>

  <div class="stat-grid" id="statGrid"></div>

  <div class="tabs">
    <button class="tab active" id="tabTracking" onclick="switchTab('tracking')">CS Tracking</button>
    <button class="tab" id="tabPatches" onclick="switchTab('patches')">Patches</button>
    <button class="tab" id="tabTesting" onclick="switchTab('testing')">CS In Testing</button>
    <button class="tab" id="tabItems" onclick="switchTab('items')">CS Task Items</button>
    <button class="tab" id="tabInbox" onclick="switchTab('inbox')">Inbox</button>
    <button class="tab" id="tabIgnored" onclick="switchTab('ignored')">Ignored <span id="ignoredCount"></span></button>
    <button class="tab" id="tabReport" onclick="switchTab('report')">Weekly Report</button>
    <button class="tab" id="tabQa" onclick="switchTab('qa')">QA Tracking</button>
  </div>

  <div id="dashErr" style="display:none;margin-bottom:12px"></div>
  <div id="issueList"></div>
  <div id="reportView" style="display:none"></div>
  <div id="qaView" style="display:none"></div>
</div>

</div>
<script>
var S = {
  ghToken:'', zhToken:'', workspaceId:'',
  repos:[], issues:[], ignored:[], activeTab:'tracking',
  expanded:{}, labelColors:{}, epicCache:{}
};

var STORAGE_KEY = 'cis_cs_hub_report_v1';
var IGNORED_KEY = 'cis_cs_hub_ignored_v1';
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var CS_LABELS = ['cs tracking','uat patch','production patch','cs in testing','cs task item'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function luminance(hex){
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=parseInt(hex.substr(0,2),16)/255;
  var g=parseInt(hex.substr(2,2),16)/255;
  var b=parseInt(hex.substr(4,2),16)/255;
  return 0.2126*r+0.7152*g+0.0722*b;
}
function textForBg(hex){return luminance(hex)>0.4?'#1a1a18':'#ffffff';}

function mkBadge(bg,label){
  var tx=textForBg(bg);
  return '<span class="badge" style="background:#'+bg+';color:'+tx+'">'+esc(label)+'</span>';
}

function labelBadge(name){
  var key=name.toLowerCase();
  var color=S.labelColors[key]||'cccccc';
  return mkBadge(color,name);
}

function ageInDays(d){return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function ageLabel(days){
  if(days<3) return {text:days+'d',cls:'age-ok'};
  if(days<7) return {text:days+'d',cls:'age-warn'};
  return {text:days+'d',cls:'age-old'};
}
function todayStr(){var d=new Date();return (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}

function isReportTracking(title){
  var t=title.toLowerCase();
  return t.indexOf('cs ')===0&&t.indexOf('research')===-1&&!isQATracking(title);
}
function isQATracking(title){
  var t=title.toLowerCase();
  if(t.indexOf('cs features')===0){
    var now=new Date();
    var thisMonth=MONTHS[now.getMonth()].toLowerCase();
    var lastMonth=MONTHS[(now.getMonth()+11)%12].toLowerCase();
    return t.indexOf(thisMonth)!==-1||t.indexOf(lastMonth)!==-1;
  }
  return false;
}

function parseChecklists(body){
  var sections=[],cur=null;
  var lines=(body||'').split('\n');
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    var hm=line.match(/^#{1,3}\s+(.+)/);
    if(hm){if(cur) sections.push(cur);cur={title:hm[1].trim(),items:[]};continue;}
    var chk=line.match(/^\s*-\s*\[x\]\s*(.+)/i);
    var unk=line.match(/^\s*-\s*\[\s\]\s*(.+)/i);
    if(chk||unk){
      if(!cur) cur={title:'General',items:[]};
      var text=(chk||unk)[1].trim();
      var hasIssue=/#\d+/.test(text);
      var hasPR=!!text.match(/\bpr\b|\bpull request\b|merged|closes|closed via/i);
      cur.items.push({text:text,checked:!!chk,hasIssue:hasIssue,hasPR:hasPR});
    }
  }
  if(cur) sections.push(cur);
  return sections.filter(function(s){return s.items.length>0;});
}

function checklistStats(sections){
  var total=0,checkedPR=0,checkedManual=0,withIssue=0,future=0;
  sections.forEach(function(s){s.items.forEach(function(item){
    total++;
    if(item.checked){if(item.hasPR)checkedPR++;else checkedManual++;}
    if(item.hasIssue)withIssue++;
    if(!item.hasIssue&&!item.checked)future++;
  });});
  return {total:total,checked:checkedPR+checkedManual,checkedPR:checkedPR,checkedManual:checkedManual,withIssue:withIssue,future:future,open:total-checkedPR-checkedManual};
}

function loadIgnored(){try{var v=localStorage.getItem(IGNORED_KEY);return v?JSON.parse(v):[];}catch(e){return [];}}
function saveIgnored(){try{localStorage.setItem(IGNORED_KEY,JSON.stringify(S.ignored));}catch(e){}}
function loadHistory(){try{var v=localStorage.getItem(STORAGE_KEY);return v?JSON.parse(v):[];}catch(e){return [];}}
function saveHistory(h){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(h));}catch(e){}}

function hasCSLabel(issue){return issue.labels.some(function(l){return CS_LABELS.indexOf(l.toLowerCase())!==-1;});}

function showSetup(){document.getElementById('setup').style.display='block';document.getElementById('dash').style.display='none';}
function showDash(){document.getElementById('setup').style.display='none';document.getElementById('dash').style.display='block';}
function showErr(elId,msg){var el=document.getElementById(elId);el.className='err-box';el.textContent=msg;el.style.display='block';}
function hideErr(elId){document.getElementById(elId).style.display='none';}

function switchTab(name){
  S.activeTab=name;
  ['tracking','patches','testing','items','inbox','ignored','report','qa'].forEach(function(t){
    var el=document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.className='tab'+(t===name?' active':'');
  });
  var isSpecial=name==='report'||name==='qa';
  document.getElementById('issueList').style.display=isSpecial?'none':'block';
  document.getElementById('reportView').style.display=name==='report'?'block':'none';
  document.getElementById('qaView').style.display=name==='qa'?'block':'none';
  if(name==='report') renderReport();
  else if(name==='qa') renderQA();
  else renderIssues();
}

async function ghFetch(path){
  var r=await fetch('https://api.github.com'+path,{headers:{'Authorization':'token '+S.ghToken,'Accept':'application/vnd.github.v3+json'}});
  if(!r.ok) throw new Error('GitHub '+r.status+': '+r.statusText+' ('+path+')');
  return r.json();
}

async function loadLabelColors(){
  for(var ri=0;ri<S.repos.length;ri++){
    try{
      var labels=await ghFetch('/repos/'+S.repos[ri]+'/labels?per_page=100');
      labels.forEach(function(l){S.labelColors[l.name.toLowerCase()]=l.color;});
    }catch(e){}
  }
}

async function loadEpics(){
  if(!S.zhToken||!S.workspaceId) return;
  for(var ri=0;ri<S.repos.length;ri++){
    try{
      var repo=S.repos[ri];
      var repoData=await ghFetch('/repos/'+repo);
      var repoId=repoData.id;
      var epicsRes=await fetch('https://api.zenhub.com/p2/workspaces/'+S.workspaceId+'/repositories/'+repoId+'/epics',{
        headers:{'X-Authentication-Token':S.zhToken}
      });
      if(!epicsRes.ok) continue;
      var epicsData=await epicsRes.json();
      var epicList=epicsData.epic_issues||[];
      for(var ei=0;ei<epicList.length;ei++){
        var epicNum=epicList[ei].issue_number;
        try{
          var epicIssue=await ghFetch('/repos/'+repo+'/issues/'+epicNum);
          var epicDetail=await fetch('https://api.zenhub.com/p2/workspaces/'+S.workspaceId+'/repositories/'+repoId+'/epics/'+epicNum,{
            headers:{'X-Authentication-Token':S.zhToken}
          });
          if(!epicDetail.ok) continue;
          var epicDetailData=await epicDetail.json();
          var children=epicDetailData.issues||[];
          children.forEach(function(child){
            var key=child.issue_number+'_'+repo;
            S.epicCache[key]={epicNum:epicNum,epicTitle:epicIssue.title};
          });
        }catch(e){}
      }
    }catch(e){}
  }
}

async function connect(){
  var gh=document.getElementById('ghToken').value.trim();
  var zh=document.getElementById('zhToken').value.trim();
  var ws=document.getElementById('workspaceId').value.trim();
  var rp=document.getElementById('reposInput').value.trim();
  hideErr('setupErr');
  if(!gh||!rp){showErr('setupErr','GitHub token and at least one repo are required.');return;}
  S.ghToken=gh; S.zhToken=zh; S.workspaceId=ws;
  S.repos=rp.split(',').map(function(r){return r.trim();}).filter(Boolean);
  S.ignored=loadIgnored();
  var btn=document.getElementById('connectBtn');
  btn.disabled=true; btn.innerHTML='<span class="spin spin-dark"></span>Fetching...';
  try{
    await loadLabelColors();
    await loadIssues();
    if(S.zhToken&&S.workspaceId) await loadEpics();
    showDash();
    renderIssues();
  }catch(e){showErr('setupErr',e.message);}
  btn.disabled=false; btn.textContent='Connect and fetch issues';
}

async function loadIssues(){
  var all=[];
  for(var ri=0;ri<S.repos.length;ri++){
    var repo=S.repos[ri];
    var data=await ghFetch('/repos/'+repo+'/issues?state=open&per_page=100');
    for(var ii=0;ii<data.length;ii++){
      var i=data[ii];
      if(i.pull_request) continue;
      all.push({id:i.number,repo:repo,title:i.title,body:i.body||'',
        labels:i.labels.map(function(l){return l.name;}),
        assignees:i.assignees.map(function(a){return a.login;}),
        createdAt:i.created_at,url:i.html_url});
    }
  }
  S.issues=all;
  captureWeeklySnapshot();
  renderStats();
  updateIgnoredCount();
  document.getElementById('dashMeta').textContent=
    all.length+' open issues across '+S.repos.length+' repo'+(S.repos.length!==1?'s':'')+' — loaded '+todayStr();
}

async function doRefresh(){
  var btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Refreshing...';
  try{
    await loadLabelColors();
    await loadIssues();
    if(S.zhToken&&S.workspaceId){S.epicCache={};await loadEpics();}
    renderIssues();
  }catch(e){showErr('dashErr',e.message);}
  btn.disabled=false; btn.textContent='Refresh';
}

function getReportTrackingIssues(){
  return S.issues.filter(function(i){
    return i.labels.some(function(l){return l.toLowerCase()==='cs tracking';})&&isReportTracking(i.title);
  });
}

function captureWeeklySnapshot(){
  var tracking=getReportTrackingIssues();
  if(!tracking.length) return;
  var totalTasks=0,checkedPR=0,checkedManual=0,future=0;
  var issueNums=[];
  tracking.forEach(function(issue){
    issueNums.push(issue.id);
    var stats=checklistStats(parseChecklists(issue.body));
    totalTasks+=stats.total; checkedPR+=stats.checkedPR; checkedManual+=stats.checkedManual; future+=stats.future;
  });
  var checked=checkedPR+checkedManual;
  var history=loadHistory();
  var today=todayStr();
  var row={date:today,tracking:issueNums.join('/'),total:totalTasks,closed:checked,closedPR:checkedPR,closedManual:checkedManual,noIssue:future,open:totalTasks-checked};
  if(history.length>0&&history[history.length-1].date===today) history[history.length-1]=row;
  else history.push(row);
  saveHistory(history);
}

function getTabIssues(){
  var t=S.activeTab;
  if(t==='ignored') return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)!==-1;});
  var base=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;});
  if(t==='tracking') return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs tracking';});});
  if(t==='patches') return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='uat patch'||l.toLowerCase()==='production patch';});});
  if(t==='testing') return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});});
  if(t==='items') return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs task item';});});
  if(t==='inbox') return base.filter(function(i){return !hasCSLabel(i);});
  return base;
}

function renderStats(){
  var all=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;});
  var tracking=all.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs tracking';});});
  var patches=all.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='uat patch'||l.toLowerCase()==='production patch';});});
  var testing=all.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});});
  var items=all.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs task item';});});
  var inbox=all.filter(function(i){return !hasCSLabel(i);});
  var noParent=all.filter(function(i){
    return hasCSLabel(i)&&S.zhToken&&!S.epicCache[i.id+'_'+i.repo];
  });
  var html='';
  html+=stat(tracking.length,'CS Tracking','#185FA5','tracking');
  html+=stat(patches.length,'Patches','#E24B4A','patches');
  html+=stat(testing.length,'CS In Testing','#7F77DD','testing');
  html+=stat(items.length,'CS Task Items','#1D9E75','items');
  html+=stat(inbox.length,'Inbox','#888','inbox');
  if(S.zhToken) html+=stat(noParent.length,'Missing Parent','#E24B4A','tracking');
  document.getElementById('statGrid').innerHTML=html;
}

function stat(num,label,color,tab){
  return '<div class="stat" onclick="switchTab(\''+tab+'\')" title="View '+esc(label)+'"><div class="stat-num" style="color:'+color+'">'+num+'</div><div class="stat-lbl">'+esc(label)+'</div></div>';
}

function updateIgnoredCount(){
  var el=document.getElementById('ignoredCount');
  if(el) el.textContent=S.ignored.length?'('+S.ignored.length+')':'';
}

function ignoreIssue(tkey){
  if(S.ignored.indexOf(tkey)===-1) S.ignored.push(tkey);
  saveIgnored(); renderStats(); renderIssues(); updateIgnoredCount();
}
function unignoreIssue(tkey){
  S.ignored=S.ignored.filter(function(k){return k!==tkey;});
  saveIgnored(); renderStats(); renderIssues(); updateIgnoredCount();
}
function toggleExpand(tkey){S.expanded[tkey]=!S.expanded[tkey];renderIssues();}

function renderChecklist(issue,tkey){
  var sections=parseChecklists(issue.body);
  var stats=checklistStats(sections);
  if(stats.total===0) return '';
  var pct=Math.round((stats.checked/stats.total)*100);
  var html='<div class="progress-wrap">';
  html+='<div class="progress-label"><span>'+stats.checked+'/'+stats.total+' complete</span><span>'+pct+'%</span></div>';
  html+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  html+='<div style="font-size:11px;color:#888;margin-top:5px;display:flex;gap:12px;flex-wrap:wrap">';
  html+='<span style="color:#3B6D11">&#10003; '+stats.checkedPR+' via PR</span>';
  html+='<span style="color:#854F0B">&#10003; '+stats.checkedManual+' manual approval</span>';
  html+='<span>'+stats.withIssue+' open with issue</span>';
  html+='<span style="color:#aaa">'+stats.future+' future</span>';
  html+='</div></div>';
  if(sections.length){
    html+='<div style="margin-top:8px"><button class="btn-sm" onclick="toggleExpand(\''+tkey+'\')">'+(S.expanded[tkey]?'Hide checklist':'Show checklist')+'</button></div>';
    if(S.expanded[tkey]){
      sections.forEach(function(sec){
        html+='<div class="checklist-section"><div class="checklist-section-title">'+esc(sec.title)+'</div>';
        sec.items.forEach(function(item){
          var cls,icon,tag='';
          if(item.checked&&item.hasPR){cls='done-pr';icon='&#10003;';tag='<span class="badge" style="background:#EAF3DE;color:#27500A;margin-left:4px">PR</span>';}
          else if(item.checked){cls='done-manual';icon='&#10003;';tag='<span class="badge" style="background:#FAEEDA;color:#633806;margin-left:4px">manual</span>';}
          else if(!item.hasIssue){cls='future';icon='&#9675;';}
          else{cls='open-issue';icon='&#9679;';}
          html+='<div class="checklist-item '+cls+'"><span>'+icon+'</span><span class="item-text">'+esc(item.text)+'</span>'+tag+'</div>';
        });
        html+='</div>';
      });
    }
  }
  return html;
}

function epicHtml(issue){
  if(!S.zhToken) return '';
  var key=issue.id+'_'+issue.repo;
  var epic=S.epicCache[key];
  if(epic){
    return '<span class="parent-badge">&#9670; #'+epic.epicNum+' '+esc(epic.epicTitle)+'</span> ';
  }
  if(S.ignored.indexOf(key)===-1){
    return '<span class="missing-parent">&#9888; No parent epic</span> ';
  }
  return '';
}

function renderIssues(){
  var list=getTabIssues();
  if(!list.length){
    document.getElementById('issueList').innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#888">No issues here.</div>';
    return;
  }
  list.sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
  var html='';
  list.forEach(function(issue){
    var days=ageInDays(issue.createdAt);
    var age=ageLabel(days);
    var tkey=issue.id+'_'+issue.repo.replace(/\//g,'__');
    var ikey=issue.id+'_'+issue.repo;
    var isIgnored=S.ignored.indexOf(ikey)!==-1;
    var isTracking=issue.labels.some(function(l){return l.toLowerCase()==='cs tracking';});
    var isReport=isTracking&&isReportTracking(issue.title);
    var isQA=isTracking&&isQATracking(issue.title);

    html+='<div class="card issue-row">';
    html+='<div class="issue-body">';
    html+='<div class="issue-title"><a href="'+esc(issue.url)+'" target="_blank">#'+issue.id+' '+esc(issue.title)+'</a>';
    if(isReport) html+=' <span class="badge" style="background:#185FA5;color:#fff">in report</span>';
    if(isQA) html+=' <span class="badge" style="background:#7F77DD;color:#fff">QA tracking</span>';
    html+='</div>';
    html+='<div class="issue-meta" style="display:flex;flex-wrap:wrap;align-items:center;gap:6px">';
    html+='<span>'+esc(issue.repo)+'</span> <span>&middot;</span> <span class="'+age.cls+'">'+age.text+' old</span>';
    if(issue.assignees.length) html+='<span>&middot;</span><span>'+esc(issue.assignees.join(', '))+'</span>';
    html+='</div>';
    html+='<div class="tags" style="margin-top:6px">';
    html+=epicHtml(issue);
    issue.labels.forEach(function(l){html+=labelBadge(l);});
    html+='</div>';
    if(isTracking) html+=renderChecklist(issue,tkey);
    html+='</div>';
    html+='<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">';
    if(!isIgnored){
      html+='<button class="btn-ignore" onclick="ignoreIssue(\''+ikey+'\')">Ignore</button>';
    } else {
      html+='<button class="btn-sm" onclick="unignoreIssue(\''+ikey+'\')">Restore</button>';
    }
    html+='</div>';
    html+='</div>';
  });
  document.getElementById('issueList').innerHTML=html;
}

function renderReport(){
  var history=loadHistory();
  var el=document.getElementById('reportView');
  if(!history.length){
    el.innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#888">No history yet — captured automatically on each load.</div>';
    return;
  }
  var html='<div class="report-actions">';
  html+='<button class="btn-plain btn-sm" onclick="exportCSV()">Export CSV</button>';
  html+='<button class="btn-plain btn-sm" onclick="clearHistory()" style="color:#A32D2D;border-color:#E24B4A">Clear history</button>';
  html+='</div>';
  html+='<div class="card" style="overflow-x:auto"><table class="report-table"><thead><tr>';
  html+='<th>Date</th><th>Tracking issues</th><th class="num">Total tasks</th><th class="num">Net change</th><th class="num">Closed</th><th class="num">Via PR</th><th class="num">Manual approval</th><th class="num">No issue raised</th><th class="num">Open</th>';
  html+='</tr></thead><tbody>';
  for(var i=0;i<history.length;i++){
    var row=history[i];
    var prev=i>0?history[i-1]:null;
    var net=prev!==null?row.total-prev.total:null;
    var netStr=net===null?'&mdash;':(net>0?'<span class="pos">+'+net+'</span>':(net<0?'<span class="neg">'+net+'</span>':'0'));
    html+='<tr><td>'+esc(row.date)+'</td><td style="font-size:12px;color:#666">'+esc(row.tracking)+'</td>';
    html+='<td class="num">'+row.total+'</td><td class="num">'+netStr+'</td>';
    html+='<td class="num">'+row.closed+'</td>';
    html+='<td class="num" style="color:#3B6D11">'+(row.closedPR||0)+'</td>';
    html+='<td class="num" style="color:#854F0B">'+(row.closedManual||0)+'</td>';
    html+='<td class="num">'+row.noIssue+'</td><td class="num">'+row.open+'</td></tr>';
  }
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

function renderQA(){
  var el=document.getElementById('qaView');
  var qaIssues=S.issues.filter(function(i){
    return i.labels.some(function(l){return l.toLowerCase()==='cs tracking';})&&isQATracking(i.title);
  });
  if(!qaIssues.length){
    el.innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#888">No QA tracking issues found for this month or last month.</div>';
    return;
  }
  var html='';
  qaIssues.forEach(function(issue){
    var tkey=issue.id+'_'+issue.repo.replace(/\//g,'__');
    var stats=checklistStats(parseChecklists(issue.body));
    var pct=stats.total>0?Math.round((stats.checked/stats.total)*100):0;
    html+='<div class="card">';
    html+='<div style="font-size:14px;font-weight:500;margin-bottom:12px"><a href="'+esc(issue.url)+'" target="_blank">#'+issue.id+' '+esc(issue.title)+'</a></div>';
    if(stats.total>0){
      html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:12px">';
      html+=miniStat(stats.total,'Total','#185FA5');
      html+=miniStat(stats.checked,'Closed','#3B6D11');
      html+=miniStat(stats.checkedPR,'Via PR','#27500A');
      html+=miniStat(stats.checkedManual,'Manual approval','#854F0B');
      html+=miniStat(stats.open,'Open','#A32D2D');
      html+=miniStat(stats.future,'Future','#888');
      html+='</div>';
      html+='<div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
      html+=renderChecklist(issue,tkey);
    }else{
      html+='<p style="color:#888;font-size:13px">No checklist items found.</p>';
    }
    html+='</div>';
  });
  el.innerHTML=html;
}

function miniStat(num,label,color){
  return '<div style="background:#f9f9f7;border:0.5px solid #e0e0dc;border-radius:8px;padding:8px 10px"><div style="font-size:20px;font-weight:500;color:'+color+'">'+num+'</div><div style="font-size:11px;color:#888">'+esc(label)+'</div></div>';
}

function exportCSV(){
  var history=loadHistory();
  var rows=['Date,Tracking Issues,Total Tasks,Net Change,Closed,Via PR,Manual Approval,No Issue Raised,Open'];
  for(var i=0;i<history.length;i++){
    var row=history[i];
    var prev=i>0?history[i-1]:null;
    var net=prev!==null?row.total-prev.total:'';
    rows.push([row.date,row.tracking,row.total,net,row.closed,row.closedPR||0,row.closedManual||0,row.noIssue,row.open].join(','));
  }
  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='cis_cs_report.csv';
  a.click();
}

function clearHistory(){
  if(!confirm('Clear all report history? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderReport();
}
</script>
