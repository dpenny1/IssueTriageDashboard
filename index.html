<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CentralView</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#f9fafb;color:#1a1a1a;min-height:100vh;font-size:15px}
.hdr{background:linear-gradient(135deg,#1e1b4b 0%,#4338ca 60%,#6366f1 100%);padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{color:#fff;font-size:1.3rem;font-weight:800;margin:0}
.hdr p{color:#c7d2fe;font-size:0.85rem;margin-top:2px}
.btn-w{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);border-radius:9px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.btn-w:hover{background:rgba(255,255,255,0.32);transform:translateY(-1px)}
.main{padding:40px 24px}
.grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;max-width:900px;margin:0 auto}
.card{background:#fff;border-radius:14px;padding:28px 32px;box-shadow:0 2px 8px rgba(0,0,0,0.07);border-top:4px solid transparent;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;text-decoration:none;color:inherit;flex:1;min-width:220px;max-width:260px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.card-icon{font-size:2.6rem}
.card-name{font-size:1.1rem;font-weight:800;color:#1e1b4b}
.card-desc{font-size:12px;color:#9ca3af;font-weight:500}
.card-badge{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700;margin-top:4px}
.coming{opacity:0.5;cursor:default;pointer-events:none}
.section-label{width:100%;max-width:900px;margin:0 auto 16px;font-size:12px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.06em;padding:0 4px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-in">
    <div><h1>📋 CentralView</h1><p>Select a project dashboard</p></div>
    <a href="https://dpenny1.github.io/PMTools/index.html" target="_blank" class="btn-w">🛠 PM Tools</a>
  </div>
</div>
<div class="main">
  <div class="grid">
    <div class="section-label">Active Dashboards</div>

    <a href="cis.html" class="card" style="border-top-color:#4338ca">
      <div class="card-icon">🛡️</div>
      <div class="card-name">CIS</div>
      <div class="card-desc">CS Issues Hub — tracking, patches, exceptions &amp; weekly report</div>
      <span class="card-badge" style="background:#e0e7ff;color:#3730a3">Live</span>
    </a>

    <div class="section-label" style="margin-top:16px">Coming Soon</div>

    <a href="powersearch.html" class="card coming" style="border-top-color:#0891b2">
      <div class="card-icon">🔍</div>
      <div class="card-name">PowerSearch</div>
      <div class="card-desc">Issues dashboard — coming soon</div>
      <span class="card-badge" style="background:#e0f2fe;color:#0369a1">Placeholder</span>
    </a>

    <a href="customerportal.html" class="card coming" style="border-top-color:#059669">
      <div class="card-icon">🌐</div>
      <div class="card-name">Customer Portal</div>
      <div class="card-desc">Issues dashboard — coming soon</div>
      <span class="card-badge" style="background:#d1fae5;color:#065f46">Placeholder</span>
    </a>

  </div>
</div>
</body>
</html>
