<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CS GitHub Issues Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1a1a1a;min-height:100vh;font-size:15px}
a{color:#4338ca;text-decoration:none}
a:hover{text-decoration:underline}
.header{background:linear-gradient(135deg,#1e1b4b 0%,#4338ca 60%,#6366f1 100%);padding:40px 24px 56px;text-align:center}
.header h1{color:#fff;font-size:2rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
.header p{color:#c7d2fe;font-size:0.95rem}
.main{max-width:98vw;margin:-28px auto 0;padding:0 24px 48px}
.setup-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:24px 28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);max-width:560px;margin-left:auto;margin-right:auto}
.setup-card h2{font-size:1rem;font-weight:700;color:#1e1b4b;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e5e7eb}
.field-group{margin-bottom:14px}
.field-group label{font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
.field-group input{width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:monospace}
.field-group input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.field-group .hint{font-size:12px;color:#9ca3af;margin-top:4px}
.btn-primary{background:#4338ca;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer}
.btn-primary:hover{background:#3730a3}
.btn-primary:disabled{background:#a5b4fc;cursor:not-allowed}
.btn-sm{padding:6px 13px;font-size:12px;border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:7px;cursor:pointer}
.btn-sm:hover:not(:disabled){background:#f9fafb}
.btn-danger-sm{padding:6px 13px;font-size:12px;border:1px solid #fca5a5;background:#fff;color:#dc2626;border-radius:7px;cursor:pointer}
.btn-ignore{padding:4px 10px;font-size:12px;border:1px solid #e5e7eb;background:#fff;color:#9ca3af;border-radius:7px;cursor:pointer}
.btn-ignore:hover{background:#f9fafb;color:#6b7280}
.err-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;color:#991b1b;font-size:13px;margin-top:10px}
.stat-grid{display:grid;gap:12px;margin-bottom:20px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.stat-card{background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,0.07);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;border-top:3px solid transparent;white-space:nowrap}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.12)}
.stat-num{font-size:2rem;font-weight:800;margin-bottom:2px}
.stat-lbl{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em}
.tabs-wrap{background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:8px;border:1px solid transparent;background:transparent;color:#6b7280;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.tab:hover{background:#f1f5f9;color:#374151}
.tab.active{color:#fff;border-color:transparent}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.top-bar-left{font-size:13px;color:#6b7280}
.issue-list{display:flex;flex-direction:column;gap:10px}
.issue-card{background:#fff;border-radius:12px;padding:15px 18px;box-shadow:0 2px 8px rgba(0,0,0,0.07);display:flex;align-items:flex-start;gap:12px;transition:box-shadow 0.15s}
.issue-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.11)}
.issue-body{flex:1;min-width:0}
.issue-title{font-size:14px;font-weight:700;margin-bottom:5px;color:#1e1b4b}
.issue-meta{font-size:12px;color:#9ca3af;margin-bottom:6px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.badge{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:600;display:inline-block}
.age-ok{color:#059669;font-weight:700}
.age-warn{color:#d97706;font-weight:700}
.age-old{color:#dc2626;font-weight:700}
.progress-wrap{margin-top:10px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-bottom:3px}
.progress-bar{height:5px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;background:#4338ca}
.checklist-meta{font-size:11px;color:#9ca3af;margin-top:5px;display:flex;gap:12px;flex-wrap:wrap}
.checklist-meta .pr{color:#059669;font-weight:600}
.checklist-meta .manual{color:#d97706;font-weight:600}
.checklist-section{margin-top:8px;padding:10px 12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px}
.checklist-section-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.checklist-item{font-size:12px;padding:3px 0;display:flex;align-items:flex-start;gap:6px;line-height:1.5;color:#374151}
.checklist-item.done-pr .item-text,.checklist-item.done-manual .item-text{text-decoration:line-through;color:#9ca3af}
.checklist-item.future{color:#9ca3af;font-style:italic}
.report-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07);overflow-x:auto}
.report-table{width:100%;border-collapse:collapse;font-size:13px}
.report-table th{text-align:left;padding:10px 14px;border-bottom:2px solid #e5e7eb;font-weight:700;color:#374151;font-size:12px;white-space:nowrap;background:#f9fafb}
.report-table td{padding:9px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.report-table tr:last-child td{border-bottom:none}
.report-table tr:hover td{background:#f9fafb}
.report-table td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.pos{color:#059669}
.neg{color:#dc2626}
.empty-state{background:#fff;border-radius:12px;padding:3rem;text-align:center;color:#9ca3af;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #e5e7eb;border-top-color:#6366f1;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
#setup{display:block}
#dash{display:none}
</style>
</head>
<body>

<div id="setup">
  <div class="header">
    <h1>&#x1F4CB; CS GitHub Issues Hub</h1>
  </div>
  <div class="main">
    <div class="setup-card">
      <h2>&#x1F510; GitHub Connection</h2>
      <div class="field-group">
        <label>Personal Access Token (classic, repo scope)</label>
        <input type="password" id="ghToken" placeholder="ghp_..." onkeydown="if(event.key==='Enter')connect()"/>
        <div class="hint">github.com → Settings → Developer settings → Personal access tokens</div>
      </div>
      <div class="field-group">
        <label>Repos to monitor (comma-separated, owner/repo)</label>
        <input type="text" id="reposInput" placeholder="e.g. myorg/api, myorg/frontend" onkeydown="if(event.key==='Enter')connect()"/>
      </div>
      <div id="setupErr" style="display:none"></div>
      <div style="margin-top:20px;display:flex;justify-content:flex-end">
        <button class="btn-primary" id="connectBtn" onclick="connect()">&#x25B6; Load Dashboard</button>
      </div>
    </div>
  </div>
</div>

<div id="dash">
  <div class="header">
    <h1>&#x1F4CB; CS GitHub Issues Hub</h1>
    <p id="dashMeta">Loading...</p>
  </div>
  <div class="main">
    <div class="top-bar">
      <span class="top-bar-left" id="loadedAt"></span>
      <div style="display:flex;gap:8px">
        <button class="btn-sm" onclick="showSetup()">&#x21BA; Reconnect</button>
        <button class="btn-sm" id="refreshBtn" onclick="doRefresh()">&#x21BB; Refresh</button>
        <button class="btn-sm" onclick="toggleSettings()" title="ZenHub Settings">&#x2699; ZenHub</button>
      </div>
    </div>
    <div id="settingsPanel" style="display:none"></div>
    <div class="stat-grid" id="statGrid"></div>
    <div class="tabs-wrap" id="tabsWrap"></div>
    <div id="dashErr" style="display:none;margin-bottom:12px"></div>
    <div id="mainContent"></div>
  </div>
</div>

<script>
var S={
  ghToken:'',repos:[],
  issues:[],closedIssues:[],ignored:[],
  activeTab:'tracking',expanded:{},labelColors:{},
  zhToken:'',zhWorkspace:'',repoIds:{},zhPipelines:{},
  showSettings:false,activeProfile:null
};
var ZH_STORAGE='cis_zh_creds_v1';
var PROFILES_KEY='cis_profiles_v1';

function loadProfiles(){try{var v=localStorage.getItem(PROFILES_KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
function saveProfiles(p){try{localStorage.setItem(PROFILES_KEY,JSON.stringify(p));}catch(e){}}

function renderProfileDropdown(){
  var profiles=loadProfiles();
  var sel=document.getElementById('profileSelect');
  if(!sel)return;
  sel.innerHTML='<option value="">-- Select a project --</option>';
  profiles.forEach(function(p){sel.innerHTML+='<option value="'+esc(p.id)+'">'+esc(p.name)+'</option>';});
}

function onProfileSelect(){
  var sel=document.getElementById('profileSelect');
  var profiles=loadProfiles();
  var profile=profiles.find(function(p){return p.id===sel.value;});
  if(!profile)return;
  S.activeProfile=profile;
  document.getElementById('reposInput').value=profile.repo;
}

function showConfigureScreen(){
  document.getElementById('setup').style.display='none';
  document.getElementById('configureScreen').style.display='block';
  renderConfigureScreen();
}

function backToSetup(){
  document.getElementById('configureScreen').style.display='none';
  document.getElementById('setup').style.display='block';
renderProfileDropdown();
  renderProfileDropdown();
}

function renderConfigureScreen(){
  var profiles=loadProfiles();
  var html='';
  if(profiles.length){
    html+='<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">';
    profiles.forEach(function(p){
      html+='<div style="display:flex;align-items:center;gap:10px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px 16px">';
      html+='<div style="flex:1"><div style="font-size:14px;font-weight:700;color:#1e1b4b">'+esc(p.name)+'</div>';
      html+='<div style="font-size:12px;color:#6b7280;margin-top:2px">'+esc(p.repo)+'</div>';
      html+='<div style="font-size:12px;color:#9ca3af">Workspace: '+esc(p.zhWorkspace||'not set')+'</div></div>';
      html+='<button class="btn-sm" onclick="editProfile(\''+esc(p.id)+'\')">Edit</button>';
      html+='<button class="btn-danger-sm" onclick="deleteProfile(\''+esc(p.id)+'\')">Delete</button>';
      html+='</div>';
    });
    html+='</div>';
  } else {
    html+='<div class="empty-state" style="margin-bottom:20px">No projects configured yet. Add one below.</div>';
  }
  html+='<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px" id="profileForm">';
  html+='<div style="font-size:13px;font-weight:700;color:#1e1b4b;margin-bottom:14px">Add new project</div>';
  html+='<div class="field-group"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Display name</label><input type="text" id="pName" placeholder="e.g. Phoenix" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none"/></div>';
  html+='<div class="field-group" style="margin-top:10px"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">GitHub repo (owner/repo)</label><input type="text" id="pRepo" placeholder="e.g. myorg/phoenix" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none"/></div>';
  html+='<div class="field-group" style="margin-top:10px"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">ZenHub workspace ID</label><input type="text" id="pWorkspace" placeholder="e.g. 5e8f9c..." style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none"/></div>';
  html+='<div id="profileFormErr" style="display:none;margin-top:8px"></div>';
  html+='<div style="margin-top:14px"><button class="btn-primary" onclick="saveNewProfile()">Add project</button></div>';
  html+='</div>';
  document.getElementById('configureList').innerHTML=html;
}

function saveNewProfile(){
  var name=document.getElementById('pName').value.trim();
  var repo=document.getElementById('pRepo').value.trim();
  var ws=document.getElementById('pWorkspace').value.trim();
  if(!name||!repo){showErr('profileFormErr','Name and repo are required.');return;}
  var profiles=loadProfiles();
  profiles.push({id:'p_'+Date.now(),name:name,repo:repo,zhWorkspace:ws});
  saveProfiles(profiles);
  renderConfigureScreen();
}

function deleteProfile(id){
  if(!confirm('Delete this project?'))return;
  var profiles=loadProfiles().filter(function(p){return p.id!==id;});
  saveProfiles(profiles);
  renderConfigureScreen();
}

function editProfile(id){
  var profiles=loadProfiles();
  var p=profiles.find(function(x){return x.id===id;});
  if(!p)return;
  var name=prompt('Display name:',p.name);if(name===null)return;
  var repo=prompt('GitHub repo (owner/repo):',p.repo);if(repo===null)return;
  var ws=prompt('ZenHub workspace ID:',p.zhWorkspace||'');if(ws===null)return;
  p.name=name.trim();p.repo=repo.trim();p.zhWorkspace=ws.trim();
  saveProfiles(profiles);
  renderConfigureScreen();
}
var STORAGE_KEY='cis_hub_report_v5';
var IGNORED_KEY='cis_hub_ignored_v5';
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var CS_LABELS=['cs tracking','uat patch','production patch','cs in testing','cs task item'];
var TABS=[
  {id:'prod',     label:'Production Patch', color:'#dc2626'},
  {id:'uat',      label:'UAT Patch',        color:'#d97706'},
  {id:'tracking', label:'CS Items',         color:'#4338ca'},
  {id:'testing',  label:'CS In Testing',    color:'#7c3aed'},
  {id:'taskitem', label:'CS Task Item',     color:'#059669'},
  {id:'newitems', label:'New Issues',       color:'#0891b2'},
  {id:'closed',   label:'Recently Closed',  color:'#374151'},
  {id:'ignored',  label:'Ignored',          color:'#6b7280'},
  {id:'report',   label:'Weekly Report',    color:'#1e1b4b'},
  {id:'qa',       label:'QA Tracking',      color:'#7c3aed'}
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function luminance(hex){hex=(hex||'cccccc').replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];var r=parseInt(hex.substr(0,2),16)/255,g=parseInt(hex.substr(2,2),16)/255,b=parseInt(hex.substr(4,2),16)/255;return 0.2126*r+0.7152*g+0.0722*b;}
function textForBg(hex){return luminance(hex)>0.45?'#1a1a1a':'#ffffff';}
function labelBadge(name){var color=S.labelColors[name.toLowerCase()]||'e5e7eb';return '<span class="badge" style="background:#'+color+';color:'+textForBg(color)+'">'+esc(name)+'</span>';}
function ageInDays(d){return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function ageLabel(days){if(days<3)return{text:days+'d',cls:'age-ok'};if(days<7)return{text:days+'d',cls:'age-warn'};return{text:days+'d',cls:'age-old'};}
function todayStr(){var d=new Date();return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
function hasCSLabel(i){return i.labels.some(function(l){return CS_LABELS.indexOf(l.toLowerCase())!==-1;});}
function isReportTracking(t){var l=t.toLowerCase();return l.indexOf('cs ')===0&&l.indexOf('research')===-1&&!isQATracking(t);}
function isQATracking(title){var t=title.toLowerCase();if(t.indexOf('cs features')!==0)return false;var now=new Date();return t.indexOf(MONTHS[now.getMonth()].toLowerCase())!==-1||t.indexOf(MONTHS[(now.getMonth()+11)%12].toLowerCase())!==-1;}
function loadZHCreds(){try{var v=localStorage.getItem(ZH_STORAGE);if(v){var d=JSON.parse(v);S.zhToken=d.token||'';S.zhWorkspace=d.workspace||'';}}catch(e){}}
function saveZHCreds(){try{localStorage.setItem(ZH_STORAGE,JSON.stringify({token:S.zhToken,workspace:S.zhWorkspace}));}catch(e){}}

async function zhFetch(path,method,body){
  var opts={method:method||'GET',headers:{'X-Authentication-Token':S.zhToken,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  var r=await fetch('https://api.zenhub.com'+path,opts);
  if(!r.ok)throw new Error('ZenHub '+r.status+': '+r.statusText);
  return method==='PUT'||method==='POST'?r:r.json();
}

async function loadZHData(){
  if(!S.zhToken||!S.zhWorkspace)return;
  for(var ri=0;ri<S.repos.length;ri++){
    var repo=S.repos[ri];
    try{
      var rd=await ghFetch('/repos/'+repo);
      S.repoIds[repo]=rd.id;
      var pd=await zhFetch('/p2/workspaces/'+S.zhWorkspace+'/repositories/'+rd.id+'/board');
      S.zhPipelines[repo]=(pd.pipelines||[]).map(function(p){return{id:p.id,name:p.name};});
      (pd.pipelines||[]).forEach(function(p){
        (p.issues||[]).forEach(function(i){
          var key=i.issue_number+'_'+repo;
          S.issues.forEach(function(iss){if(iss.id===i.issue_number&&iss.repo===repo)iss.pipeline={id:p.id,name:p.name};});
        });
      });
    }catch(e){}
  }
}

async function moveIssuePipeline(issueId,repo,pipelineId){
  if(!S.zhToken||!S.zhWorkspace)return;
  var repoId=S.repoIds[repo];
  if(!repoId)return;
  try{
    await zhFetch('/p2/workspaces/'+S.zhWorkspace+'/repositories/'+repoId+'/issues/'+issueId+'/moves','POST',{pipeline_id:pipelineId,position:'top'});
    var issue=S.issues.find(function(i){return i.id===issueId&&i.repo===repo;});
    if(issue){
      var pipes=S.zhPipelines[repo]||[];
      var pipe=pipes.find(function(p){return p.id===pipelineId;});
      if(pipe)issue.pipeline={id:pipe.id,name:pipe.name};
    }
    renderMain();
  }catch(e){alert('Failed to move issue: '+e.message);}
}

async function bulkMovePipeline(tab){
  if(!S.zhToken||!S.zhWorkspace){alert('ZenHub not connected. Add your token in Settings.');return;}
  var list=getTabIssues().filter(function(i){return i.state==='open';});
  if(!list.length)return;
  var repo=list[0].repo;
  var pipes=S.zhPipelines[repo]||[];
  if(!pipes.length){alert('No pipelines found for '+repo);return;}
  var opts=pipes.map(function(p){return p.name;}).join('\n');
  var choice=prompt('Move all '+list.length+' issues to which pipeline?\n\n'+opts);
  if(!choice)return;
  var pipe=pipes.find(function(p){return p.name.toLowerCase()===choice.toLowerCase();});
  if(!pipe){alert('Pipeline not found: '+choice);return;}
  var btn=document.getElementById('bulkMoveBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Moving...';}
  for(var i=0;i<list.length;i++){await moveIssuePipeline(list[i].id,list[i].repo,pipe.id);}
  if(btn){btn.disabled=false;btn.textContent='Bulk move pipeline';}
}

function toggleSettings(){
  S.showSettings=!S.showSettings;
  renderSettingsPanel();
}

function renderSettingsPanel(){
  var el=document.getElementById('settingsPanel');
  if(!S.showSettings){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML='<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<span style="font-size:14px;font-weight:700;color:#1e1b4b">&#x2699; ZenHub Settings</span>'
    +'<button class="btn-sm" onclick="toggleSettings()">Close</button></div>'
    +'<div class="field-group"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">ZenHub API Token</label>'
    +'<input type="password" id="zhTokenInput" value="'+esc(S.zhToken)+'" placeholder="ZenHub token..." style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:monospace;outline:none"/></div>'
    +'<div class="field-group" style="margin-top:10px"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Workspace ID</label>'
    +'<input type="text" id="zhWorkspaceInput" value="'+esc(S.zhWorkspace)+'" placeholder="e.g. 5e8f9c..." style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:monospace;outline:none"/></div>'
    +'<div id="zhSettingsErr" style="display:none;margin-top:8px"></div>'
    +'<div style="margin-top:14px;display:flex;gap:8px">'
    +'<button class="btn-primary" id="saveZHBtn" onclick="saveZHSettings()">Save &amp; Connect ZenHub</button>'
    +(S.zhToken?'<button class="btn-sm" onclick="disconnectZH()">Disconnect</button>':'')
    +'</div>'
    +(S.zhToken?'<div style="margin-top:8px;font-size:12px;color:#059669">&#10003; ZenHub connected</div>':'')
    +'</div>';
}

async function saveZHSettings(){
  var token=document.getElementById('zhTokenInput').value.trim();
  var ws=document.getElementById('zhWorkspaceInput').value.trim();
  if(!token||!ws){showErr('zhSettingsErr','Both fields are required.');return;}
  S.zhToken=token;S.zhWorkspace=ws;saveZHCreds();
  var btn=document.getElementById('saveZHBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Connecting...';
  try{await loadZHData();renderMain();toggleSettings();}
  catch(e){showErr('zhSettingsErr','ZenHub error: '+e.message);}
  btn.disabled=false;btn.textContent='Save & Connect ZenHub';
}

function disconnectZH(){
  S.zhToken='';S.zhWorkspace='';S.repoIds={};S.zhPipelines={};
  S.issues.forEach(function(i){delete i.pipeline;});
  saveZHCreds();renderMain();toggleSettings();
}
function saveIgnored(){try{localStorage.setItem(IGNORED_KEY,JSON.stringify(S.ignored));}catch(e){}}
function loadHistory(){try{var v=localStorage.getItem(STORAGE_KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
function saveHistory(h){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(h));}catch(e){}}
function showErr(elId,msg){var el=document.getElementById(elId);el.className='err-box';el.textContent=msg;el.style.display='block';}
function hideErr(id){document.getElementById(id).style.display='none';}
function showSetup(){document.getElementById('setup').style.display='block';document.getElementById('dash').style.display='none';}
function showDash(){document.getElementById('setup').style.display='none';document.getElementById('dash').style.display='block';}

async function ghFetch(path){
  var r=await fetch('https://api.github.com'+path,{headers:{'Authorization':'token '+S.ghToken,'Accept':'application/vnd.github.v3+json'}});
  if(!r.ok)throw new Error('GitHub '+r.status+': '+r.statusText);
  return r.json();
}

async function loadLabelColors(){
  for(var ri=0;ri<S.repos.length;ri++){
    try{var labels=await ghFetch('/repos/'+S.repos[ri]+'/labels?per_page=100');labels.forEach(function(l){S.labelColors[l.name.toLowerCase()]=l.color;});}catch(e){}
  }
}

async function connect(){
  var gh=document.getElementById('ghToken').value.trim();
  var rp=document.getElementById('reposInput').value.trim();
  hideErr('setupErr');
  if(!gh||!rp){showErr('setupErr','Both fields are required.');return;}
  S.ghToken=gh;S.repos=rp.split(',').map(function(r){return r.trim();}).filter(Boolean);
  S.ignored=loadIgnored();loadZHCreds();
  var btn=document.getElementById('connectBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>Loading...';
  try{await loadLabelColors();await loadIssues();showDash();buildTabs();renderMain();}
  catch(e){showErr('setupErr',e.message);}
  btn.disabled=false;btn.textContent='▶ Load Dashboard';
}

async function loadIssues(){
  var open=[],closed=[];
  for(var ri=0;ri<S.repos.length;ri++){
    var repo=S.repos[ri];
    var od=await ghFetch('/repos/'+repo+'/issues?state=open&per_page=100');
    od.forEach(function(i){
      if(i.pull_request)return;
      open.push({id:i.number,repo:repo,title:i.title,body:i.body||'',
        labels:i.labels.map(function(l){return l.name;}),
        assignees:i.assignees.map(function(a){return a.login;}),
        createdAt:i.created_at,url:i.html_url,state:'open'});
    });
    var cd=await ghFetch('/repos/'+repo+'/issues?state=closed&per_page=50&sort=updated&direction=desc');
    cd.forEach(function(i){
      if(i.pull_request)return;
      var lbls=i.labels.map(function(l){return l.name;});
      if(!lbls.some(function(l){return CS_LABELS.indexOf(l.toLowerCase())!==-1;}))return;
      closed.push({id:i.number,repo:repo,title:i.title,body:i.body||'',
        labels:lbls,assignees:i.assignees.map(function(a){return a.login;}),
        createdAt:i.created_at,closedAt:i.closed_at,url:i.html_url,state:'closed'});
    });
  }
  S.issues=open;
  S.closedIssues=closed.sort(function(a,b){return new Date(a.closedAt)-new Date(b.closedAt);});
  captureWeeklySnapshot();
  document.getElementById('dashMeta').textContent=open.length+' open issues — '+todayStr();
  document.getElementById('loadedAt').textContent='Loaded at '+new Date().toLocaleTimeString();
}

async function doRefresh(){
  var btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  try{await loadLabelColors();await loadIssues();buildTabs();renderMain();}
  catch(e){showErr('dashErr',e.message);}
  btn.disabled=false;btn.innerHTML='&#x21BB; Refresh';
}

function parseChecklists(body){
  var sections=[],cur=null;
  (body||'').split('\n').forEach(function(line){
    var hm=line.match(/^#{1,3}\s+(.+)/);
    if(hm){if(cur)sections.push(cur);cur={title:hm[1].trim(),items:[]};return;}
    var chk=line.match(/^\s*-\s*\[x\]\s*(.+)/i),unk=line.match(/^\s*-\s*\[\s\]\s*(.+)/i);
    if(chk||unk){
      if(!cur)cur={title:'General',items:[]};
      var text=(chk||unk)[1].trim();
      cur.items.push({text:text,checked:!!chk,hasIssue:/#\d+/.test(text),hasPR:!!text.match(/\bpr\b|\bpull request\b|merged|closes|closed via/i)});
    }
  });
  if(cur)sections.push(cur);
  return sections.filter(function(s){return s.items.length>0;});
}
function checklistStats(sections){
  var t=0,cPR=0,cM=0,wi=0,fu=0;
  sections.forEach(function(s){s.items.forEach(function(i){t++;if(i.checked){if(i.hasPR)cPR++;else cM++;}if(i.hasIssue)wi++;if(!i.hasIssue&&!i.checked)fu++;});});
  return{total:t,checked:cPR+cM,checkedPR:cPR,checkedManual:cM,withIssue:wi,future:fu,open:t-cPR-cM};
}

function captureWeeklySnapshot(){
  var tracking=S.issues.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs tracking';})&&isReportTracking(i.title);});
  if(!tracking.length)return;
  var total=0,cPR=0,cM=0,fut=0,nums=[];
  tracking.forEach(function(issue){nums.push(issue.id);var st=checklistStats(parseChecklists(issue.body));total+=st.total;cPR+=st.checkedPR;cM+=st.checkedManual;fut+=st.future;});
  var history=loadHistory(),today=todayStr();
  var row={date:today,tracking:nums.join('/'),total:total,closed:cPR+cM,closedPR:cPR,closedManual:cM,noIssue:fut,open:total-cPR-cM};
  if(history.length>0&&history[history.length-1].date===today)history[history.length-1]=row;
  else history.push(row);
  saveHistory(history);
}

function getTabIssues(){
  var t=S.activeTab;
  if(t==='ignored')return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)!==-1;});
  if(t==='closed')return S.closedIssues;
  var base=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;});
  if(t==='tracking')return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs item';});});
  if(t==='uat')return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='uat patch';});});
  if(t==='prod')return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='production patch';});});
  if(t==='testing'){
    var openTesting=base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});});
    var closedTesting=S.closedIssues.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});});
    return openTesting.concat(closedTesting);
  }
  if(t==='taskitem')return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs task item';});});
  if(t==='newitems')return base.filter(function(i){return !hasCSLabel(i);});
  if(t==='qa')return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs tracking';})&&isQATracking(i.title);});
  return base;
}

function renderStats(){
  var base=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;});
  var stats=[
    {n:base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='production patch';});}).length, l:'Production Patch', c:'#dc2626', tab:'prod'},
    {n:base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='uat patch';});}).length,      l:'UAT Patch',        c:'#d97706', tab:'uat'},
    {n:base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs item';});}).length, l:'CS Items', c:'#4338ca', tab:'tracking'},
    {n:base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});}).length,  l:'CS In Testing',    c:'#7c3aed', tab:'testing'},
    {n:base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs task item';});}).length, l:'CS Task Item',     c:'#059669', tab:'taskitem'},
    {n:base.filter(function(i){return !hasCSLabel(i);}).length, l:'New Issues', c:'#0891b2', tab:'newitems'},
    {n:S.closedIssues.length, l:'Recently Closed', c:'#374151', tab:'closed'}
  ];
  var html='';
  stats.forEach(function(s){
    if((s.tab==='prod'||s.tab==='uat')&&s.n===0)return;
    html+='<div class="stat-card" style="border-top-color:'+s.c+'" onclick="switchTab(\''+s.tab+'\')" title="View '+esc(s.l)+'"><div class="stat-num" style="color:'+s.c+'">'+s.n+'</div><div class="stat-lbl">'+esc(s.l)+'</div></div>';
  });
  document.getElementById('statGrid').innerHTML=html;
}

function buildTabs(){
  var prodCount=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&i.labels.some(function(l){return l.toLowerCase()==='production patch';});}).length;
  var uatCount=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&i.labels.some(function(l){return l.toLowerCase()==='uat patch';});}).length;
  var html='';
  TABS.forEach(function(t){
    if((t.id==='prod'&&prodCount===0)||(t.id==='uat'&&uatCount===0))return;
    var cnt=t.id==='ignored'?' ('+S.ignored.length+')':'';
    var active=S.activeTab===t.id;
    html+='<button class="tab'+(active?' active':'')+'" onclick="switchTab(\''+t.id+'\')" style="'+(active?'background:'+t.color+';border-color:'+t.color:'')+'">'+esc(t.label)+cnt+'</button>';
  });
  document.getElementById('tabsWrap').innerHTML=html;
}

function switchTab(name){S.activeTab=name;buildTabs();renderMain();}
function ignoreIssue(key){if(S.ignored.indexOf(key)===-1)S.ignored.push(key);saveIgnored();renderMain();}
function unignoreIssue(key){S.ignored=S.ignored.filter(function(k){return k!==key;});saveIgnored();renderMain();}
function toggleExpand(tkey){S.expanded[tkey]=!S.expanded[tkey];renderMain();}

function renderChecklist(issue,tkey){
  var sections=parseChecklists(issue.body);
  var stats=checklistStats(sections);
  if(stats.total===0)return'';
  var pct=Math.round((stats.checked/stats.total)*100);
  var html='<div class="progress-wrap">';
  html+='<div class="progress-label"><span>'+stats.checked+'/'+stats.total+' complete</span><span>'+pct+'%</span></div>';
  html+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  html+='<div class="checklist-meta"><span class="pr">&#10003; '+stats.checkedPR+' via PR</span><span class="manual">&#10003; '+stats.checkedManual+' manual</span><span>'+stats.withIssue+' open w/ issue</span><span>'+stats.future+' future</span></div></div>';
  if(sections.length){
    html+='<div style="margin-top:8px"><button class="btn-sm" onclick="toggleExpand(\''+tkey+'\')">'+(S.expanded[tkey]?'Hide checklist':'Show checklist')+'</button></div>';
    if(S.expanded[tkey]){
      sections.forEach(function(sec){
        html+='<div class="checklist-section"><div class="checklist-section-title">'+esc(sec.title)+'</div>';
        sec.items.forEach(function(item){
          var cls,icon,tag='';
          if(item.checked&&item.hasPR){cls='done-pr';icon='&#10003;';tag='<span class="badge" style="background:#d1fae5;color:#065f46;margin-left:4px">PR</span>';}
          else if(item.checked){cls='done-manual';icon='&#10003;';tag='<span class="badge" style="background:#fef3c7;color:#92400e;margin-left:4px">manual</span>';}
          else if(!item.hasIssue){cls='future';icon='&#9675;';}
          else{cls='open-issue';icon='&#9679;';}
          html+='<div class="checklist-item '+cls+'"><span>'+icon+'</span><span class="item-text">'+esc(item.text)+'</span>'+tag+'</div>';
        });
        html+='</div>';
      });
    }
  }
  return html;
}

function renderIssueCard(issue){
  var tkey=issue.id+'_'+issue.repo.replace(/\//g,'__');
  var ikey=issue.id+'_'+issue.repo;
  var isIgnored=S.ignored.indexOf(ikey)!==-1;
  var isTracking=issue.labels.some(function(l){return l.toLowerCase()==='cs tracking';});
  var isReport=isTracking&&isReportTracking(issue.title);
  var isQA=isTracking&&isQATracking(issue.title);
  var isClosed=issue.state==='closed';
  var days=isClosed?null:ageInDays(issue.createdAt);
  var age=days!==null?ageLabel(days):null;
  var isOpenTesting=!isClosed&&issue.labels.some(function(l){return l.toLowerCase()==='cs in testing';});
  var html='<div class="issue-card'+(isOpenTesting?' no-parent':'')+'">';
  html+='<div class="issue-body">';
  html+='<div class="issue-title"><a href="'+esc(issue.url)+'" target="_blank">'+esc(issue.title)+' <span style="color:#9ca3af;font-weight:400">#'+issue.id+'</span></a>';
  if(isOpenTesting)html+=' <span class="badge" style="background:#fee2e2;color:#991b1b">&#9888; Should be closed</span>';
  if(isReport)html+=' <span class="badge" style="background:#e0e7ff;color:#3730a3">in report</span>';
  if(isQA)html+=' <span class="badge" style="background:#ede9fe;color:#4c1d95">QA</span>';
  html+='</div>';
  html+='<div class="issue-meta"><span>'+esc(issue.repo)+'</span>';
  if(age)html+='<span class="'+age.cls+'">'+age.text+' old</span>';
  if(isClosed&&issue.closedAt)html+='<span style="color:#059669;font-weight:600">Closed '+new Date(issue.closedAt).toLocaleDateString()+'</span>';
  if(issue.assignees.length)html+='<span>'+esc(issue.assignees.join(', '))+'</span>';
  html+='</div>';
  html+='<div class="tags">';
  issue.labels.forEach(function(l){html+=labelBadge(l);});
  html+='</div>';
  if(!isClosed&&S.zhToken){
    var pipes=S.zhPipelines[issue.repo]||[];
    if(pipes.length){
      var curPipe=issue.pipeline?issue.pipeline.id:'';
      html+='<div style="margin-top:8px"><select onchange="moveIssuePipeline('+issue.id+',\''+esc(issue.repo)+'\',this.value)" style="font-size:12px;padding:4px 8px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#374151;cursor:pointer">';
      html+='<option value="">'+esc(issue.pipeline?issue.pipeline.name:'Move pipeline...')+'</option>';
      pipes.forEach(function(p){html+='<option value="'+esc(p.id)+'"'+(p.id===curPipe?' selected':'')+'>'+esc(p.name)+'</option>';});
      html+='</select></div>';
    }
  }
  html+='</div>';
  html+='<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">';
  if(!isClosed){if(!isIgnored)html+='<button class="btn-ignore" onclick="ignoreIssue(\''+ikey+'\')">Ignore</button>';else html+='<button class="btn-sm" onclick="unignoreIssue(\''+ikey+'\')">Restore</button>';}
  html+='</div></div>';
  return html;
}

function renderMain(){
  renderStats();buildTabs();hideErr('dashErr');
  var t=S.activeTab;
  if(t==='report'){renderReport();return;}
  if(t==='qa'){renderQA();return;}
  var list=getTabIssues().slice();
  if(t==='closed')list.sort(function(a,b){return new Date(a.closedAt)-new Date(b.closedAt);});
  else list.sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
  if(!list.length){document.getElementById('mainContent').innerHTML='<div class="empty-state">No issues here.</div>';return;}
  var html='<div class="issue-list">';
  if(S.zhToken&&t!=='closed'&&t!=='ignored'&&t!=='report'&&t!=='qa'){
    html='<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn-sm" id="bulkMoveBtn" onclick="bulkMovePipeline(\''+t+'\')">Bulk move pipeline</button></div><div class="issue-list">';
  }
  list.forEach(function(i){html+=renderIssueCard(i);});
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
}

function renderReport(){
  var history=loadHistory();
  if(!history.length){document.getElementById('mainContent').innerHTML='<div class="empty-state">No history yet — captured automatically on each load.</div>';return;}
  var html='<div style="display:flex;gap:8px;margin-bottom:16px"><button class="btn-sm" onclick="exportCSV()">&#x2B07; Export CSV</button><button class="btn-danger-sm" onclick="clearHistory()">Clear history</button></div>';
  html+='<div class="report-wrap"><table class="report-table"><thead><tr>';
  ['Date','Tracking issues','Total tasks','Net change','Closed','Via PR','Manual approval','No issue raised','Open'].forEach(function(h){html+='<th>'+h+'</th>';});
  html+='</tr></thead><tbody>';
  history.forEach(function(row,i){
    var prev=i>0?history[i-1]:null;
    var net=prev!==null?row.total-prev.total:null;
    var ns=net===null?'&mdash;':(net>0?'<span class="pos">+'+net+'</span>':(net<0?'<span class="neg">'+net+'</span>':'0'));
    html+='<tr><td>'+esc(row.date)+'</td><td style="font-size:12px;color:#6b7280">'+esc(row.tracking)+'</td><td class="num">'+row.total+'</td><td class="num">'+ns+'</td><td class="num">'+row.closed+'</td><td class="num" style="color:#059669">'+(row.closedPR||0)+'</td><td class="num" style="color:#d97706">'+(row.closedManual||0)+'</td><td class="num">'+row.noIssue+'</td><td class="num">'+row.open+'</td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('mainContent').innerHTML=html;
}

function renderQA(){
  var qaIssues=S.issues.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs tracking';})&&isQATracking(i.title);});
  if(!qaIssues.length){document.getElementById('mainContent').innerHTML='<div class="empty-state">No QA tracking issues found for this month or last month.</div>';return;}
  var html='<div class="issue-list">';
  qaIssues.forEach(function(issue){
    var tkey=issue.id+'_'+issue.repo.replace(/\//g,'__');
    var stats=checklistStats(parseChecklists(issue.body));
    var pct=stats.total>0?Math.round((stats.checked/stats.total)*100):0;
    html+='<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.07)">';
    html+='<div style="font-size:15px;font-weight:700;margin-bottom:14px;color:#1e1b4b"><a href="'+esc(issue.url)+'" target="_blank">#'+issue.id+' '+esc(issue.title)+'</a></div>';
    if(stats.total>0){
      html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:14px">';
      [{n:stats.total,l:'Total',c:'#4338ca'},{n:stats.checked,l:'Closed',c:'#059669'},{n:stats.checkedPR,l:'Via PR',c:'#059669'},{n:stats.checkedManual,l:'Manual',c:'#d97706'},{n:stats.open,l:'Open',c:'#dc2626'},{n:stats.future,l:'Future',c:'#9ca3af'}].forEach(function(s){
        html+='<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 10px"><div style="font-size:1.4rem;font-weight:800;color:'+s.c+'">'+s.n+'</div><div style="font-size:11px;color:#6b7280;font-weight:600">'+s.l+'</div></div>';
      });
      html+='</div><div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
      html+=renderChecklist(issue,tkey);
    }else{html+='<p style="color:#9ca3af;font-size:13px">No checklist items found.</p>';}
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
}

function exportCSV(){
  var history=loadHistory();
  var rows=['Date,Tracking Issues,Total Tasks,Net Change,Closed,Via PR,Manual Approval,No Issue Raised,Open'];
  history.forEach(function(row,i){var prev=i>0?history[i-1]:null;var net=prev!==null?row.total-prev.total:'';rows.push([row.date,row.tracking,row.total,net,row.closed,row.closedPR||0,row.closedManual||0,row.noIssue,row.open].join(','));});
  var blob=new Blob([rows.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cis_cs_report.csv';a.click();
}
function clearHistory(){
  if(!confirm('Clear all report history? This cannot be undone.'))return;
  localStorage.removeItem(STORAGE_KEY);renderReport();
}

document.getElementById('setup').style.display='block';
</script>
