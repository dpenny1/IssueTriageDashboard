<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CS Issues Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#f9fafb;color:#1a1a1a;min-height:100vh;font-size:15px}
a{color:#4338ca;text-decoration:none}a:hover{text-decoration:underline}
.hdr{background:linear-gradient(135deg,#1e1b4b 0%,#4338ca 60%,#6366f1 100%);padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{color:#fff;font-size:1.3rem;font-weight:800;margin:0}
.hdr p{color:#c7d2fe;font-size:0.85rem;margin-top:2px}
.hdr-btns{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.main{padding:20px 24px 48px}
.btn{border:none;border-radius:9px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.btn-w{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4)}
.btn-w:hover{background:rgba(255,255,255,0.32);transform:translateY(-1px)}
.btn-sm{padding:6px 12px;font-size:12px;border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:7px;cursor:pointer;font-weight:600}
.btn-sm:hover:not(:disabled){background:#f9fafb}
.btn-p{background:#4338ca;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer}
.btn-p:hover{background:#3730a3}
.btn-p:disabled{background:#a5b4fc;cursor:not-allowed}
.btn-d{padding:6px 12px;font-size:12px;border:1px solid #fca5a5;background:#fff;color:#dc2626;border-radius:7px;cursor:pointer;font-weight:600}
.btn-ig{padding:4px 9px;font-size:11px;border:1px solid #e5e7eb;background:#fff;color:#9ca3af;border-radius:6px;cursor:pointer}
.sw{max-width:560px;margin:24px auto}
.sc{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:24px 28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sc h2{font-size:1rem;font-weight:700;color:#1e1b4b;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e5e7eb}
.fg{margin-bottom:14px}
.fg label{font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#fff;color:#374151}
.fg input:focus,.fg select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.hint{font-size:12px;color:#9ca3af;margin-top:4px}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;color:#991b1b;font-size:13px;margin-top:10px}
.sgrid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;justify-content:center}
.sc2{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.07);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;border-top:4px solid transparent;white-space:nowrap;flex:1;min-width:150px;text-align:center}
.sc2:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.12)}
.sn{font-size:2.8rem;font-weight:800;margin-bottom:4px}
.sl{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em}
.tw{display:flex;gap:0;border-bottom:2px solid #e5e7eb;margin-bottom:20px;width:100%}
.tab{padding:12px 0;font-size:13px;font-weight:600;border-radius:8px 8px 0 0;border:none;background:transparent;color:#6b7280;cursor:pointer;white-space:nowrap;flex:1;text-align:center}
.tab.on{border:1px solid #e5e7eb;border-bottom:2px solid #f9fafb;background:#f9fafb;color:#4338ca;margin-bottom:-2px;position:relative;z-index:1}
.tc{margin-left:5px;font-size:11px;padding:1px 7px;border-radius:999px;font-weight:700;background:#f3f4f6;color:#6b7280}
.tab.on .tc{background:#e0e7ff;color:#4338ca}
.sb{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.sb input,.sb select{border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;outline:none;color:#374151}
.gh{border-radius:10px 10px 0 0;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.gt{font-weight:700;font-size:14px;color:#fff}
.gc{background:rgba(255,255,255,0.25);color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;margin-left:8px}
.tw2{border:1px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse;text-align:left}
thead{background:#f9fafb;border-bottom:1px solid #e5e7eb}
th{padding:9px 13px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:#f0f0f0}
th .si{margin-left:3px;opacity:0.4;font-size:10px}
th.sorted .si{opacity:1;color:#4338ca}
td{padding:8px 13px;border-bottom:1px solid #f3f4f6;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;display:inline-block}
.er{text-align:center;color:#9ca3af;padding:28px;font-size:13px}
.ao{color:#059669;font-weight:700}.aw{color:#d97706;font-weight:700}.ab{color:#dc2626;font-weight:700}
.of{font-size:11px;padding:2px 8px;border-radius:6px;background:#fee2e2;color:#991b1b;font-weight:600}
.rw{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07);overflow-x:auto}
.rt{width:100%;border-collapse:collapse;font-size:13px}
.rt th{text-align:left;padding:10px 14px;border-bottom:2px solid #e5e7eb;font-weight:700;color:#374151;font-size:12px;white-space:nowrap;background:#f9fafb}
.rt td{padding:9px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.rt tr:last-child td{border-bottom:none}
.rt tr:hover td{background:#f9fafb}
.rt td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.pos{color:#059669}.neg{color:#dc2626}
.es{background:#fff;border-radius:10px;padding:3rem;text-align:center;color:#9ca3af;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-right:5px}
.spd{border:2px solid #e5e7eb;border-top-color:#6366f1}
@keyframes sp{to{transform:rotate(360deg)}}
.sp{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.ps{font-size:11px;padding:3px 7px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#374151;cursor:pointer}
.aci{display:flex;flex-direction:column;gap:3px}
.acit{font-size:11px;background:#fff3cd;border:1px solid #ffc107;border-radius:5px;padding:3px 7px;color:#7a4f00;max-width:280px;word-break:break-word}
#setup,#cfgScr,#dash{display:none}
</style>
</head>
<body>
<div id="setup">
  <div class="hdr"><div class="hdr-in">
    <div><h1>📋 CS Issues Hub</h1><p>Select a project to get started</p></div>
    <a href="https://dpenny1.github.io/PMTools/index.html" target="_blank" class="btn btn-w">🛠 PM Tools</a>
  </div></div>
  <div class="main"><div class="sw"><div class="sc">
    <h2>🔐 Connect</h2>
    <div class="fg"><label>Project</label>
      <select id="profileSelect" onchange="onProfileSel()"><option value="">-- Select a project --</option></select>
      <div class="hint">Don't see your project? <a href="#" onclick="showCfg();return false">Configure projects</a></div>
    </div>
    <div class="fg"><label>GitHub Personal Access Token</label>
      <input type="password" id="ghToken" placeholder="ghp_..." onkeydown="if(event.key==='Enter')connect()"/>
    </div>
    <div class="fg"><label>ZenHub API Token <span style="font-size:11px;color:#9ca3af;font-weight:400">(optional — for pipeline data)</span></label>
      <input type="text" id="zhTokenInput" placeholder="Paste from app.zenhub.com → API Tokens" autocomplete="off"/>
      <div class="hint">Leave blank to skip ZenHub integration</div>
    </div>
    <input type="hidden" id="reposInput"/>
    <div id="setupErr" style="display:none"></div>
    <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center">
      <a href="#" onclick="showCfg();return false" style="font-size:13px;color:#6b7280">⚙ Manage projects</a>
      <button class="btn-p" id="connectBtn" onclick="connect()">▶ Load Dashboard</button>
    </div>
  </div></div></div>
</div>

<div id="cfgScr">
  <div class="hdr"><div class="hdr-in">
    <div><h1>📋 CS Issues Hub</h1><p>Manage projects</p></div>
    <button class="btn btn-w" onclick="backToSetup()">← Back</button>
  </div></div>
  <div class="main" style="max-width:620px;margin:0 auto"><div id="cfgList"></div></div>
</div>

<div id="dash">
  <div class="hdr"><div class="hdr-in">
    <div><h1 id="dashTitle">📋 CS Issues Hub</h1><p id="dashMeta">Loading...</p></div>
    <div class="hdr-btns">
      <span id="loadedAt" style="font-size:12px"></span>
      <a href="https://dpenny1.github.io/PMTools/index.html" target="_blank" class="btn btn-w">🛠 PM Tools</a>
      <button class="btn btn-w" id="refreshBtn" onclick="doRefresh()">↻ Refresh</button>
      <button class="btn btn-w" onclick="toggleSettings()">⚙️ Settings</button>
    </div>
  </div></div>
  <div class="main">
    <div id="settingsPanel" style="display:none"></div>
    <div class="sgrid" id="statGrid"></div>
    <div class="tw" id="tabsWrap"></div>
    <div class="sb" id="searchBar">
      <input type="text" id="searchInput" placeholder="🔍 Search..." style="width:280px" oninput="renderMain()"/>
      <select id="filterLabel" onchange="renderMain()"><option value="">All labels</option></select>
      <select id="filterRepo" onchange="renderMain()"><option value="">All repos</option></select>
      <select id="filterPipeline" onchange="renderMain()"><option value="">All pipelines</option></select>
      <button onclick="clearFilters()" style="font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;text-decoration:underline;font-weight:600">Clear</button>
    </div>
    <div id="dashErr" style="display:none;margin-bottom:12px"></div>
    <div id="mainContent"></div>
  </div>
</div>

<script>
var S={ghToken:'',repos:[],issues:[],closedIssues:[],ignored:[],activeTab:'newitems',labelColors:{},zhToken:'',zhWorkspace:'',repoIds:{},zhPipelines:{},zhIssueMap:{},showSettings:false,activeProfile:null,sortState:{col:'age',dir:1},repoWorkspaceMap:{},autoRefreshTimer:null,zhConnected:false};
var STORAGE_KEY='cis_hub_report_v6',IGNORED_KEY='cis_hub_ignored_v6',PROFILES_KEY='cis_profiles_v2',ZH_STORAGE='cis_zh_creds_v2',CACHE_KEY='cis_issues_cache_v1';
var CS_LABELS=['cs tracking','uat patch','production patch','cs in testing','cs task item','cs item'];
var TAB_DEFS=[
  {id:'newitems',label:'New Issues',color:'#0891b2'},
  {id:'prod',label:'Production Patch',color:'#dc2626'},
  {id:'uat',label:'UAT Patch',color:'#d97706'},
  {id:'csitems',label:'CS Items',color:'#4338ca'},
  {id:'testing',label:'CS In Testing',color:'#059669'},
  {id:'taskitem',label:'CS Task Items',color:'#7c3aed',labelKey:'cs task item'},
  {id:'exceptions',label:'Exceptions',color:'#b91c1c'},
  {id:'closed',label:'Recently Closed',color:'#374151'},
  {id:'ignored',label:'Ignored',color:'#6b7280'},
  {id:'report',label:'Weekly Report',color:'#1e1b4b'}
];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tabColor(def){if(def&&def.labelKey&&S.labelColors[def.labelKey])return '#'+S.labelColors[def.labelKey];return def?def.color:'#6b7280';}
function lum(h){h=(h||'cccccc').replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var r=parseInt(h.substr(0,2),16)/255,g=parseInt(h.substr(2,2),16)/255,b=parseInt(h.substr(4,2),16)/255;return 0.2126*r+0.7152*g+0.0722*b;}
function tfb(h){return lum(h)>0.45?'#1a1a1a':'#ffffff';}
function lblBadge(n){var c=S.labelColors[n.toLowerCase()]||'e5e7eb';return '<span class="badge" style="background:#'+c+';color:'+tfb(c)+'">'+esc(n)+'</span>';}
function ageDays(d){return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function ageCls(d){return d<3?'ao':d<7?'aw':'ab';}
function todayStr(){var d=new Date();return (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
function hasCS(i){return i.labels.some(function(l){return CS_LABELS.indexOf(l.toLowerCase())!==-1;});}
function isRptTrk(t){
  var l=t.toLowerCase().trim();
  return l.indexOf('cs ')===0&&l.indexOf('research')===-1;
}
function lsort(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());}
function sortLbls(labels){
  var a=labels.filter(function(l){return l.toLowerCase()==='cs item';});
  var b=labels.filter(function(l){return l.toLowerCase().indexOf('cs ')===0&&l.toLowerCase()!=='cs item';}).sort(lsort);
  var c=labels.filter(function(l){return l.toLowerCase().indexOf('cs ')!==0;}).sort(lsort);
  return a.concat(b).concat(c);
}
function loadIgnored(){try{var v=localStorage.getItem(IGNORED_KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
function saveIgnored(){try{localStorage.setItem(IGNORED_KEY,JSON.stringify(S.ignored));}catch(e){}}
function loadHistory(){try{var v=localStorage.getItem(STORAGE_KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
function saveHistory(h){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(h));}catch(e){}}
function loadZHCreds(){try{var v=localStorage.getItem(ZH_STORAGE);if(v){var d=JSON.parse(v);S.zhToken=d.token||'';S.zhWorkspace=d.workspace||'';}}catch(e){}}
function saveZHCreds(){try{localStorage.setItem(ZH_STORAGE,JSON.stringify({token:S.zhToken,workspace:S.zhWorkspace}));}catch(e){}}
function loadProfiles(){try{var v=localStorage.getItem(PROFILES_KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
function saveProfiles(p){try{localStorage.setItem(PROFILES_KEY,JSON.stringify(p));}catch(e){}}
function saveCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify({issues:S.issues,closedIssues:S.closedIssues,labelColors:S.labelColors,savedAt:Date.now()}));}catch(e){}}
function loadCache(){try{var v=localStorage.getItem(CACHE_KEY);return v?JSON.parse(v):null;}catch(e){return null;}}
function showErr(id,msg){var el=document.getElementById(id);el.className='err';el.textContent=msg;el.style.display='block';}
function hideErr(id){document.getElementById(id).style.display='none';}
function showEl(id){document.getElementById(id).style.display='block';}
function hideEl(id){document.getElementById(id).style.display='none';}
function showSetup(){stopAutoRefresh();['dash','cfgScr'].forEach(hideEl);showEl('setup');renderProfileDd();}
function showDash(){['setup','cfgScr'].forEach(hideEl);showEl('dash');}
function showCfg(){['setup','dash'].forEach(hideEl);showEl('cfgScr');renderCfg();}
function backToSetup(){['cfgScr','dash'].forEach(hideEl);showEl('setup');renderProfileDd();}

function renderProfileDd(){
  var sel=document.getElementById('profileSelect');if(!sel)return;
  sel.innerHTML='<option value="">-- Select a project --</option>';
  loadProfiles().forEach(function(p){sel.innerHTML+='<option value="'+esc(p.id)+'">'+esc(p.name)+'</option>';});
  // Pre-fill saved ZH token if present
  loadZHCreds();
  var zhInput=document.getElementById('zhTokenInput');
  if(zhInput&&S.zhToken)zhInput.placeholder='Token saved — paste new one to update';
}
function onProfileSel(){
  var sel=document.getElementById('profileSelect');
  var p=loadProfiles().find(function(x){return x.id===sel.value;});
  if(!p)return;
  S.activeProfile=p;
  document.getElementById('reposInput').value=p.type==='group'?(p.repos||[]).map(function(r){return r.repo;}).join(','):p.repo;
}

function renderCfg(){
  var profiles=loadProfiles(),h='';
  if(profiles.length){
    h+='<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">';
    profiles.forEach(function(p){
      h+='<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.05)"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1">';
      h+='<div style="display:flex;align-items:center;gap:8px"><div style="font-size:14px;font-weight:700;color:#1e1b4b">'+esc(p.name)+'</div>';
      if(p.type==='group')h+='<span class="badge" style="background:#e0e7ff;color:#3730a3">Group</span>';
      h+='</div>';
      if(p.type==='group')(p.repos||[]).forEach(function(r){h+='<div style="font-size:12px;color:#6b7280;margin-top:3px">• '+esc(r.repo)+(r.zhWorkspace?' <span style="color:#9ca3af">(ws: '+esc(r.zhWorkspace)+')</span>':'')+'</div>';});
      else h+='<div style="font-size:12px;color:#6b7280;margin-top:2px">'+esc(p.repo)+'</div><div style="font-size:11px;color:#9ca3af">ZenHub: '+esc(p.zhWorkspace||'not set')+'</div>';
      h+='</div><button class="btn-sm" onclick="editProfile(\''+p.id+'\')">Edit</button> <button class="btn-d" onclick="delProfile(\''+p.id+'\')">Delete</button></div></div>';
    });
    h+='</div>';
  } else h+='<div class="es" style="margin-bottom:20px">No projects yet.</div>';
  h+='<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">';
  h+='<div style="display:flex;gap:8px;margin-bottom:16px"><button class="btn-sm" id="ctSingle" onclick="showCfgTab(\'s\')" style="background:#4338ca;color:#fff;border-color:#4338ca">Individual</button><button class="btn-sm" id="ctGroup" onclick="showCfgTab(\'g\')">Group</button></div>';
  h+='<div id="cfgS"><div class="fg"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Display name</label><input type="text" id="pName" placeholder="e.g. Phoenix" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none"/></div>';
  h+='<div class="fg" style="margin-top:8px"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">GitHub repo (owner/repo)</label><input type="text" id="pRepo" placeholder="e.g. myorg/phoenix" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none"/></div>';
  h+='<div class="fg" style="margin-top:8px"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">ZenHub workspace ID</label><input type="text" id="pWorkspace" placeholder="e.g. 5e8f9c..." style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none"/></div>';
  h+='<div id="pErr" style="display:none;margin-top:8px"></div><div style="margin-top:14px"><button class="btn-p" onclick="saveNewProfile()">Add project</button></div></div>';
  h+='<div id="cfgG" style="display:none"><div class="fg"><label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Group name</label><input type="text" id="gName" placeholder="e.g. All Products" style="width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none"/></div>';
  h+='<div style="font-size:13px;font-weight:600;color:#374151;margin:12px 0 8px">Repos</div><div id="gRepoList" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px"></div>';
  h+='<div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap"><div style="flex:1;min-width:160px"><label style="font-size:12px;color:#6b7280;display:block;margin-bottom:3px">Repo</label><input type="text" id="gRI" placeholder="myorg/repo" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;outline:none"/></div>';
  h+='<div style="flex:1;min-width:140px"><label style="font-size:12px;color:#6b7280;display:block;margin-bottom:3px">ZenHub workspace ID</label><input type="text" id="gWI" placeholder="5e8f9c..." style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;outline:none"/></div>';
  h+='<button class="btn-sm" onclick="addGRepo()">+ Add</button></div>';
  h+='<div id="gErr" style="display:none;margin-top:8px"></div><div style="margin-top:14px"><button class="btn-p" onclick="saveGroup()">Save group</button></div></div></div>';
  document.getElementById('cfgList').innerHTML=h;
  window._gr=[];
}
function showCfgTab(t){
  document.getElementById('cfgS').style.display=t==='s'?'block':'none';
  document.getElementById('cfgG').style.display=t==='g'?'block':'none';
  document.getElementById('ctSingle').style.cssText=t==='s'?'background:#4338ca;color:#fff;border-color:#4338ca':'';

async function ghFetch(path){
  var r=await fetch('https://api.github.com'+path,{headers:{'Authorization':'token '+S.ghToken,'Accept':'application/vnd.github.v3+json'}});
  if(!r.ok)throw new Error('GitHub '+r.status+': '+r.statusText);
  return r.json();
}
async function ghFetchAll(path,maxPages){
  maxPages=maxPages||10;
  var results=[],per=100;
  for(var page=1;page<=maxPages;page++){
    var sep=path.indexOf('?')!==-1?'&':'?';
    var batch=await ghFetch(path+sep+'per_page='+per+'&page='+page);
    if(!Array.isArray(batch)||!batch.length)break;
    results=results.concat(batch);
    if(batch.length<per)break;
  }
  return results;
}
async function zhPost(path,body){
  var r=await fetch('https://api.zenhub.com'+path,{method:'POST',headers:{'X-Authentication-Token':S.zhToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error('ZenHub '+r.status+': '+r.statusText);
}
async function zhGet(path){
  var r=await fetch('https://api.zenhub.com'+path,{headers:{'X-Authentication-Token':S.zhToken}});
  if(!r.ok)throw new Error('ZenHub '+r.status+': '+r.statusText);
  return r.json();
}

function setStatus(html){var el=document.getElementById('loadedAt');if(el)el.innerHTML=html;}

async function connect(){
  var gh=document.getElementById('ghToken').value.trim();
  var zhTok=document.getElementById('zhTokenInput').value.trim();
  var rp=document.getElementById('reposInput').value.trim();
  hideErr('setupErr');
  if(!gh||!rp){showErr('setupErr','Please select a project and enter your GitHub token.');return;}
  S.ghToken=gh;S.repos=rp.split(',').map(function(r){return r.trim();}).filter(Boolean);
  S.ignored=loadIgnored();loadZHCreds();S.repoWorkspaceMap={};
  // Override ZenHub token if provided on login page
  if(zhTok){S.zhToken=zhTok;saveZHCreds();}
  if(S.activeProfile){
    if(S.activeProfile.type==='group'){
      (S.activeProfile.repos||[]).forEach(function(r){if(r.zhWorkspace)S.repoWorkspaceMap[r.repo]=r.zhWorkspace;});
      // Use first repo's workspace as default
      if(!S.zhWorkspace&&S.activeProfile.repos&&S.activeProfile.repos[0]&&S.activeProfile.repos[0].zhWorkspace)
        S.zhWorkspace=S.activeProfile.repos[0].zhWorkspace;
    } else {
      if(S.activeProfile.zhWorkspace){
        S.zhWorkspace=S.activeProfile.zhWorkspace;
        if(S.repos[0])S.repoWorkspaceMap[S.repos[0]]=S.activeProfile.zhWorkspace;
      }
    }
    saveZHCreds();
  }
  var btn=document.getElementById('connectBtn');btn.disabled=true;btn.innerHTML='<span class="spin spd"></span>Loading...';
  var cache=loadCache();
  if(cache&&cache.issues){
    S.issues=cache.issues;S.closedIssues=cache.closedIssues||[];S.labelColors=cache.labelColors||{};
    var age=Math.round((Date.now()-cache.savedAt)/60000);
    populateFilters();showDash();buildTabs();renderMain();
    setStatus('<span style="color:#fbbf24;font-size:14px;font-weight:700">⏳ Cached ('+age+'m ago) — refreshing...</span>');
    btn.disabled=false;btn.textContent='▶ Load Dashboard';
    bgRefresh();return;
  }
  try{
    await Promise.all([loadLabelColors(),loadIssues()]);
    saveCache();populateFilters();showDash();buildTabs();renderMain();
    startAutoRefresh();zhLoad();
  }catch(e){showErr('setupErr',e.message);}
  btn.disabled=false;btn.textContent='▶ Load Dashboard';
}

function zhLoad(){
  if(!S.zhToken||!S.zhWorkspace)return;
  S.zhConnected=false;
  renderZHBanner();
  setStatus('<span style="color:#fbbf24">⏳ ZenHub loading...</span>');
  loadZHData().then(function(){
    S.zhConnected=true;
    populateFilters();renderMain();
    setStatus('<span style="color:#6ee7b7">✓ ZenHub connected</span> &nbsp;<span style="color:#c7d2fe;font-size:12px">'+new Date().toLocaleTimeString()+'</span>');

    S.zhConnected=false;

}

async function loadLabelColors(){
  for(var i=0;i<S.repos.length;i++){
    try{var lb=await ghFetch('/repos/'+S.repos[i]+'/labels?per_page=100');lb.forEach(function(l){S.labelColors[l.name.toLowerCase()]=l.color;});}catch(e){}
  }
}

async function loadZHData(){
  S.zhIssueMap={};
  S.repos.forEach(function(r){if(!S.repoWorkspaceMap[r]&&S.zhWorkspace)S.repoWorkspaceMap[r]=S.zhWorkspace;});
  for(var i=0;i<S.repos.length;i++){
    var repo=S.repos[i],ws=S.repoWorkspaceMap[repo]||S.zhWorkspace;
    if(!S.zhToken||!ws)continue;
    try{
      var rd=await ghFetch('/repos/'+repo);S.repoIds[repo]=rd.id;
      var bd=await zhGet('/p2/workspaces/'+ws+'/repositories/'+rd.id+'/board');
      S.zhPipelines[repo]=(bd.pipelines||[]).map(function(p){return {id:p.id,name:p.name};});
      (bd.pipelines||[]).forEach(function(p){(p.issues||[]).forEach(function(iss){S.zhIssueMap[iss.issue_number+'_'+repo]={pipelineId:p.id,pipelineName:p.name,workspace:ws};});});
    }catch(e){console.error('ZH board error',repo,e.message);}
  }
  S.issues.forEach(function(i){var m=S.zhIssueMap[i.id+'_'+i.repo];if(m)i.pipeline=m;});
  await loadZHDeps();
}

async function loadZHDeps(){
  for(var i=0;i<S.repos.length;i++){
    var repo=S.repos[i],ws=S.repoWorkspaceMap[repo]||S.zhWorkspace,repoId=S.repoIds[repo];
    if(!S.zhToken||!ws||!repoId)continue;
    try{
      var ed=await zhGet('/p2/workspaces/'+ws+'/repositories/'+repoId+'/epics');
      for(var j=0;j<(ed.epic_issues||[]).length;j++){
        var ep=ed.epic_issues[j];
        try{
          var edet=await zhGet('/p2/workspaces/'+ws+'/repositories/'+(ep.repo_id||repoId)+'/epics/'+ep.issue_number);
          (edet.issues||[]).forEach(function(child){
            var cr=repoForId(child.repo_id)||repo;
            var ci=S.issues.find(function(iss){return iss.id===child.issue_number&&iss.repo===cr;});
            if(ci)ci.parent={issueNumber:ep.issue_number,repoId:ep.repo_id};
          });
        }catch(e){}
      }
    }catch(e){}
  }
}
function repoForId(id){return Object.keys(S.repoIds).find(function(r){return S.repoIds[r]===id;})||null;}

async function loadIssues(){
  var open=[],closed=[];
  for(var i=0;i<S.repos.length;i++){
    var repo=S.repos[i];
    var od=await ghFetchAll('/repos/'+repo+'/issues?state=open',10);
    od.forEach(function(iss){
      if(iss.pull_request)return;
      open.push({id:iss.number,repo:repo,title:iss.title,body:iss.body||'',
        labels:iss.labels.map(function(l){return l.name;}),
        assignees:iss.assignees.map(function(a){return a.login;}),
        createdAt:iss.created_at,url:iss.html_url,state:'open',pipeline:null,
        parent:iss.parent_issue_url?{url:iss.parent_issue_url}:null});
    });
    var cd=await ghFetch('/repos/'+repo+'/issues?state=closed&sort=updated&direction=desc&per_page=100');
    if(!Array.isArray(cd))cd=[];
    var count=0;
    for(var j=0;j<cd.length;j++){
      var iss=cd[j];if(iss.pull_request)continue;
      var lbls=iss.labels.map(function(l){return l.name;});
      if(!lbls.some(function(l){return CS_LABELS.indexOf(l.toLowerCase())!==-1;}))continue;
      closed.push({id:iss.number,repo:repo,title:iss.title,body:iss.body||'',
        labels:lbls,assignees:iss.assignees.map(function(a){return a.login;}),
        createdAt:iss.created_at,closedAt:iss.closed_at,url:iss.html_url,state:'closed',pipeline:null,parent:null});
      if(++count>=50)break;
    }
  }
  S.issues=open;
  S.closedIssues=closed.sort(function(a,b){return new Date(b.closedAt)-new Date(a.closedAt);});
  document.getElementById('dashTitle').textContent='📋 '+(S.activeProfile?S.activeProfile.name+' Issues':'CS Issues Hub');
  document.getElementById('dashMeta').textContent=open.length+' open issues — '+todayStr();
}

function getAutoClosedItems(issue){
  if(!issue.labels.some(function(l){return l.toLowerCase()==='cs task item';})||issue.state!=='open')return[];
  var hits=[];
  (issue.body||'').split('\n').forEach(function(line){
    var chk=line.match(/^\s*-\s*\[x\]\s*(.+)/i);
    if(chk){
      var text=chk[1].trim();
      if(/#\d+/.test(text))hits.push(text);
    }
  });
  return hits;
}
function isNIP(issue){return issue.pipeline&&issue.pipeline.pipelineName.toLowerCase()==='new issues';}
function isExempt(issue){var t=issue.title.toLowerCase();return t.indexOf('cs features')===0||t.indexOf('cs production issues')===0;}
function isException(issue){
  if(issue.state!=='open')return false;
  if(issue.parent)return false;
  if(isExempt(issue))return false;
  if(issue.labels.some(function(l){var ll=l.toLowerCase();return ll==='cs in testing'||ll==='cs task item';}))return false;
  if(hasCS(issue))return true;
  if(getAutoClosedItems(issue).length>0)return true;
  if(isNIP(issue))return true;
  return false;
}
function zhUrl(issue){
  var ws=S.repoWorkspaceMap&&S.repoWorkspaceMap[issue.repo]?S.repoWorkspaceMap[issue.repo]:S.zhWorkspace;
  var p=issue.repo.split('/');
  if(ws)return 'https://app.zenhub.com/workspaces/'+ws+'/issues/'+p[0]+'/'+p[1]+'/'+issue.id;
  return 'https://app.zenhub.com/issues/'+p[0]+'/'+p[1]+'/'+issue.id;
}
function populateFilters(){
  var ls={},rs={},ps={};

  var fl=document.getElementById('filterLabel'),fr=document.getElementById('filterRepo'),fp=document.getElementById('filterPipeline');
  fl.innerHTML='<option value="">All labels</option>';Object.keys(ls).sort(lsort).forEach(function(l){fl.innerHTML+='<option>'+esc(l)+'</option>';});
  fr.innerHTML='<option value="">All repos</option>';Object.keys(rs).sort(lsort).forEach(function(r){fr.innerHTML+='<option>'+esc(r)+'</option>';});
  fp.innerHTML='<option value="">All pipelines</option>';Object.keys(ps).sort(lsort).forEach(function(p){fp.innerHTML+='<option>'+esc(p)+'</option>';});
}
function clearFilters(){['searchInput','filterLabel','filterRepo','filterPipeline'].forEach(function(id){document.getElementById(id).value='';});renderMain();}
function getExceptions(){return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&isException(i);});}

function getTabIssues(tab){
  var t=tab||S.activeTab;
  if(t==='exceptions')return getExceptions();
  if(t==='ignored')return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)!==-1;});
  if(t==='closed')return S.closedIssues;
  if(t==='testing'){
    var oT=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});});
    var cT=S.closedIssues.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});});
    return oT.concat(cT);
  }
  if(t==='taskitem')return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&i.labels.some(function(l){return l.toLowerCase()==='cs task item';});});
  var base=S.issues.filter(function(i){
    return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&!isException(i)
      &&!i.labels.some(function(l){var ll=l.toLowerCase();return ll==='cs in testing'||ll==='cs task item';});
  });
  if(t==='newitems')return base.filter(function(i){return !hasCS(i);});
  if(t==='prod')return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='production patch';});});
  if(t==='uat')return base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='uat patch';});});
  if(t==='csitems')return base.filter(function(i){return i.labels.some(function(l){var ll=l.toLowerCase();return ll.indexOf('cs ')===0&&ll!=='cs task item'&&ll!=='cs in testing';});});
  return base;
}

function applyFilters(list){
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  var fl=(document.getElementById('filterLabel').value||'').toLowerCase();
  var fr=document.getElementById('filterRepo').value||'';
  var fp=document.getElementById('filterPipeline').value||'';
  if(q)list=list.filter(function(i){return i.title.toLowerCase().indexOf(q)!==-1||String(i.id).indexOf(q)!==-1||i.labels.join(' ').toLowerCase().indexOf(q)!==-1||i.repo.toLowerCase().indexOf(q)!==-1||i.assignees.join(' ').toLowerCase().indexOf(q)!==-1;});
  if(fl)list=list.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()===fl;});});
  if(fr)list=list.filter(function(i){return i.repo===fr;});
  if(fp)list=list.filter(function(i){return i.pipeline&&i.pipeline.pipelineName===fp;});
  return list;
}

function sortIssues(list,tab){
  if(tab==='taskitem')return list.slice().sort(function(a,b){
    var at=a.title.toLowerCase(),bt=b.title.toLowerCase();
    var aP=at.indexOf('cs production issues')===0,bP=bt.indexOf('cs production issues')===0;
    var aF=at.indexOf('cs features')===0,bF=bt.indexOf('cs features')===0;
    var aCS=at.indexOf('cs ')===0,bCS=bt.indexOf('cs ')===0;
    if(aP&&!bP)return -1;if(!aP&&bP)return 1;
    if(aF&&!bF)return -1;if(!aF&&bF)return 1;
    if(aCS&&!bCS)return -1;if(!aCS&&bCS)return 1;
    return at.localeCompare(bt);
  });
  var col=S.sortState.col,dir=S.sortState.dir;
  if(tab==='newitems'&&col==='age')dir=1;
  return list.slice().sort(function(a,b){
    var av,bv;
    if(col==='age'||col==='created'){av=new Date(a.createdAt);bv=new Date(b.createdAt);}
    else if(col==='title'){av=a.title.toLowerCase();bv=b.title.toLowerCase();}
    else if(col==='repo'){av=a.repo;bv=b.repo;}
    else if(col==='id'){av=a.id;bv=b.id;}
    else if(col==='closed'){av=new Date(a.closedAt||0);bv=new Date(b.closedAt||0);}
    else{av=new Date(a.createdAt);bv=new Date(b.createdAt);}
    if(av<bv)return -dir;if(av>bv)return dir;return 0;
  });
}

function mkTh(col,label){var active=S.sortState.col===col;return '<th class="'+(active?'sorted':'')+'" onclick="doSort(\''+col+'\')">'+label+' <span class="si">'+(active?(S.sortState.dir===1?'▲':'▼'):'▲')+'</span></th>';}
function doSort(col){if(S.sortState.col===col)S.sortState.dir*=-1;else{S.sortState.col=col;S.sortState.dir=1;}renderMain();}

function renderStats(){
  var base=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&!isException(i);});
  var tN=base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});}).length
    +S.closedIssues.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs in testing';});}).length;
  var stats=[
    {n:base.filter(function(i){return !hasCS(i);}).length,tab:'newitems'},
    {n:base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='production patch';});}).length,tab:'prod'},
    {n:base.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='uat patch';});}).length,tab:'uat'},
    {n:base.filter(function(i){return i.labels.some(function(l){var ll=l.toLowerCase();return ll.indexOf('cs ')===0&&ll!=='cs task item';});}).length,tab:'csitems'},
    {n:tN,tab:'testing'},
    {n:S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&i.labels.some(function(l){return l.toLowerCase()==='cs task item';});}).length,tab:'taskitem'},
    {n:getExceptions().length,tab:'exceptions'},
    {n:S.closedIssues.length,tab:'closed'}
  ];
  var h='';
  stats.forEach(function(s){
    if((s.tab==='prod'||s.tab==='uat')&&s.n===0)return;
    var def=TAB_DEFS.find(function(d){return d.id===s.tab;}),c=tabColor(def),l=def?def.label:s.tab;
    h+='<div class="sc2" style="border-top-color:'+c+'" onclick="switchTab(\''+s.tab+'\')">';
    h+='<div class="sn" style="color:'+c+'">'+s.n+'</div><div class="sl">'+esc(l)+'</div></div>';
  });
  document.getElementById('statGrid').innerHTML=h;
}

function buildTabs(){
  var pN=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&!isException(i)&&i.labels.some(function(l){return l.toLowerCase()==='production patch';});}).length;
  var uN=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&!isException(i)&&i.labels.some(function(l){return l.toLowerCase()==='uat patch';});}).length;
  var h='';
  TAB_DEFS.forEach(function(t){
    if((t.id==='prod'&&pN===0)||(t.id==='uat'&&uN===0))return;
    var cnt=getTabIssues(t.id).length,active=S.activeTab===t.id,c=tabColor(t);
    h+='<button class="tab'+(active?' on':'')+'" onclick="switchTab(\''+t.id+'\')" style="'+(active?'color:'+c:'')+'">'+esc(t.label)+'<span class="tc">'+cnt+'</span></button>';
  });
  document.getElementById('tabsWrap').innerHTML=h;
}

function ignoreIssue(k){if(S.ignored.indexOf(k)===-1)S.ignored.push(k);saveIgnored();buildTabs();renderMain();}
function unignoreIssue(k){S.ignored=S.ignored.filter(function(x){return x!==k;});saveIgnored();buildTabs();renderMain();}

function renderExcReason(issue){
  var parts=[],ai=getAutoClosedItems(issue);
  if(ai.length){
    var h='<div class="aci"><div style="font-size:11px;font-weight:700;color:#7a4f00;margin-bottom:3px">⚠ Auto-closed via PR:</div>';
    ai.forEach(function(t){h+='<div class="acit">'+esc(t)+'</div>';});
    parts.push(h+'</div>');
  }
  if(isNIP(issue))parts.push('<span class="badge" style="background:#fee2e2;color:#991b1b">⚠ Still in New Issues pipeline</span>');
  if(!parts.length)parts.push('<span class="badge" style="background:#fee2e2;color:#991b1b">⚠ No parent</span>');
  return parts.join('<div style="margin-top:4px"></div>');
}

function renderTable(issues,tab,def){

  var h='<div class="gh" style="background:'+color+'"><span class="gt">'+esc(label)+'<span class="gc">'+issues.length+'</span></span>';
  if(S.zhToken&&!isClosed&&!isIgnored&&spipes.length){
    h+='<select class="ps" style="color:#374151" onchange="bulkMove(\''+tab+'\',this.value,this)"><option value="">Bulk move pipeline...</option>';

  }
  h+='</div><div class="tw2"><table><thead><tr>';
  h+=mkTh('id','#')+mkTh('title','Title')+'<th>Labels</th>';
  if(S.repos.length>1)h+=mkTh('repo','Repo');
  h+='<th>Assignee</th>';
  if(isTesting)h+='<th>Status</th>';
  if(isExc)h+='<th>Exception reason</th>';
  if(S.zhToken)h+='<th>Pipeline</th>';

  if(!issues.length)h+='<tr><td colspan="99" class="er">No issues found.</td></tr>';
  issues.forEach(function(issue){
    var ikey=issue.id+'_'+issue.repo,days=issue.state==='closed'?null:ageDays(issue.createdAt);
    var isOT=isTesting&&issue.state==='open';
    h+='<tr'+(isOT||isExc?' style="background:#fff5f5"':'')+'>'; 
    h+='<td style="color:#6b7280;font-size:12px">#'+issue.id+'</td>';
    h+='<td style="min-width:200px"><a href="'+esc(issue.url)+'" target="_blank" style="font-weight:600;color:#1e1b4b">'+esc(issue.title)+'</a></td>';
    h+='<td><div style="display:flex;flex-wrap:wrap;gap:3px">';

    h+='</div></td>';
    if(S.repos.length>1)h+='<td style="font-size:12px;color:#6b7280">'+esc(issue.repo.split('/')[1])+'</td>';
    h+='<td style="font-size:12px;color:#6b7280">'+esc(issue.assignees.join(', ')||'—')+'</td>';
    if(isTesting)h+='<td>'+(isOT?'<span class="of">⚠ Should be closed</span>':'<span class="badge" style="background:#d1fae5;color:#065f46">Closed</span>')+'</td>';
    if(isExc)h+='<td style="min-width:220px">'+renderExcReason(issue)+'</td>';
    if(S.zhToken){
      var rp=S.zhPipelines[issue.repo]||[],cur=issue.pipeline?issue.pipeline.pipelineId:'',curN=issue.pipeline?issue.pipeline.pipelineName:'—';
      var srp=rp.slice().sort(function(a,b){return a.name.toLowerCase().localeCompare(b.name.toLowerCase());});

        h+='<td><select class="ps" onchange="movePipeline('+issue.id+',\''+esc(issue.repo)+'\',this.value)"><option value="">'+esc(curN)+'</option>';

async function movePipeline(issueId,repo,pipelineId){
  if(!pipelineId)return;
  var repoId=S.repoIds[repo];if(!repoId)return;
  var ws=S.repoWorkspaceMap[repo]||S.zhWorkspace;if(!ws)return;
  try{
    await zhPost('/p2/workspaces/'+ws+'/repositories/'+repoId+'/issues/'+issueId+'/moves',{pipeline_id:pipelineId,position:'top'});
    var issue=S.issues.find(function(i){return i.id===issueId&&i.repo===repo;});
    if(issue){var pipes=S.zhPipelines[repo]||[],pipe=pipes.find(function(p){return p.id===pipelineId;});if(pipe)issue.pipeline={pipelineId:pipe.id,pipelineName:pipe.name};}
    renderMain();
  }catch(e){alert('Failed to move: '+e.message);}
}
async function bulkMove(tab,pipelineId,sel){
  if(!pipelineId)return;
  var list=getTabIssues(tab).filter(function(i){return i.state==='open'&&S.ignored.indexOf(i.id+'_'+i.repo)===-1;});
  if(!list.length){sel.value='';return;}
  if(!confirm('Move '+list.length+' issues?')){sel.value='';return;}
  for(var i=0;i<list.length;i++)await movePipeline(list[i].id,list[i].repo,pipelineId);
  sel.value='';
}

function getCurrentSnapshot(){
  var tracking=S.issues.filter(function(i){return i.labels.some(function(l){return l.toLowerCase()==='cs tracking';})&&isRptTrk(i.title);});
  if(!tracking.length)return null;
  var total=0,cPR=0,cM=0,fut=0,nums=[];
  tracking.forEach(function(issue){
    nums.push(issue.id);
    var secs=parseChecklists(issue.body),st=checklistStats(secs);
    total+=st.total;cPR+=st.checkedPR;cM+=st.checkedManual;fut+=st.future;
  });
  return{date:todayStr(),tracking:nums.join('/'),total:total,closed:cPR+cM,closedPR:cPR,closedManual:cM,noIssue:fut,open:total-cPR-cM};
}
function saveSnap(){
  var snap=getCurrentSnapshot();
  if(!snap){alert('No CS Tracking issues found.');return;}
  var history=loadHistory();
  if(history.length>0&&history[history.length-1].date===snap.date){if(!confirm('Replace today\'s snapshot?'))return;history[history.length-1]=snap;}
  else history.push(snap);
  saveHistory(history);renderReport();
}
function delRptRow(idx){if(!confirm('Remove this row?'))return;var h=loadHistory();h.splice(idx,1);saveHistory(h);renderReport();}

function importCSV(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.csv';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var lines=ev.target.result.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      if(!lines.length){alert('Empty file.');return;}
      var start=lines[0].toLowerCase().indexOf('date')!==-1?1:0,imported=[],skipped=0;
      for(var i=start;i<lines.length;i++){
        var cols=lines[i].split(',');
        if(cols.length<8){skipped++;continue;}
        var row={date:(cols[0]||'').trim(),tracking:(cols[1]||'').trim(),total:parseInt(cols[2])||0,closed:parseInt(cols[4])||0,closedPR:parseInt(cols[5])||0,closedManual:parseInt(cols[6])||0,noIssue:parseInt(cols[7])||0,open:parseInt(cols[8])||0};
        if(!row.date){skipped++;continue;}
        imported.push(row);
      }
      if(!imported.length){alert('No valid rows found.');return;}
      var history=loadHistory(),existing={},added=0,dupes=0;
      history.forEach(function(r){existing[r.date]=1;});
      imported.forEach(function(r){if(existing[r.date])dupes++;else{history.push(r);added++;}});
      history.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
      saveHistory(history);
      alert('Imported '+added+' row(s).'+(dupes?' Skipped '+dupes+' duplicate(s).':''));
      renderReport();
    };
    reader.readAsText(file);
  };
  inp.click();
}

      :'No open issues with the "CS Task Item" label found.';
    h+='<div style="color:#9ca3af;font-size:13px">'+esc(msg)+'</div>';
  }
  else{
    var prev=history.length>0?history[history.length-1]:null,net=prev!==null?snap.total-prev.total:null;

    tiles.forEach(function(t){h+='<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;text-align:center"><div style="font-size:'+(t.sm?'13px':'1.6rem')+';font-weight:'+(t.sm?'600':'800')+';color:'+t.c+';word-break:break-all">'+esc(String(t.v))+'</div><div style="font-size:11px;font-weight:600;color:#9ca3af;margin-top:4px;text-transform:uppercase;letter-spacing:0.04em">'+esc(t.l)+'</div></div>';});
    h+='</div>';

  if(history.length)h+='<button class="btn-sm" onclick="exportCSV()">⬇ Export CSV</button><button class="btn-d" onclick="clearHistory()">Clear</button>';
  h+='</div>';

  else{

    h+='</tr></thead><tbody>';
    history.forEach(function(row,i){
      var pv=i>0?history[i-1]:null,nt=pv!==null?row.total-pv.total:null;
      var ns2=nt===null?'&mdash;':(nt>0?'<span class="pos">+'+nt+'</span>':(nt<0?'<span class="neg">'+nt+'</span>':'0'));

    });
    h+='</tbody></table></div>';
  }
  document.getElementById('mainContent').innerHTML=h;
}

function parseChecklists(body){
  var sections=[],cur=null;
  (body||'').split('\n').forEach(function(line){
    var hm=line.match(/^#{1,3}\s+(.+)/);
    if(hm){if(cur)sections.push(cur);cur={title:hm[1].trim(),items:[]};return;}
    var chk=line.match(/^\s*-\s*\[x\]\s*(.+)/i),unk=line.match(/^\s*-\s*\[\s\]\s*(.+)/i);
    if(chk||unk){
      if(!cur)cur={title:'General',items:[]};
      var text=(chk||unk)[1].trim();
      cur.items.push({text:text,checked:!!chk,hasIssue:/#\d+/.test(text),hasPR:!!text.match(/\bpr\b|\bpull request\b|merged|closes|closed via/i)});
    }
  });
  if(cur)sections.push(cur);
  return sections.filter(function(s){return s.items.length>0;});
}
function checklistStats(sections){
  var t=0,cPR=0,cM=0,wi=0,fu=0;
  sections.forEach(function(s){s.items.forEach(function(i){t++;if(i.checked){if(i.hasPR)cPR++;else cM++;}if(i.hasIssue)wi++;if(!i.hasIssue&&!i.checked)fu++;});});
  return{total:t,checked:cPR+cM,checkedPR:cPR,checkedManual:cM,withIssue:wi,future:fu,open:t-cPR-cM};
}

      for(var i=start;i<lines.length;i++){

        if(cols.length<5){skipped++;continue;}
        var row={date:(cols[0]||'').trim(),tracking:(cols[1]||'').trim(),total:parseInt(cols[2])||0,closed:parseInt(cols[3])||0,open:parseInt(cols[4])||0,noIssue:parseInt(cols[5])||0};

function exportCSV(){
  var history=loadHistory(),rows=['Date,Tracking Issues,Total,Closed,Open,No Issue Raised'];
  history.forEach(function(row,i){
    var prev=i>0?history[i-1]:null,net=prev!==null?row.total-prev.total:'';
    rows.push([row.date,row.tracking,row.total,row.closed,row.open,row.noIssue||0].join(','));
  });
  var blob=new Blob([rows.join('\n')],{type:'text/csv'}),a=document.createElement('a');

  S.zhToken=token;S.zhWorkspace=ws;saveZHCreds();
  S.repos.forEach(function(r){S.repoWorkspaceMap[r]=ws;});
  var btn=document.getElementById('zhSaveBtn');btn.disabled=true;btn.innerHTML='<span class="spin spd"></span>Connecting...';
  try{
    await loadZHData();populateFilters();renderMain();
    var e=document.getElementById('zhErr');

    e.textContent='Connected successfully!';
  }catch(e){showErr('zhErr','ZenHub error: '+e.message);}

}
function disconnectZH(){S.zhToken='';S.zhWorkspace='';S.repoIds={};S.zhPipelines={};S.zhIssueMap={};S.issues.forEach(function(i){i.pipeline=null;});saveZHCreds();renderMain();toggleSettings();}
