<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CentralView — Power Search</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;background:#f9fafb;color:#1a1a1a;min-height:100vh;font-size:15px}
a{color:#4338ca;text-decoration:none}a:hover{text-decoration:underline}
.hdr{background:#0f172a;padding:0 24px;border-bottom:1px solid rgba(255,255,255,0.07)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;height:52px;gap:16px}
.hdr-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo{width:26px;height:26px;background:#4338ca;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;letter-spacing:-0.5px;flex-shrink:0}
.hdr h1{color:#f1f5f9;font-size:13.5px;font-weight:700;margin:0;letter-spacing:-0.01em}
.hdr p{color:#475569;font-size:11px;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:2px}
.hdr-nav a{color:#cbd5e1;font-size:12px;font-weight:600;padding:5px 9px;border-radius:5px;text-decoration:none;transition:all 0.15s;white-space:nowrap;display:inline-block}
.hdr-nav a:hover{color:#fff;background:rgba(255,255,255,0.08);text-decoration:none}
.hdr-sep{width:1px;height:18px;background:rgba(255,255,255,0.12);margin:0 8px;flex-shrink:0}
.hdr-act{background:transparent;border:none;color:#cbd5e1;cursor:pointer;padding:5px 10px;border-radius:5px;font-size:12px;font-weight:600;transition:all 0.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.hdr-act:hover{background:rgba(255,255,255,0.08);color:#fff}
.hdr-act:disabled{opacity:0.4;cursor:not-allowed}
.hdr-status{font-size:11px;color:#475569;white-space:nowrap;padding-left:4px}
.main{padding:20px 24px 48px}
.btn{border:none;border-radius:9px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s}
.btn-sm{padding:6px 12px;font-size:12px;border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:7px;cursor:pointer;font-weight:600}
.btn-sm:hover:not(:disabled){background:#f9fafb}
.btn-p{background:#4338ca;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer}
.btn-p:hover{background:#3730a3}
.btn-p:disabled{background:#a5b4fc;cursor:not-allowed}
.btn-d{padding:6px 12px;font-size:12px;border:1px solid #fca5a5;background:#fff;color:#dc2626;border-radius:7px;cursor:pointer;font-weight:600}
.btn-ig{padding:4px 9px;font-size:11px;border:1px solid #e5e7eb;background:#fff;color:#9ca3af;border-radius:6px;cursor:pointer}
.sw{max-width:560px;margin:24px auto}
.sc{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:24px 28px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.sc h2{font-size:1rem;font-weight:700;color:#1e1b4b;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #e5e7eb}
.fg{margin-bottom:14px}
.fg label{font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#fff;color:#374151}
.fg input:focus,.fg select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.hint{font-size:12px;color:#9ca3af;margin-top:4px}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;color:#991b1b;font-size:13px;margin-top:10px}
.sgrid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;justify-content:center}
.sc2{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.07);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;border-top:4px solid transparent;white-space:nowrap;flex:1;min-width:150px;text-align:center}
.sc2:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,0.12)}
.sn{font-size:2.8rem;font-weight:800;margin-bottom:4px}
.sl{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em}
.tw{display:flex;gap:0;border-bottom:2px solid #e5e7eb;margin-bottom:20px;width:100%}
.tab{padding:12px 0;font-size:13px;font-weight:600;border-radius:8px 8px 0 0;border:none;background:transparent;color:#6b7280;cursor:pointer;white-space:nowrap;flex:1;text-align:center}
.tab.on{border:1px solid #e5e7eb;border-bottom:2px solid #f9fafb;background:#f9fafb;color:#4338ca;margin-bottom:-2px;position:relative;z-index:1}
.tc{margin-left:5px;font-size:11px;padding:1px 7px;border-radius:999px;font-weight:700;background:#f3f4f6;color:#6b7280}
.tab.on .tc{background:#e0e7ff;color:#4338ca}
.sb{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.sb input,.sb select{border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;outline:none;color:#374151}
.sb input:focus,.sb select:focus{border-color:#6366f1}
.gh{border-radius:10px 10px 0 0;padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.gt{font-weight:700;font-size:14px;color:#fff}
.gc{background:rgba(255,255,255,0.25);color:#fff;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;margin-left:8px}
.tw2{border:1px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse;text-align:left}
thead{background:#f9fafb;border-bottom:1px solid #e5e7eb}
th{padding:9px 13px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:#f0f0f0}
th .si{margin-left:3px;opacity:0.4;font-size:10px}
th.sorted .si{opacity:1;color:#4338ca}
td{padding:8px 13px;border-bottom:1px solid #f3f4f6;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;display:inline-block}
.er{text-align:center;color:#9ca3af;padding:28px;font-size:13px}
.ao{color:#059669;font-weight:700}.aw{color:#d97706;font-weight:700}.ab{color:#dc2626;font-weight:700}
.rw{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07);overflow-x:auto}
.es{background:#fff;border-radius:10px;padding:3rem;text-align:center;color:#9ca3af;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-right:5px}
.spd{border:2px solid #e5e7eb;border-top-color:#6366f1}
@keyframes sp{to{transform:rotate(360deg)}}
.vault-chip{display:inline-flex;align-items:center;gap:4px;background:#e0e7ff;border:1px solid #c7d2fe;border-radius:7px;padding:4px 10px;font-size:12px;font-weight:600;color:#3730a3;cursor:pointer;border:none}
.vault-chip:hover{background:#c7d2fe}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;overflow-y:auto}
.modal-box{background:#fff;border-radius:14px;max-width:560px;margin:40px auto;padding:24px 28px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
#setup,#cfgScr,#dash{display:none}
#loadingOverlay{position:fixed;inset:0;background:rgba(30,27,75,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;backdrop-filter:blur(3px)}
#loadingOverlay .lo-spin{width:52px;height:52px;border:5px solid rgba(255,255,255,0.2);border-top-color:#a5b4fc;border-radius:50%;animation:sp 0.8s linear infinite}
#loadingOverlay .lo-title{color:#fff;font-size:1.1rem;font-weight:700}
#loadingOverlay .lo-msg{color:#c7d2fe;font-size:13px;min-height:20px;text-align:center}
.group-header{background:#e0e7ff;padding:8px 13px;font-size:12px;font-weight:700;color:#1e1b4b;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid #c7d2fe}
</style>
</head>

<div id="loadingOverlay" style="display:none">

<!-- Setup screen -->

  <div class="hdr"><div class="hdr-in">
    <div class="hdr-brand"><div class="hdr-logo">PS</div><div><h1>Power Search</h1></div></div>
    <div style="display:flex;gap:4px">

      <button class="hdr-act" onclick="showCfg()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</button>

<script>
var APP_VERSION='2026-04-15 v2';
var S={
  ghToken:'',repos:[],issues:[],closedIssues:[],ignored:[],
  activeTab:'all',
  labelColors:{},labelNames:{},
  activeProfile:null,
  sortState:{col:'age',dir:1},
  autoRefreshTimer:null
};
var STORAGE_KEY='ps_issues_cache_v1',PROFILES_KEY='ps_profiles_v1',IGNORED_KEY='ps_ignored_v1';

// ── Loading overlay ───────────────────────────────────────────────────────────
function showLoadingOverlay(msg){var o=document.getElementById('loadingOverlay');if(o)o.style.display='flex';var m=document.getElementById('loMsg');if(m)m.textContent=msg||'Loading...';}
function setLoMsg(msg){var m=document.getElementById('loMsg');if(m)m.textContent=msg||'';}
function hideLoadingOverlay(){var o=document.getElementById('loadingOverlay');if(o)o.style.display='none';}

// ── Token Vault (shared key with CIS so tokens carry over) ───────────────────
var Vault=(function(){
  var KEY='cis_vault_v1',_pw=null,_data=[];
  function load(){try{var v=localStorage.getItem(KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
  function save(d){localStorage.setItem(KEY,JSON.stringify(d));_data=d;}
  async function deriveKey(pw,salt){var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
  async function encrypt(text,pw){var salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));var key=await deriveKey(pw,salt);var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,new TextEncoder().encode(text));var buf=new Uint8Array(28+ct.byteLength);buf.set(salt,0);buf.set(iv,16);buf.set(new Uint8Array(ct),28);return btoa(String.fromCharCode(...buf));}
  async function decrypt(b64,pw){var buf=Uint8Array.from(atob(b64),function(c){return c.charCodeAt(0);});var key=await deriveKey(pw,buf.slice(0,16));var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(16,28)},key,buf.slice(28));return new TextDecoder().decode(plain);}
  return{
    isUnlocked:function(){return _pw!==null;},
    unlock:async function(pw){var data=load();if(data.length){try{await decrypt(data[0].enc,pw);}catch(e){throw new Error('Incorrect password');}} _pw=pw;_data=data;},
    lock:function(){_pw=null;_data=[];},
    list:function(){return _data.map(function(e){return{name:e.name,type:e.type||''};});},
    get:async function(name){var e=_data.find(function(x){return x.name===name;});if(!e)return null;return decrypt(e.enc,_pw);},
    add:async function(name,tok,type){if(_data.find(function(e){return e.name===name;}))throw new Error('Name already exists');var enc=await encrypt(tok,_pw);save(_data.concat([{name:name,enc:enc,type:type||''}]));},
    setType:function(name,type){var d=_data.map(function(e){return e.name===name?{name:e.name,enc:e.enc,type:type}:e;});save(d);},
    del:function(name){save(_data.filter(function(e){return e.name!==name;}));}
  };
})();

var _activeVaultTarget=null;
function toggleVault(target){
  if(_activeVaultTarget===target){_activeVaultTarget=null;document.getElementById('vaultPanel'+target.toUpperCase()).style.display='none';}
  else{_activeVaultTarget=target;document.getElementById('vaultPanel'+target.toUpperCase()).style.display='block';renderVaultPanel(target);}
}
function renderVaultPanel(target){
  var el=document.getElementById('vaultInner'+target.toUpperCase());if(!el)return;
  var h='';
  if(!Vault.isUnlocked()){
    h+='<div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:8px">🔒 Unlock Vault</div>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><input type="password" id="vaultPw" placeholder="Master password..." autocomplete="new-password" style="flex:1;min-width:160px;padding:8px 12px;border:1px solid #c7d2fe;border-radius:8px;font-size:13px;outline:none" onkeydown="if(event.key===\'Enter\')vaultUnlock(\''+target+'\')"/>';
    h+='<button class="btn-sm" style="background:#4338ca;color:#fff;border-color:#4338ca" onclick="vaultUnlock(\''+target+'\')">Unlock</button></div>';
    h+='<div id="vaultErr" style="font-size:12px;color:#dc2626;margin-top:6px;min-height:16px"></div>';
    h+='<div class="hint" style="margin-top:4px">New vault? Enter any password to create one.</div>';
  } else {
    var tokens=Vault.list();
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:13px;font-weight:600;color:#374151">🔓 Select a token</span><button class="btn-sm" onclick="vaultLockAll()">🔒 Lock</button></div>';
    if(tokens.length){
      h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
      tokens.forEach(function(t){
        var badge=t.type?'<span style="font-size:10px;padding:1px 6px;border-radius:999px;font-weight:700;background:#e0e7ff;color:#1e1b4b;margin-left:4px">'+t.type.toUpperCase()+'</span>':'<span style="font-size:10px;color:#f59e0b;font-weight:700;margin-left:4px">⚠</span>';
        h+='<button class="vault-chip" onclick="vaultUse(\''+target+'\',\''+esc(t.name)+'\')">'+esc(t.name)+badge+' ▶</button>';
      });
      h+='</div>';
    } else {h+='<div style="font-size:12px;color:#9ca3af;margin-bottom:8px">No tokens saved yet.</div>';}
    h+='<div style="border-top:1px solid #e5e7eb;padding-top:10px"><div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">Save New Token</div>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
    h+='<input type="text" id="vaultNewName_'+target+'" placeholder="Name" style="width:110px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;outline:none"/>';
    h+='<select id="vaultNewType_'+target+'" style="padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;outline:none;color:#374151"><option value="">Type...</option><option value="gh">GitHub (GH)</option><option value="zh">ZenHub (ZH)</option></select>';
    h+='<input type="password" id="vaultNewTok_'+target+'" placeholder="Token value" autocomplete="new-password" style="flex:1;min-width:140px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;outline:none;font-family:monospace"/>';
    h+='<button class="btn-sm" onclick="vaultSave(\''+target+'\')">＋ Save</button></div>';
    h+='<div id="vaultSaveMsg_'+target+'" style="font-size:12px;margin-top:5px;min-height:16px"></div>';
    h+='</div>';
  }
  el.innerHTML=h;
}
async function vaultUnlock(target){
  var pw=document.getElementById('vaultPw').value;
  var errEl=document.getElementById('vaultErr');
  if(errEl)errEl.textContent='';
  if(!pw){if(errEl)errEl.textContent='Enter a password.';}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ageDays(d){return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function ageCls(d){return d<3?'ao':d<7?'aw':'ab';}
function lum(h){h=(h||'cccccc').replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var r=parseInt(h.substr(0,2),16)/255,g=parseInt(h.substr(2,2),16)/255,b=parseInt(h.substr(4,2),16)/255;return 0.2126*r+0.7152*g+0.0722*b;}
function tfb(h){return lum(h)>0.45?'#1a1a1a':'#ffffff';}
function lblBadge(n){var key=n.toLowerCase();var c=S.labelColors[key]||'e5e7eb';var display=S.labelNames[key]||n;return '<span class="badge" style="background:#'+c+';color:'+tfb(c)+'">'+esc(display)+'</span>';}
function loadProfiles(){try{var v=localStorage.getItem(PROFILES_KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
function saveProfiles(p){try{localStorage.setItem(PROFILES_KEY,JSON.stringify(p));}catch(e){}}
function saveCache(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({issues:S.issues,closedIssues:S.closedIssues,labelColors:S.labelColors,labelNames:S.labelNames,savedAt:Date.now()}));}catch(e){}}
function loadCache(){try{var v=localStorage.getItem(STORAGE_KEY);return v?JSON.parse(v):null;}catch(e){return null;}}
function loadIgnored(){try{var v=localStorage.getItem(IGNORED_KEY);return v?JSON.parse(v):[];}catch(e){return[];}}
function saveIgnored(){try{localStorage.setItem(IGNORED_KEY,JSON.stringify(S.ignored));}catch(e){}}
function ignoreIssue(k){if(S.ignored.indexOf(k)===-1)S.ignored.push(k);saveIgnored();buildTabs();renderMain();}
function unignoreIssue(k){S.ignored=S.ignored.filter(function(x){return x!==k;});saveIgnored();buildTabs();renderMain();}

// ── API helpers ───────────────────────────────────────────────────────────────
async function ghFetch(path){
  var r=await fetch('https://api.github.com'+path,{headers:{'Authorization':'token '+S.ghToken,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}});
  if(!r.ok)throw new Error('GitHub '+r.status+': '+r.statusText);
  return r.json();
}
async function ghFetchAll(path,maxPages){
  maxPages=maxPages||10;var results=[],per=100;
  for(var page=1;page<=maxPages;page++){
    var sep=path.indexOf('?')!==-1?'&':'?';
    var batch=await ghFetch(path+sep+'per_page='+per+'&page='+page);
    if(!Array.isArray(batch)||!batch.length)break;
    results=results.concat(batch);
    if(batch.length<per)break;
  }
  return results;
}

async function loadLabelColors(){
  for(var i=0;i<S.repos.length;i++){
    try{
      var lb=await ghFetch('/repos/'+S.repos[i]+'/labels?per_page=100');
      lb.forEach(function(l){S.labelColors[l.name.toLowerCase()]=l.color;S.labelNames[l.name.toLowerCase()]=l.name;});
    }catch(e){}
  }
}

async function loadIssues(){
  var open=[],closed=[];
  var since30=new Date(Date.now()-30*24*60*60*1000).toISOString();
  for(var i=0;i<S.repos.length;i++){
    var repo=S.repos[i];
    setLoMsg('Loading issues from '+repo+'...');
    var od=await ghFetchAll('/repos/'+repo+'/issues?state=open',15);
    od.forEach(function(iss){
      if(iss.pull_request)return;
      open.push({
        id:iss.number,repo:repo,title:iss.title,
        labels:iss.labels.map(function(l){return l.name;}),
        assignees:iss.assignees.map(function(a){return a.login;}),
        createdAt:iss.created_at,url:iss.html_url,state:'open',
        milestone:iss.milestone?iss.milestone.title:null
      });
    });
    var cd=await ghFetchAll('/repos/'+repo+'/issues?state=closed&sort=updated&direction=desc&since='+since30,5);
    cd.forEach(function(iss){
      if(iss.pull_request)return;
      closed.push({
        id:iss.number,repo:repo,title:iss.title,
        labels:iss.labels.map(function(l){return l.name;}),
        assignees:iss.assignees.map(function(a){return a.login;}),
        createdAt:iss.created_at,closedAt:iss.closed_at,
        closedBy:(iss.closed_by&&iss.closed_by.login)||'',
        url:iss.html_url,state:'closed',
        milestone:iss.milestone?iss.milestone.title:null
      });
    });
  }
  S.issues=open;
  S.closedIssues=closed.sort(function(a,b){return new Date(b.closedAt)-new Date(a.closedAt);});
  var title='🔍 '+(S.activeProfile?S.activeProfile.name+' ':' ')+'Power Search';
  document.getElementById('dashTitle').textContent=title;
  document.getElementById('dashMeta').textContent=S.repos.join(', ')+' — '+open.length+' open issues';
}

// ── Connect ───────────────────────────────────────────────────────────────────
async function connect(){
  var tok=document.getElementById('ghToken').value.trim();
  var rp=document.getElementById('reposInput').value.trim();
  hideErr('setupErr');
  if(!tok){showErr('setupErr','GitHub token is required.');return;}
  if(!rp){showErr('setupErr','Please select a project.');return;}
  S.ghToken=tok;
  S.repos=rp.split(',').map(function(r){return r.trim();}).filter(Boolean);
  S.ignored=loadIgnored();
  var btn=document.getElementById('connectBtn');btn.disabled=true;btn.innerHTML='<span class="spin spd"></span>Loading...';
  var cache=loadCache();
  if(cache&&cache.issues){
    S.issues=cache.issues;S.closedIssues=cache.closedIssues||[];S.labelColors=cache.labelColors||{};S.labelNames=cache.labelNames||{};
    var age=Math.round((Date.now()-cache.savedAt)/60000);
    populateFilters();showDash();buildTabs();renderMain();
    setStatus('<span style="color:#f59e0b;font-size:13px;font-weight:700">⏳ Cached ('+age+'m ago) — refreshing...</span>');
    btn.disabled=false;btn.innerHTML='▶ Load Dashboard';
    bgRefresh();
  } else {
    showLoadingOverlay('Connecting...');
    try{
      await loadLabelColors();
      await loadIssues();
      saveCache();populateFilters();showDash();buildTabs();renderMain();startAutoRefresh();
      setStatus('<span style="color:#a5b4fc">✓ Loaded</span> &nbsp;<span style="color:#c7d2fe;font-size:12px">'+new Date().toLocaleTimeString()+'</span>');
    }catch(e){showErr('setupErr',e.message);}
    hideLoadingOverlay();
    btn.disabled=false;btn.innerHTML='▶ Load Dashboard';
  }
}

async function bgRefresh(){
  showLoadingOverlay('Refreshing...');
  try{
    S.labelColors={};S.labelNames={};
    await loadLabelColors();await loadIssues();
    saveCache();populateFilters();buildTabs();renderMain();startAutoRefresh();
    setStatus('<span style="color:#a5b4fc">✓ Refreshed</span> &nbsp;<span style="color:#c7d2fe;font-size:12px">'+new Date().toLocaleTimeString()+'</span>');
  }catch(e){setStatus('<span style="color:#fca5a5">✕ Refresh failed: '+esc(e.message)+'</span>');}
  hideLoadingOverlay();
}

async function doRefresh(){
  var btn=document.getElementById('refreshBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';

  showLoadingOverlay('Refreshing...');

function startAutoRefresh(){if(S.autoRefreshTimer)clearInterval(S.autoRefreshTimer);S.autoRefreshTimer=setInterval(doRefresh,20*60*1000);}

// ── Filters ───────────────────────────────────────────────────────────────────
function populateFilters(){
  var labels={},repos={},assignees={};
  S.issues.concat(S.closedIssues).forEach(function(iss){
    iss.labels.forEach(function(l){labels[l]=1;});
    repos[iss.repo]=1;
    iss.assignees.forEach(function(a){assignees[a]=1;});
  });
  var fl=document.getElementById('filterLabel');
  var cur=fl.value;
  fl.innerHTML='<option value="">All labels</option>';
  Object.keys(labels).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());}).forEach(function(l){fl.innerHTML+='<option value="'+esc(l)+'">'+esc(S.labelNames[l.toLowerCase()]||l)+'</option>';});
  if(cur)fl.value=cur;

  var fr=document.getElementById('filterRepo');
  var curR=fr.value;
  fr.innerHTML='<option value="">All repos</option>';
  Object.keys(repos).sort().forEach(function(r){fr.innerHTML+='<option value="'+esc(r)+'">'+esc(r)+'</option>';});
  if(curR)fr.value=curR;

  var fa=document.getElementById('filterAssignee');
  var curA=fa.value;
  fa.innerHTML='<option value="">All assignees</option><option value="_unassigned">Unassigned</option>';
  Object.keys(assignees).sort(function(a,b){return a.toLowerCase().localeCompare(b.toLowerCase());}).forEach(function(a){fa.innerHTML+='<option value="'+esc(a)+'">'+esc(a)+'</option>';});
  if(curA)fa.value=curA;
}

function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('filterLabel').value='';
  document.getElementById('filterRepo').value='';
  document.getElementById('filterAssignee').value='';
  renderMain();
}

function applyFilters(issues){
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  var lbl=document.getElementById('filterLabel').value;
  var repo=document.getElementById('filterRepo').value;
  var asgn=document.getElementById('filterAssignee').value;
  return issues.filter(function(iss){
    if(q&&!(iss.title.toLowerCase().includes(q)||String(iss.id).includes(q)||iss.assignees.join(' ').toLowerCase().includes(q)||iss.labels.join(' ').toLowerCase().includes(q)))return false;
    if(lbl&&!iss.labels.some(function(l){return l===lbl;}))return false;
    if(repo&&iss.repo!==repo)return false;
    if(asgn){if(asgn==='_unassigned'&&iss.assignees.length>0)return false;else if(asgn!=='_unassigned'&&!iss.assignees.includes(asgn))return false;}
    return true;
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(){
  var open=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;}).length;
  var closed=S.closedIssues.length;
  var overdue=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&ageDays(i.createdAt)>7;}).length;
  var unassigned=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&i.assignees.length===0;}).length;
  var stats=[
    {n:open,l:'Open Issues',c:'#4338ca',tab:'all'},
    {n:overdue,l:'Overdue (>7d)',c:'#dc2626',tab:'overdue'},
    {n:unassigned,l:'Unassigned',c:'#d97706',tab:'unassigned'},
    {n:closed,l:'Closed (30d)',c:'#059669',tab:'closed'},
    {n:S.ignored.length,l:'Ignored',c:'#6b7280',tab:'ignored'}
  ];
  var h='';
  stats.forEach(function(s){
    h+='<div class="sc2" style="border-top-color:'+s.c+'" onclick="switchTab(\''+s.tab+'\')">';
    h+='<div class="sn" style="color:'+s.c+'">'+s.n+'</div>';

// ── Tabs ──────────────────────────────────────────────────────────────────────
var TAB_DEFS=[
  {id:'all',label:'All Open',color:'#4338ca'},
  {id:'new',label:'New (<3d)',color:'#0ea5e9'},
  {id:'overdue',label:'Overdue (>7d)',color:'#dc2626'},
  {id:'unassigned',label:'Unassigned',color:'#d97706'},
  {id:'bylabel',label:'By Label',color:'#7c3aed'},
  {id:'closed',label:'Recently Closed',color:'#059669'},
  {id:'ignored',label:'Ignored',color:'#6b7280'}
];

function tabCount(id){
  if(id==='all')return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;}).length;
  if(id==='new')return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&ageDays(i.createdAt)<3;}).length;
  if(id==='overdue')return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&ageDays(i.createdAt)>7;}).length;
  if(id==='unassigned')return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1&&i.assignees.length===0;}).length;
  if(id==='bylabel')return S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;}).length;
  if(id==='closed')return S.closedIssues.length;
  if(id==='ignored')return S.ignored.length;
  return 0;
}

function buildTabs(){
  var h='';
  TAB_DEFS.forEach(function(t){
    var on=S.activeTab===t.id?' on':'';
    var cnt=tabCount(t.id);
    h+='<button class="tab'+on+'" onclick="switchTab(\''+t.id+'\')" style="'+(on?' color:'+t.color+';border-top:2px solid '+t.color:'')+'">';
    h+=t.label+'<span class="tc">'+cnt+'</span></button>';
  });
  document.getElementById('tabsWrap').innerHTML=h;
  renderStats();
}

function switchTab(id){
  S.activeTab=id;
  clearFilters();
  buildTabs();
  renderMain();
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function sortIssues(issues){
  var col=S.sortState.col,dir=S.sortState.dir;
  return issues.slice().sort(function(a,b){
    var va,vb;
    if(col==='id'){va=a.id;vb=b.id;}
    else if(col==='title'){va=a.title.toLowerCase();vb=b.title.toLowerCase();return dir*(va<vb?-1:va>vb?1:0);}
    else if(col==='age'){va=new Date(a.createdAt).getTime();vb=new Date(b.createdAt).getTime();return dir*(va-vb);}
    else if(col==='closed'){va=new Date(a.closedAt||0).getTime();vb=new Date(b.closedAt||0).getTime();return dir*(va-vb);}
    else if(col==='assignee'){va=(a.assignees[0]||'').toLowerCase();vb=(b.assignees[0]||'').toLowerCase();return dir*(va<vb?-1:va>vb?1:0);}
    else if(col==='repo'){va=a.repo.toLowerCase();vb=b.repo.toLowerCase();return dir*(va<vb?-1:va>vb?1:0);}
    else{va=a.id;vb=b.id;}
    return dir*(va-vb);
  });
}

function thClick(col){if(S.sortState.col===col)S.sortState.dir*=-1;else{S.sortState.col=col;S.sortState.dir=1;}renderMain();}
function thArrow(col){if(S.sortState.col!==col)return '<span class="si">↕</span>';return '<span class="si">'+(S.sortState.dir===1?'↑':'↓')+'</span>';}
function thCls(col){return S.sortState.col===col?' class="sorted"':'';}

// ── Issue row renderer ────────────────────────────────────────────────────────
function issueRow(iss,showClosed,showRestore){
  var age=ageDays(iss.createdAt);
  var cls=ageCls(age);
  var lbls=iss.labels.slice(0,4).map(lblBadge).join(' ');
  var asgn=iss.assignees.length?iss.assignees.map(function(a){return '<span style="display:inline-flex;align-items:center;gap:3px"><img src="https://github.com/'+esc(a)+'.png?size=20" width="16" height="16" style="border-radius:50%;vertical-align:middle"/> '+esc(a)+'</span>';}).join(', '):'<span style="color:#9ca3af;font-style:italic">Unassigned</span>';
  var repoShort=iss.repo.split('/')[1]||iss.repo;
  var ikey=iss.id+'_'+iss.repo;
  var h='<tr>';
  h+='<td><a href="'+esc(iss.url)+'" target="_blank" style="color:#4338ca;font-weight:600">#'+iss.id+'</a></td>';
  h+='<td style="max-width:380px"><div style="font-weight:600;line-height:1.4"><a href="'+esc(iss.url)+'" target="_blank" style="color:#1a1a1a;text-decoration:none" onmouseover="this.style.color=\'#4338ca\'" onmouseout="this.style.color=\'#1a1a1a\'">'+esc(iss.title)+'</a></div>';
  if(lbls)h+='<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px">'+lbls+'</div>';
  h+='</td>';
  if(S.repos.length>1)h+='<td style="white-space:nowrap;color:#6b7280;font-size:12px">'+esc(repoShort)+'</td>';
  h+='<td>'+asgn+'</td>';
  if(showClosed){
    var closedAge=ageDays(iss.closedAt);
    h+='<td style="white-space:nowrap;font-size:12px;color:#6b7280">'+closedAge+'d ago</td>';
    h+='<td style="white-space:nowrap;font-size:12px;color:#6b7280">'+esc(iss.closedBy||'—')+'</td>';
  } else {
    h+='<td style="white-space:nowrap"><span class="'+cls+'">'+age+'d</span></td>';
    if(showRestore)h+='<td><button class="btn-sm" onclick="unignoreIssue(\''+ikey+'\')">Restore</button></td>';
    else h+='<td><button class="btn-ig" onclick="ignoreIssue(\''+ikey+'\')">Ignore</button></td>';
  }
  if(iss.milestone)h+='<td style="font-size:12px;color:#6b7280">'+esc(iss.milestone)+'</td>';
  h+='</tr>';
  return h;
}

function openTable(issues,emptyMsg,showRestore){
  if(!issues.length)return '<div class="es">'+esc(emptyMsg||'No issues found.')+'</div>';
  var multiRepo=S.repos.length>1;
  var h='<div class="rw"><div class="gh" style="background:linear-gradient(135deg,#1e1b4b,#4338ca)"><span class="gt">Issues <span class="gc">'+issues.length+'</span></span></div>';
  h+='<div class="tw2"><table><thead><tr>';
  h+='<th onclick="thClick(\'id\')"'+thCls('id')+'>No.'+thArrow('id')+'</th>';
  h+='<th onclick="thClick(\'title\')"'+thCls('title')+'>Title'+thArrow('title')+'</th>';
  if(multiRepo)h+='<th onclick="thClick(\'repo\')"'+thCls('repo')+'>Repo'+thArrow('repo')+'</th>';
  h+='<th onclick="thClick(\'assignee\')"'+thCls('assignee')+'>Assignee'+thArrow('assignee')+'</th>';
  h+='<th onclick="thClick(\'age\')"'+thCls('age')+'>Age'+thArrow('age')+'</th>';
  h+='<th></th>';
  h+='</tr></thead><tbody>';
  sortIssues(issues).forEach(function(iss){h+=issueRow(iss,false,showRestore);});
  h+='</tbody></table></div></div>';
  return h;
}

function closedTable(issues){
  if(!issues.length)return '<div class="es">No recently closed issues found.</div>';
  var multiRepo=S.repos.length>1;
  var h='<div class="rw"><div class="gh" style="background:linear-gradient(135deg,#065f46,#059669)"><span class="gt">Closed Issues <span class="gc">'+issues.length+'</span></span></div>';
  h+='<div class="tw2"><table><thead><tr>';
  h+='<th onclick="thClick(\'id\')"'+thCls('id')+'>No.'+thArrow('id')+'</th>';
  h+='<th onclick="thClick(\'title\')"'+thCls('title')+'>Title'+thArrow('title')+'</th>';
  if(multiRepo)h+='<th onclick="thClick(\'repo\')"'+thCls('repo')+'>Repo'+thArrow('repo')+'</th>';
  h+='<th onclick="thClick(\'assignee\')"'+thCls('assignee')+'>Assignee'+thArrow('assignee')+'</th>';
  h+='<th onclick="thClick(\'closed\')"'+thCls('closed')+'>Closed'+thArrow('closed')+'</th>';
  h+='<th>By</th>';
  h+='</tr></thead><tbody>';
  var prev=S.sortState;S.sortState={col:'closed',dir:1};
  sortIssues(issues).forEach(function(iss){h+=issueRow(iss,true);});
  S.sortState=prev;
  h+='</tbody></table></div></div>';
  return h;
}

function byLabelView(issues){
  if(!issues.length)return '<div class="es">No open issues found.</div>';
  var groups={};var unlabeled=[];
  issues.forEach(function(iss){
    if(!iss.labels.length){unlabeled.push(iss);return;}
    iss.labels.forEach(function(l){if(!groups[l])groups[l]=[];groups[l].push(iss);});
  });
  var sortedLabels=Object.keys(groups).sort(function(a,b){return groups[b].length-groups[a].length;});
  var h='';
  sortedLabels.forEach(function(lbl){
    var grpIssues=groups[lbl];
    var c=S.labelColors[lbl.toLowerCase()]||'e5e7eb';
    var display=S.labelNames[lbl.toLowerCase()]||lbl;
    h+='<div style="margin-bottom:20px"><div class="gh" style="background:linear-gradient(90deg,#'+c+',#'+c+'dd);border-radius:10px 10px 0 0">';
    h+='<span class="gt" style="color:'+tfb(c)+'">'+esc(display)+'<span class="gc">'+grpIssues.length+'</span></span></div>';
    h+='<div class="tw2"><table><thead><tr><th>No.</th><th>Title</th>';
    if(S.repos.length>1)h+='<th>Repo</th>';
    h+='<th>Assignee</th><th>Age</th><th></th></tr></thead><tbody>';
    grpIssues.slice().sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);}).forEach(function(iss){h+=issueRow(iss,false,false);});
    h+='</tbody></table></div></div>';
  });
  if(unlabeled.length){
    h+='<div style="margin-bottom:20px"><div class="gh" style="background:#6b7280;border-radius:10px 10px 0 0">';
    h+='<span class="gt">Unlabeled<span class="gc">'+unlabeled.length+'</span></span></div>';
    h+='<div class="tw2"><table><thead><tr><th>No.</th><th>Title</th>';
    if(S.repos.length>1)h+='<th>Repo</th>';
    h+='<th>Assignee</th><th>Age</th><th></th></tr></thead><tbody>';
    unlabeled.forEach(function(iss){h+=issueRow(iss,false,false);});
    h+='</tbody></table></div></div>';
  }
  return h;
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderMain(){
  var tab=S.activeTab;
  var content=document.getElementById('mainContent');
  if(!content)return;

  if(tab==='ignored'){
    var filtered=applyFilters(S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)!==-1;}));
    content.innerHTML=openTable(filtered,'No ignored issues.',true);
    return;
  }

  if(tab==='closed'){
    var filtered=applyFilters(S.closedIssues);
    content.innerHTML=closedTable(filtered);
    return;
  }

  if(tab==='bylabel'){
    var filtered=applyFilters(S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;}));
    content.innerHTML=byLabelView(filtered);
    return;
  }

  var src=S.issues.filter(function(i){return S.ignored.indexOf(i.id+'_'+i.repo)===-1;});
  if(tab==='new')src=src.filter(function(i){return ageDays(i.createdAt)<3;});
  else if(tab==='overdue')src=src.filter(function(i){return ageDays(i.createdAt)>7;});
  else if(tab==='unassigned')src=src.filter(function(i){return i.assignees.length===0;});

  var filtered=applyFilters(src);
  var emptyMsgs={all:'No open issues — all clear!',new:'No issues opened in the last 3 days.',overdue:'No overdue issues — great!',unassigned:'All issues are assigned!'};
  content.innerHTML=openTable(filtered,emptyMsgs[tab]||'No issues found.',false);
}

// ── Init ──────────────────────────────────────────────────────────────────────
(function init(){
  renderProfileDd();
  checkSessionToken();
  showEl('setup');
})();
</script>
